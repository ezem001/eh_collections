      // ✅ UA → Latin (KMU 55 / 2010). Works well for ПІБ.\r

      // Rules: ь and apostrophe are not transliterated; Є/Ї/Й/Ю/Я have
      positional variants.\r

      function translitUaToLat(input = \"\") {\r

      \  const map = {\r

      \    \"а\":\"a\",\"б\":\"b\",\"в\":\"v\",\"г\":\"h\",\"ґ\":\"g\",\"д\":\"d\
      \",\"е\":\"e\",\"ж\":\"zh\",\"з\":\"z\",\"и\":\"y\",\"і\":\"i\",\"ї\":\"i\
      \",\r

      \    \"й\":\"i\",\"к\":\"k\",\"л\":\"l\",\"м\":\"m\",\"н\":\"n\",\"о\":\"o\
      \",\"п\":\"p\",\"р\":\"r\",\"с\":\"s\",\"т\":\"t\",\"у\":\"u\",\"ф\":\"f\
      \",\r

      \    \"х\":\"kh\",\"ц\":\"ts\",\"ч\":\"ch\",\"ш\":\"sh\",\"щ\":\"shch\",\
      \"ю\":\"iu\",\"я\":\"ia\",\"є\":\"ie\"\r

      \  };\r

      \r

      \  // Word boundary chars (treat hyphen as new word too)\r

      \  const isBoundary = (ch) => ch == null || /\\s|[-–—/().,]/.test(ch);\r

      \r

      \  // apostrophes we may see in data\r

      \  const isApostrophe = (ch) => ch === \"'\" || ch === \"’\" || ch ===
      \"ʼ\" || ch === \"`\";\r

      \r

      \  let out = \"\";\r

      \  for (let i = 0; i < input.length; i++) {\r

      \    const ch = input[i];\r

      \    const prev = input[i - 1];\r

      \r

      \    // ь + apostrophe are NOT output\r

      \    if (ch === \"ь\" || ch === \"Ь\" || isApostrophe(ch)) continue;\r

      \r

      \    const lower = ch.toLowerCase();\r

      \r

      \    const atWordStart = isBoundary(prev) || isApostrophe(prev);\r

      \r

      \    // Positional variants at word start (or after apostrophe):\r

      \    // Є: Ye/ie, Ї: Yi/i, Й: Y/i, Ю: Yu/iu, Я: Ya/ia\r

      \    let mapped;\r

      \    if (lower === \"є\") mapped = atWordStart ? \"ye\" : \"ie\";\r

      \    else if (lower === \"ї\") mapped = atWordStart ? \"yi\" : \"i\";\r

      \    else if (lower === \"й\") mapped = atWordStart ? \"y\" : \"i\";\r

      \    else if (lower === \"ю\") mapped = atWordStart ? \"yu\" : \"iu\";\r

      \    else if (lower === \"я\") mapped = atWordStart ? \"ya\" : \"ia\";\r

      \    else mapped = map[lower];\r

      \r

      \    // If not a UA letter we know — keep as-is (spaces, hyphens, latin,
      etc.)\r

      \    if (!mapped) {\r

      \      out += ch;\r

      \      continue;\r

      \    }\r

      \r

      \    // Preserve capitalization (for names it’s enough: TitleCase
      mapping)\r

      \    if (ch === ch.toUpperCase() && ch !== ch.toLowerCase()) {\r

      \      mapped = mapped.charAt(0).toUpperCase() + mapped.slice(1);\r

      \    }\r

      \r

      \    out += mapped;\r

      \  }\r

      \r

      \  return out;\r

      }\r

