$kind: http-request
url: "{{host}}/api/v2/person_requests/{{Person_req_id}}/actions/sign"
method: PATCH
headers:
  Authorization: Bearer {{access_token}}
  Content-Type: application/json
  drfo: "2799207815"
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: |+
    {
      "signed_content": "{{signed_content}}"
    }

