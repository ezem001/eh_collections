$kind: http-request
description: This method is used to change care team status.
url: "{{host}}/api/care_teams/{{care_team_id}}"
method: PATCH
headers:
  api-key: "{{mis_client_secret}}"
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: json
  content: "{\r

    \  \"email\": \"test_care_team_no_user_4@email.com\",\r

    \  \"phones\": [\r

    \    {\r

    \      \"type\": \"MOBILE\",\r

    \      \"number\": \"+380503410870\"\r

    \    },\r

    \    {\r

    \      \"type\": \"MOBILE\",\r

    \      \"number\": \"+380506780845\"\r

    \    }\r

    \  ],\r

    \  \"note\": \"Додаткова примітка до команди лікування no user 4\"\r

    }"
scripts:
  - type: afterResponse
    code: >
      // pm.test("Status code is 200", function () {

      //     pm.response.to.have.status(200);


      //     // ------------------------------

