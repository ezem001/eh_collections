$kind: http-request
url: "{{host}}/api/contract_requests/reimbursement"
method: POST
headers:
  X-Custom-PSK: "{{x-custom-psk}}"
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      \r

      function displayResponse(title, data) {\r

      \    const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \    pm.visualizer.set(html);\r

      }\r

      \r

      \r

      pm.test(\"Initialize Contract Request status code is 200\", function ()
      {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      \r

      \    const contractReqId = resData.data.id;\r

      \    pm.globals.set('contract_request_id', contractReqId);\r

      \r

      \    console.log(contractReqId);\r

      \r

      \    // Function to handle each URL request\r

      \    function processUrl(url, additionalData) {\r

      \        console.log(url, 'urls loop');\r

      \r

      \        pm.sendRequest({\r

      \            url: url,\r

      \            method: 'PUT',\r

      \            header: {\r

      \                'Content-Type': 'image/jpeg'\r

      \            },\r

      \            body: {\r

      \                mode: 'raw',\r

      \                raw: JSON.stringify(additionalData) // Include additional
      data in the body\r

      \            }\r

      \        }, function (err, res) {\r

      \            if (err) {\r

      \                console.error('Request failed:', err);\r

      \                displayResponse('Request Error', { error: err.message
      });\r

      \            } else {\r

      \                let responseData;\r

      \r

      \                // Check content type to determine how to parse the
      response\r

      \                const contentType = res.headers.get('Content-Type');\r

      \                console.log(contentType);\r

      \                if (contentType && contentType.includes('text/plain'))
      {\r

      \                    try {\r

      \                        // Handle TEXT response if needed\r

      \                        responseData = res.text(); // Get response as
      text\r

      \                        displayResponse('Document sign successful', {
      response: responseData });\r

      \                        const etag = res.headers.get('etag');\r

      \                        pm.globals.set('contract_etag', etag)\r

      \                        console.log(etag)\r

      \                    } catch (e) {\r

      \                        console.error('JSON parsing error:', e);\r

      \                        displayResponse('Parsing Error', { error: 'Failed
      to parse JSON' });\r

      \                        return;\r

      \                    }\r

      \                } else {\r

      \                    // Handle other response types if needed\r

      \                    responseData = res.text(); // Default to text for
      unknown formats\r

      \                    displayResponse('Unknown Response Format', {
      response: responseData });\r

      \                }\r

      \            }\r

      \        });\r

      \    }\r

      \r

      \    // Extract URLs from the response\r

      \    const additionalDocumentUrl = resData.data.additional_document_url;\r

      \    const statuteUrl = resData.data.statute_url;\r

      \r

      \    const urls = [additionalDocumentUrl, statuteUrl];\r

      \r

      \    const additionalData = {\r

      \        row: '0JTQvtC60YPQvNC10L3Rgg=='\r

      \    };\r

      \r

      \    // Process each URL from the response\r

      \    urls.forEach(url => {\r

      \        processUrl(url, additionalData);\r

      \    });\r

      });\r\n"
    language: text/javascript
order: 1000
