$kind: http-request
name: Create/Update LE
url: "{{host}}/api/v2/legal_entities"
method: PUT
headers:
  - key: Authorization
    value: Bearer {{access_token}}
    disabled: true
  - key: api-key
    value: "{{mis_client_secret}}"
  - key: Content-Type
    value: application/json
  - key: X-Custom-PSK
    value: "{{x-custom-psk}}"
  - key: Accept
    value: application/json
    disabled: true
