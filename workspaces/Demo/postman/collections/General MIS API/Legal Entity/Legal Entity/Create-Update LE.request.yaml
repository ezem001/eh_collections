      \r

      // Функція для безпечного запису\r

      function setEnvIfDefined(key, newValue) {\r

      \    if (newValue !== undefined) {\r

      \        pm.environment.set(key, newValue);\r

      \    }\r

      }\r

      \r

      // Перевіряємо умови: employee_specialty відсутня І employee_type містить
