      // ----------------------- Fetch Employee Type & Speciality
      ---------------------------\r

      const employeeId = pm.environment.get('user_id') ||
      pm.environment.get('owner_id');\r

      function fetchEmployee(access_token, dataFromExchange) {\r

      \    const url =
      `${pm.globals.get('host')}/api/employees/${employeeId}`;\r

      \    const headers = {\r

      \        'Content-Type': 'application/json',\r

      \        'api-key': apiKey,\r

      \        'X-Custom-PSK': XCustomPSK,\r

      \        'Authorization': `Bearer ${access_token}`\r

      \    };\r

      \r

      \    pm.sendRequest({ url, method: 'GET', header: headers }, (err, res) =>
      {\r

      \        if (err) return handleError('Employee fetch error', err);\r

      \r

      \        let body;\r

      \        try { body = res.json(); } catch { return handleError('Employee
      fetch parsing error', res.text()); }\r

      \r

      \        if (res.code !== 200) return handleError(`Employee fetch failed
      (${res.code})`, body?.error?.message, body);\r

      \r

      \        const { employee_type, position, legal_entity = {}, division =
      {}, party = {} } = body.data ?? {};\r

      \r

      \        console.info(\"divisions\", division)\r

      \r

      \        // 🧩 Збереження у середовище\r

      \        setEnv({\r

      \            employee_position: position,\r

      \            le_type: legal_entity?.type,\r

      \            le_name: legal_entity?.name,\r

      \            le_edrpou: legal_entity?.edrpou,\r

