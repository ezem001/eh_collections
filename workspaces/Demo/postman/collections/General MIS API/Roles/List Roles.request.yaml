$kind: http-request
url: "{{host}}/admin/roles"
method: GET
headers:
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
queryParams:
  - key: name
    value: My%20role
    disabled: true
  - key: page
    value: "2"
    disabled: true
  - key: page_size
    value: "50"
    disabled: true
order: 1000
