      medicationRequestCreatedAtISO);\r

      // pm.globals.set('medicationRequestStartedAt',
      medicationRequestStartedAtISO);\r

      // pm.globals.set('medicationRequestEndedAt',
      medicationRequestEndedAtISO);\r

      \r

      // console.log(\"Medication Request Created At:\",
      medicationRequestCreatedAtISO);\r

      // console.log(\"Medication Request Started At:\",
      medicationRequestStartedAtISO);\r

      // console.log(\"Medication Request Ended At:\",
      medicationRequestEndedAtISO);\r

      \r

      \r

      \r

      \r

      \r

      // // Отримуємо medication_info з глобалів\r

      // let medicationInfo = pm.globals.get(\"medication_info\");\r

      // if (typeof medicationInfo === \"string\") medicationInfo =
      JSON.parse(medicationInfo);\r

      \r

      // // Дати початку та кінця лікування\r

      // let startedAt = new
      Date(pm.globals.get(\"medicationRequestStartedAt\"));\r

      // let endedAt = new Date(pm.globals.get(\"medicationRequestEndedAt\"));\r

      // let treatmentDays = Math.ceil((endedAt - startedAt) / (1000 * 60 * 60 *
      24)) + 1;\r

      \r

      // // Перевірка наявності пакетів\r

      // if (!medicationInfo.packages || medicationInfo.packages.length === 0)
