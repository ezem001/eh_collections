$kind: http-request
url: "{{host}}/api/persons/{{patient_id_from_episode}}/medication_requests/{{me\
  dication_req_id}}/printout_form"
method: GET
headers:
  Content-Type: application/json
  api-key: "{{mis_client_secret}}"
  Authorization: Bearer {{access_token}}
  X-Custom-PSK: "{{x-custom-psk}}"
scripts:
  - type: afterResponse
    code: >
      (function () {
          function safeJsonParse(text) {
              try { return JSON.parse(text); } catch (e) { return null; }
          }

          function escapeHtml(s) {
              return String(s)
                  .replace(/&/g, "&amp;")
                  .replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;")
                  .replace(/"/g, "&quot;")
                  .replace(/'/g, "&#39;");
          }

          function escapeAttr(s) {
              return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
          }

          const raw = pm.response.text();
          const json = safeJsonParse(raw);

          if (!json || !json.data || typeof json.data.printout_form !== "string") {
              pm.visualizer.set(`
              <div style="font-family: system-ui; padding: 12px;">
                  <h3>Printout form not found</h3>
                  <pre>${escapeHtml(raw).slice(0, 8000)}</pre>
              </div>
              `);
              return;
          }

          let htmlString = json.data.printout_form;

          /* ======================================================
             🕒 REQUEST TIME BLOCK (can be safely commented out)
          ====================================================== */

          const requestTime = new Date().toLocaleString("uk-UA");

          const timeBanner = `
              <div style="
                  padding:6px 10px;
                  margin-bottom:6px;
                  font-size:12px;
                  background:#f1f5f9;
                  border:1px dashed #94a3b8;
                  border-radius:6px;
                  text-align:center;
                  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;">
                  Запит був виконаний о <b>${requestTime}</b>
              </div>
          `;

          // Inject after <body> tag
          htmlString = htmlString.replace(
              /<body[^>]*>/i,
              match => match + timeBanner
          );

          /* ====================================================== */

          const srcdocAttr = escapeAttr(htmlString);
          const id = json.data.id ? escapeHtml(json.data.id) : "";

          const wrapper = `
          <div style="font-family: system-ui, padding: 10px;">
              <div style="margin-bottom:10px;">
                  <button id="printBtn"
                      style="padding:6px 10px; border:1px solid #d0d7de; background:#fff; border-radius:8px; cursor:pointer;">
                      Друк
                  </button>
                  <span style="margin-left:10px; font-size:12px; color:#6b7280;">
                      id: <b>${id}</b>
                  </span>
              </div>

              <iframe
                  id="printFrame"
                  style="width:100%; height:85vh; border:1px solid #d0d7de; border-radius:10px; background:white;"
                  srcdoc="${srcdocAttr}">
              </iframe>

              <script>
                  (function () {
                      const iframe = document.getElementById('printFrame');
                      const printBtn = document.getElementById('printBtn');

                      printBtn.onclick = function () {
                          if (!iframe.contentWindow) return;
                          iframe.contentWindow.focus();
                          iframe.contentWindow.print();
                      };
                  })();
              </script>
          </div>
          `;

          pm.visualizer.set(wrapper);
      })();
    language: text/javascript
order: 18000
