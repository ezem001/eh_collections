scripts:
  - type: beforeRequest
    code: "const patientID = pm.globals.get('patient_id_from_episode') || \"\"; //or
      use id other patient\r

      const mrId = pm.globals.get('medication_req_id') || \"\"; //or use yours
      own mr ID\r

      \r

      function displayResponse(title, data) {\r

      \    console.log(title, data)\r

      \    const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \    pm.visualizer.set(html);\r

      }\r

      pm\r

      pm.sendRequest({\r

      \    url:
      `${pm.globals.get('host')}/api/persons/${patientID}/medication_requests/$\
      {mrId}`,\r

      \    method: \"GET\",\r

      \    header: {\r

      \        \"Content-Type\": \"application/json\",\r

      \        \"api-key\": `${pm.environment.get('mis_client_secret')}`,\r

      \        \"Authorization\": `Bearer
      ${pm.environment.get('access_token')}`,\r

      \        \"X-Custom-PSK\": `${pm.globals.get('x-custom-psk')}`\r

      \    }\r

      }, function (err, res) {\r

      \    if (err) {\r

      \        // displayResponse(\"Error get MR\", err)\r

      \        console.error(\"Request Error:\", err);\r

      \        return;\r

      \    }\r

      \r

      \    try {\r

      \        // Parse the response\r

      \        const responseData = res.json();\r

      \r

      \        // Destructure necessary fields from responseData.data\r

      \        const {\r

      \            category,\r

      \            context,\r

      \            created_at,\r

      \            dispense_valid_from,\r

      \            dispense_valid_to,\r

      \            dosage_instruction,\r

      \            ended_at,\r

      \            id,\r

      \            intent,\r

      \            medical_program,\r

      \            medication_info,\r

      \            person,\r

      \            request_number,\r

      \            started_at,\r

      \            status\r

      \        } = responseData.data;\r

      \r

      \        // Remove the `id` field from the `person` object\r

      \        if (person && person.id) {\r

      \            delete person.id;\r

      \        }\r

      \r

      \        // Construct modified object with added reject_reason_code\r

      \        const modifiedObject = {\r

      \            category,\r

      \            context,\r

      \            created_at,\r

      \            dispense_valid_from,\r

      \            dispense_valid_to,\r

      \            dosage_instruction,\r

      \            ended_at,\r

      \            id,\r

      \            intent,\r

      \            medical_program,\r

      \            medication_info,\r

      \            person,\r

      \            request_number,\r

      \            started_at,\r

      \            status,\r

      \            reject_reason_code: \"WRONG_SIGNATURE\" // Add field\r

      \        };\r

      \r

      \        // Visualization\r

      \        displayResponse(\"MR_reject_body\", modifiedObject)\r

      \r

      \        // Save the modified object to globals\r

      \        pm.globals.set(\"modified_response_data\",
      JSON.stringify(modifiedObject));\r

      \r

      \        sendDataToSign(modifiedObject);\r

      \r

      \        // Log confirmation\r

      \        console.log(\"Modified object set in globals:\",
      modifiedObject);\r

      \    } catch (parseError) {\r

      \        console.error(\"Response parsing error. Raw body:\",
      res.text());\r

      \    }\r

      });\r

      \r

      function sendDataToSign(dataToBeSigned) {\r

      \    const localServerUrl =
      'http://localhost:3000/reject-medication-request-signed-content';\r

      \r

      \    const requestData = {\r

      \        method: 'POST',\r

      \        url: localServerUrl,\r

      \        header: {\r

      \            'Content-Type': 'application/json',\r

      \        },\r

      \        body: {\r

      \            mode: 'raw',\r

      \            raw: JSON.stringify(dataToBeSigned) // Send the entire
      response or specific fields\r

      \        }\r

      \    };\r

      \r

      \    // Send the request to the local server\r

      \    pm.sendRequest(requestData, function (err, res) {\r

      \        if (err) {\r

      \            console.error('Error sending request to local server:',
      err);\r

      \        } else {\r

      \            console.log('Response from local server:', res.json());\r

      \            const responseBody = res.json();\r

      \r

      \            pm.test(`Reject Medication Request content sign success.
      Response status is 200 ${JSON.stringify(responseBody, null, 2)}`, function
      () {\r

      \                pm.expect(res.code).to.eql(200);\r

      \                pm.expect(responseBody).to.have.property('signed_content\
      ');\r

      \                pm.globals.set('reject_medication_data_to_sign',
      responseBody.signed_content)\r

      \            });\r

      \        }\r

      \    });\r

      }\r\n"
    language: text/javascript
order: 14000
