$kind: http-request
url: http://localhost:3000/create-care-plan-activity-signed-content
method: POST
body:
  type: json
  content: "{\r

    \    \"id\": \"{{care_plan_activity_id}}\",\r

    \    \"author\": [\r

    \        {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"employee\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{user_id}}\"\r

    \            }\r

    \        }\r

    \    ],\r

    \    \"care_plan\": {\r

    \        \"identifier\": {\r

    \            \"type\": {\r

    \                \"coding\": [\r

    \                    {\r

    \                        \"system\": \"eHealth/resources\",\r

    \                        \"code\": \"care_plan\"\r

    \                    }\r

    \                ]\r

    \            },\r

    \            \"value\": \"{{jobCarePlanID}}\"\r

    \        }\r

    \    },\r

    \    \"detail\": {\r

    \        \"kind\": \"medication_request\",\r

    \        \"product_reference\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"medication\"\r

    \                        }\r

    \                    ],\r

    \                    \"text\": \"Тестовий текст\"\r

    \                },\r

    \                \"value\": \"{{medication_id}}\"\r

    \            }\r

    \        },\r

    \        \"reason_code\": [\r

    \            {\r

    \                \"coding\": [\r

    \                    {\r

    \                        \"system\": \"eHealth/ICD10_AM/condition_codes\",\r

    \                        \"code\": \"E10.9\"\r

    \                    }\r

    \                ]\r

    \            }\r

    \        ],\r

    \        \"reason_reference\": [\r

    \            {\r

    \                \"identifier\": {\r

    \                    \"type\": {\r

    \                        \"coding\": [\r

    \                            {\r

    \                                \"system\": \"eHealth/resources\",\r

    \                                \"code\": \"condition\"\r

    \                            }\r

    \                        ]\r

    \                    },\r

    \                    \"value\": \"{{jobConditionID}}\"\r

    \                }\r

    \            }\r

    \        ],\r

    \        \"goal\": [\r

    \            {\r

    \                \"coding\": [\r

    \                    {\r

    \                        \"system\": \"eHealth/care_plan_activity_goals\",\r

    \                        \"code\": \"default\"\r

    \                    }\r

    \                ]\r

    \            }\r

    \        ],\r

    \        \"quantity\": {\r

    \            \"value\": {{med_quantity_value}},\r

    \            \"system\": \"MEDICATION_UNIT\",\r

    \            \"code\": \"{{med_quantity_code}}\"\r

    \        },\r

    \        \"scheduled_period\": {\r

    \            \"start\": \"{{activityStartDate}}\",\r

    \                \"end\": \"{{activityEndDate}}\"\r

    \        },\r

    \        \"location\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"division\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{user_division_id}}\"\r

    \            }\r

    \        },\r

    \        \"performer\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"employee\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{user_id}}\"\r

    \            }\r

    \        },\r

    \        \"daily_amount\": {\r

    \            \"value\": {{med_daily_amount}},\r

    \            \"system\": \"MEDICATION_UNIT\",\r

    \            \"code\": \"{{med_quantity_code}}\"\r

    \        },\r

    \        \"description\": \"Some activity description 123\",\r

    \        \"do_not_perform\": false,\r

    \        \"program\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"medical_program\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{medication_program}}\"\r

    \            }\r

    \        },\r

    \        \"status\": \"scheduled\"\r

    \    }\r

    }"
scripts:
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const caraPlanActivityId = uuid.v4();\r

      \r

      pm.globals.set(\"care_plan_activity_id\", caraPlanActivityId);\r

      \r

      \r

      const carePlanStartDate = pm.globals.get('carePlanStartDate');\r

      const carePlanDate = new Date(carePlanStartDate);\r

      \r

      // Додаємо 1 день для activityStartDate\r

      const activityStartDate = new Date(carePlanDate);\r

      activityStartDate.setDate(activityStartDate.getDate() + 1);\r

      \r

      \r

      // Конвертуємо у формат ISO 8601\r

      const activityStartDateISO = activityStartDate.toISOString();\r

      \r

      // Зберігаємо значення в глобальні змінні\r

      pm.globals.set('activityStartDate', activityStartDateISO);\r

      \r

      console.log(\"Activity Start Date:\", activityStartDateISO);"
    language: text/javascript
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      \r

      if(resData.signed_content){\r

      \    pm.globals.set('care_plan_activity_signed_content',
      resData.signed_content)\r

      }"
    language: text/javascript
order: 4000
