$kind: http-request
description: |-
  ## Типи епізодів (`type.code`)

  Використовуй лише **активні** коди з довідника `eHealth/episode_types`:

  | Code | Description |
  | --- | --- |
  | `CONDITIONING` | Кондиціонування |
  | `DG` | Діагностика |
  | `PALLIATIVE_CARE` | Паліативна допомога |
  | `PHC` | Первинна медична допомога |
  | `PREVENTION` | Профілактика |
  | `REHAB` | Реабілітація |
  | `TREATMENT` | Лікування |
url: "{{host}}/api/patients/c4290246-5bb4-4fad-a870-515da0893b15/episodes"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: |2-
     {
       "id":"{{episode_id}}",
       "name":"Епізод QA_29",
       "status":"active",
       "type":{
          "system":"eHealth/episode_types",
          "code":"TREATMENT"
       },
       "period":{
          "start":"{{episode_start_date}}"
       },
       "managing_organization": {
    	    "identifier": {
    	      "type": {
    	        "coding": [
    	          {
    	            "system": "eHealth/resources",
    	            "code": "legal_entity"
    	          }
    	        ]
    	      },
    	      "value":"{{user_legal_entity}}"
    	    }
       },
       "care_manager": {
    	    "identifier": {
    	      "type": {
    	        "coding": [
    	          {
    	            "system": "eHealth/resources",
    	            "code": "employee"
    	          }
    	        ]
    	      },
    	      "value":"{{user_id}}"
    	    }
       }
