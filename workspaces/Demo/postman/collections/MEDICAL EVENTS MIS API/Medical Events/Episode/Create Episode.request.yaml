    //       "value": "7e091aeb-364c-4d92-8706-c888f1a93a32"
    //     }
    //   }
    }
scripts:
  - type: afterResponse
    code: "function displayResponse(title, data) {\r

      \    console.log(title, data)\r

      \    const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \    pm.visualizer.set(html);\r

      }\r

      \r

      // Initialize variables to track the number of tests\r

      let allTestsPassed = false;\r

      let passedTestsCount = 0;\r

      let totalTestsCount = 3; // Adjust based on the total number of tests\r

      \r

      // Run your tests\r

      pm.test(\"Check token is not expired\", function () {\r

      \    const result = pm.response.code !== 401;\r

      \    pm.expect(result).to.be.true;\r

      \    if (result) {\r

      \        passedTestsCount++;\r

      \        allTestsPassed = true;\r

      \    }\r

      });\r

      \r

      pm.test(\"Check user has the required scope\", function () {\r

      \    const result = pm.response.code !== 403;\r

      \    pm.expect(result).to.be.true;\r

      \    if (result) {\r

      \        passedTestsCount++;\r

      \        allTestsPassed = true;\r

      \    }\r

      });\r

      \r

      pm.test(\"Check for valid access token\", function () {\r

      \    const result = pm.response.code !== 401;\r

      \    pm.expect(result).to.be.true;\r

      \    if (result) {\r

      \        passedTestsCount++;\r

      \        allTestsPassed = true;\r

      \    }\r

      });\r

      \r

      console.log(`Passed ${passedTestsCount} out of ${totalTestsCount} tests
      ${passedTestsCount < totalTestsCount}`);\r

      if (passedTestsCount === totalTestsCount) {\r

      \    const jsonData = pm.response.json();\r

      \    console.log('response in episode', jsonData);\r

      \r

      \    pm.test(\"Episode done. Response status is 202\", function () {\r

      \        pm.expect(pm.response.code).to.eql(202);\r

      \    });\r

      \r

      \r

      \r

      \    if (jsonData && jsonData.error) {\r

      \        displayResponse('Episode Response Error Details',
      jsonData.error);\r

      \    }\r

      \r

      \r

      \r

      \r

      \r

      \    /***********************\r

      \     * Logger (MAIN + subrequests) + integrate into Episode job flow\r

      \     * - Main request logged once automatically\r

      \     * - Use logger.displayResponse(...) anywhere (won't create
      [Request]/[Response])\r

      \     * - Use logger.logSubRequest({title, req, res, err}) for
      pm.sendRequest calls\r

      \     ***********************/\r

      \r

      \    function initLogger(pm) {\r

      \  const MASK = true;\r

      \  const SENSITIVE = new Set(['authorization', 'api-key', 'x-custom-psk',
      'cookie']);\r

      \  const DROP = new Set([\r

      \    'accept', 'accept-encoding', 'connection', 'content-type',
      'postman-token',\r

      \    'user-agent', 'content-length', 'host',\r

      \  ]);\r

      \  const KEY = '__viz_sections__';\r

      \r

      \  const jparse = (t) => { try { return JSON.parse(t); } catch { return
      null; } };\r

      \  const esc = (s) => String(s ?? '')\r

      \    .replaceAll('&', '&amp;')\r

      \    .replaceAll('<', '&lt;')\r

      \    .replaceAll('>', '&gt;');\r

      \  const uid = () =>
      `${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;\r

      \r

      \  const headersObj = (h) => {\r

      \    if (!h) return {};\r

      \    if (typeof h?.toObject === 'function') return h.toObject();\r

      \    if (Array.isArray(h)) return h.reduce((a, x) => {\r

      \      const k = (x?.key || x?.name || '') + '';\r

      \      if (k) a[k] = String(x?.value ?? '');\r

      \      return a;\r

      \    }, {});\r

      \    if (typeof h === 'object') return
      Object.fromEntries(Object.entries(h).map(([k, v]) => [k, String(v)]));\r

      \    return {};\r

      \  };\r

      \r

      \  const mask = (k, v) => {\r

      \    const kk = String(k || '').toLowerCase().trim();\r

      \    if (!MASK || !SENSITIVE.has(kk)) return v;\r

      \    if (kk === 'authorization') return 'Bearer ***';\r

      \    const s = String(v ?? '');\r

      \    return s ? `***…${s.slice(-6)}` : '***';\r

      \  };\r

      \r

      \  const fmtHeaders = (h) => Object.entries(headersObj(h))\r

      \    .filter(([k]) => k && !DROP.has(String(k).toLowerCase().trim()))\r

      \    .sort((a, b) =>
      a[0].toLowerCase().localeCompare(b[0].toLowerCase()))\r

      \    .map(([k, v]) => `${k}: ${mask(k, v)}`)\r

      \    .join('\\n');\r

      \r

      \  const hostOf = (u) => {\r

      \    if (!u) return '';\r

      \    try { return new URL(typeof u === 'string' ? u : u.toString()).host;
      }\r

      \    catch { return Array.isArray(u?.host) ? u.host.join('.') :
      String(u?.host || ''); }\r

      \  };\r

      \r

      \  const pathQ = (u) => {\r

      \    if (!u) return '/';\r

      \    const host = hostOf(u);\r

      \    try {\r

      \      const s = typeof u === 'string' ? u : u.toString();\r

      \      const abs = s.startsWith('http') ? s :
      `https://${host}${s.startsWith('/') ? '' : '/'}${s}`;\r

      \      const U = new URL(abs);\r

      \      return U.pathname + (U.search || '');\r

      \    } catch {\r

      \      const p = Array.isArray(u?.path) ? '/' + u.path.join('/') :
      (u?.pathname || '/');\r

      \      const q = u?.query;\r

      \      if (Array.isArray(q) && q.length) {\r

      \        const qs = q\r

      \          .filter(x => x?.key)\r

      \          .map(x =>
      `${encodeURIComponent(x.key)}=${encodeURIComponent(x.value ?? '')}`)\r

      \          .join('&');\r

      \        return qs ? `${p}?${qs}` : p;\r

      \      }\r

      \      if (q && typeof q === 'object') {\r

      \        const qs = Object.entries(q)\r

      \          .filter(([k]) => k)\r

      \          .map(([k, v]) =>
      `${encodeURIComponent(k)}=${encodeURIComponent(v ?? '')}`)\r

      \          .join('&');\r

      \        return qs ? `${p}?${qs}` : p;\r

      \      }\r

      \      return p || '/';\r

      \    }\r

      \  };\r

      \r

      \  const maybeJson = (t) => {\r

      \    const j = jparse(t);\r

      \    return j ? JSON.stringify(j, null, 2) : String(t ?? '');\r

      \  };\r

      \r

      \  const respSlice = (t) => {\r

      \    const j = jparse(t);\r

      \    if (!j) return String(t ?? '');\r

      \    const o = {};\r

      \    if ('data' in j) o.data = j.data;\r

      \    if ('error' in j) o.error = j.error;\r

      \    if ('meta' in j) o.meta = j.meta;\r

      \    return JSON.stringify(o, null, 2);\r

      \  };\r

      \r

      \  const get = () => jparse(pm.variables.get(KEY)) || [];\r

      \  const set = (arr) => pm.variables.set(KEY, JSON.stringify(arr));\r

      \  const add = (sec) => { const arr = get(); arr.push(sec); set(arr); };\r

      \r

      \  const rawReq = (method, url, headers, bodyRaw) => [\r

      \    `${String(method || 'GET').toUpperCase()} ${pathQ(url) || '/'}
      HTTP/1.1`,\r

      \    hostOf(url) ? `Host: ${hostOf(url)}` : null,\r

      \    fmtHeaders(headers) || null,\r

      \    bodyRaw ? `\\n${maybeJson(bodyRaw)}` : null,\r

      \  ].filter(Boolean).join('\\n');\r

      \r

      \  // ===== state =====\r

      \  let __extraHtml = '';\r

      \  const __genEntities = {}; // entKey -> { entityTitle,
      variants:[{id,key,title,text}], order }\r

      \  let __genOrder = 0;\r

      \r

      \  const hasGenerated = () =>\r

      \    Object.keys(__genEntities).some(k =>
      (__genEntities[k]?.variants?.length || 0) > 0);\r

      \r

      \  // ===== text builders =====\r

      \  const mainOnly = () => {\r

      \    const s = get()[0];\r

      \    if (!s) return '';\r

      \    return
      `${s.title}\\n\\n[Request]\\n\\n${s.req}\\n\\n[Response]\\n\\n${s.res}${s\
      .err ? `\\n\\n[Error]\\n\\n${s.err}` : ''}\\n`;\r

      \  };\r

      \r

      \  const subsOnly = () => {\r

      \    const subs = get().slice(1);\r

      \    if (!subs.length) return '';\r

      \    return subs.map(sec =>\r

      \      `${sec.title}\\n\\n[Request]\\n\\n${sec.req}\\n\\n[Response]\\n\\n\
      ${sec.res}${sec.err ? `\\n\\n[Error]\\n\\n${sec.err}` : ''}\\n`\r

      \    ).join('\\n' + '-'.repeat(46) + '\\n\\n');\r

      \  };\r

      \r

      \  // ✅ MAIN copy = Main + Subrequests (if any)\r

      \  const mainCombined = () => {\r

      \    const m = mainOnly();\r

      \    const s = subsOnly();\r

      \    if (!s) return m;\r

      \    return `${m}\\n${'-'.repeat(46)}\\n\\n${s}\\n`;\r

      \  };\r

      \r

      \  // ===== helpers for showGeneratedJson (FIX: existed but missing in
      your code) =====\r

      \  const deepMerge = (a, b) => {\r

      \    if (!b || typeof b !== 'object') return a;\r

      \    const out = Array.isArray(a) ? [...a] : { ...(a || {}) };\r

      \    for (const [k, v] of Object.entries(b)) {\r

      \      if (\r

      \        v && typeof v === 'object' && !Array.isArray(v) &&\r

      \        out[k] && typeof out[k] === 'object' && !Array.isArray(out[k])\r

      \      ) {\r

      \        out[k] = deepMerge(out[k], v);\r

      \      } else {\r

      \        out[k] = v;\r

      \      }\r

      \    }\r

      \    return out;\r

      \  };\r

      \r

      \  const pickBase = (sourceObj) => {\r

      \    if (sourceObj && typeof sourceObj === 'object') {\r

      \      return (sourceObj?.data && typeof sourceObj.data === 'object') ?
      sourceObj.data : sourceObj;\r

      \    }\r

      \    try {\r

      \      const parsed = pm.response.json();\r

      \      return (parsed?.data && typeof parsed.data === 'object') ?
      parsed.data : null;\r

      \    } catch {\r

      \      return null;\r

      \    }\r

      \  };\r

      \r

      \  // helper: response to text\r

      \  const extractResText = (res) => {\r

      \    let resText = '';\r

      \    try { resText = res?.text?.() || ''; } catch {}\r

      \    if (!resText) { try { const j = res?.json?.(); if (j) resText =
      JSON.stringify(j); } catch {} }\r

      \    return resText;\r

      \  };\r

      \r

      \  // ===== render =====\r

      \  const render = () => {\r

      \    const mainText = mainOnly();\r

      \    const subText = subsOnly();\r

      \    const showSubs = !!subText;\r

      \    const showGen = hasGenerated();\r

      \    const combinedText = mainCombined();\r

      \r

      \    const entitiesSorted = Object.entries(__genEntities)\r

      \      .filter(([, ent]) => (ent?.variants?.length || 0) > 0)\r

      \      .sort((a, b) => (a[1].order ?? 0) - (b[1].order ?? 0));\r

      \r

      \    const genHtml = showGen ? entitiesSorted.map(([, ent]) => {\r

      \      const variantsHtml = (ent.variants || []).map(v => `\r

      \        <div class=\"variant-card\">\r

      \          <div class=\"variant-header\">\r

      \            <div class=\"variant-title\">${esc(v.title)}</div>\r

      \            <button class=\"btn small\"
      data-copy=\"${esc(v.id)}\">Copy</button>\r

      \          </div>\r

      \          <textarea id=\"${esc(v.id)}\"
      class=\"hidden-ta\">${esc(v.text)}</textarea>\r

      \          <pre>${esc(v.text)}</pre>\r

      \        </div>\r

      \      `).join('');\r

      \r

      \      return `\r

      \        <div class=\"entity-card\">\r

      \          <div class=\"entity-title\">${esc(ent.entityTitle)}</div>\r

      \          <div class=\"entity-sub\">${(ent.variants || []).length}
      variant(s)</div>\r

      \          <div class=\"variant-grid\">${variantsHtml}</div>\r

      \        </div>\r

      \      `;\r

      \    }).join('') : '';\r

      \r

      \    pm.visualizer.set(`\r

      <style>\r

      \  body{ margin:0; padding:12px; font-family: ui-sans-serif, system-ui,
      -apple-system; background:#f8f9fb; }\r

      \  .row{ display:flex; gap:12px; align-items:stretch; }\r

      \  .col{ flex:1 1 0; min-width:360px; display:flex; flex-direction:column;
      gap:10px; max-height:calc(100vh - 24px); overflow:auto; }\r

      \  .card{ background:#fff; border:1px solid #e6e6e6; border-radius:14px;
      box-shadow:0 1px 2px rgba(0,0,0,0.04); padding:12px; display:flex;
      flex-direction:column; gap:10px; }\r

      \  .header{ display:flex; gap:8px; align-items:center;
      justify-content:space-between; flex-wrap:wrap; }\r

      \  .title{ font-weight:600; font-size:13px; }\r

      \  .btn{ padding:6px 10px; border-radius:10px; border:1px solid #dcdcdc;
      background:#f4f4f4; cursor:pointer; font-size:12px; }\r

      \  .btn:hover{ background:#eaeaea; }\r

      \  .btn.small{ padding:4px 8px; }\r

      \  .msg{ font-family: ui-monospace, Menlo, Monaco, Consolas, monospace;
      font-size:12px; color:#444; }\r

      \  pre{ margin:0; white-space:pre; font-family: ui-monospace, Menlo,
      Monaco, Consolas, monospace; font-size:12px; line-height:1.4;
      overflow:auto; padding-right:6px; }\r

      \  .hidden-ta{ position:absolute; left:-9999px; top:-9999px; }\r

      \r

      \  .entity-card{ border:1px solid #ededed; background:#fafafa;
      border-radius:12px; padding:12px; display:flex; flex-direction:column;
      gap:10px; }\r

      \  .entity-title{ font-weight:600; font-size:13px; }\r

      \  .entity-sub{ color:#777; font-size:12px; }\r

      \  .variant-grid{ display:grid; grid-template-columns:1fr; gap:12px; }\r

      \  .variant-card{ border:1px solid #eaeaea; background:#fff;
      border-radius:10px; padding:10px; display:flex; flex-direction:column;
      gap:8px; }\r

      \  .variant-header{ display:flex; justify-content:space-between;
      align-items:center; gap:10px; }\r

      \  .variant-title{ font-family: ui-monospace, Menlo, Monaco, Consolas,
      monospace; font-size:12px; }\r

      </style>\r

      \r

      <div class=\"row\">\r

      \  <div class=\"col\">\r

      \    <div class=\"card\">\r

      \      <div class=\"header\">\r

      \        <div class=\"title\">Main request</div>\r

      \        <div style=\"display:flex; gap:8px; align-items:center;\">\r

      \          <button class=\"btn\" id=\"copyMainBtn\">Copy</button>\r

      \          <span class=\"msg\" id=\"m1\"></span>\r

      \        </div>\r

      \      </div>\r

      \r

      \      <!-- Copy uses main + subrequests combined -->\r

      \      <textarea id=\"mainAllTa\"
      class=\"hidden-ta\">${esc(combinedText)}</textarea>\r

      \r

      \      <pre>${esc(mainText || '—')}</pre>\r

      \    </div>\r

      \r

      \    ${showSubs ? `\r

      \    <div class=\"card\">\r

      \      <div class=\"header\"><div
      class=\"title\">Subrequests</div></div>\r

      \      <pre>${esc(subText)}</pre>\r

      \    </div>` : ``}\r

      \r

      \    ${__extraHtml ? `<div class=\"card\"><div
      class=\"title\">Extra</div>${__extraHtml}</div>` : ``}\r

      \  </div>\r

      \r

      \  ${showGen ? `\r

      \  <div class=\"col\">\r

      \    <div class=\"card\">\r

      \      <div class=\"header\">\r

      \        <div class=\"title\">Generated JSON</div>\r

      \        <span class=\"msg\" id=\"m3\"></span>\r

      \      </div>\r

      \      ${genHtml}\r

      \    </div>\r

      \  </div>` : ``}\r

      </div>\r

      \r

      <script>\r

      (() => {\r

      \  const msg = (el, t)=>{ if(!el) return; el.textContent=t||''; if(t)
      setTimeout(()=>el.textContent='',1200); };\r

      \r

      \  async function copyFromTa(ta, el){\r

      \    try{\r

      \      const v = ta?.value || '';\r

      \      if(!v) return msg(el,'Nothing to copy');\r

      \      if(navigator.clipboard?.writeText){\r

      \        await navigator.clipboard.writeText(v);\r

      \        return msg(el,'Copied ✅');\r

      \      }\r

      \      ta.focus(); ta.select();\r

      \      msg(el, document.execCommand('copy') ? 'Copied ✅' : 'Copy failed
      ❌');\r

      \    }catch(e){\r

      \      try{ ta.focus(); ta.select(); msg(el, document.execCommand('copy')
      ? 'Copied ✅' : 'Copy failed ❌'); }\r

      \      catch{ msg(el,'Copy failed ❌'); }\r

      \    }\r

      \  }\r

      \r

      \  const m1 = document.getElementById('m1');\r

      \  const mainAllTa = document.getElementById('mainAllTa');\r

      \  const mainBtn = document.getElementById('copyMainBtn');\r

      \  if (mainBtn) mainBtn.onclick = () => copyFromTa(mainAllTa, m1);\r

      \r

      \  const m3 = document.getElementById('m3');\r

      \  document.querySelectorAll('button[data-copy]').forEach(btn => {\r

      \    btn.addEventListener('click', () => {\r

      \      const id = btn.getAttribute('data-copy');\r

      \      const ta = document.getElementById(id);\r

      \      if (!ta) return msg(m3, 'Not found');\r

      \      copyFromTa(ta, m3);\r

      \    });\r

      \  });\r

      })();\r

      </script>\r

      `);\r

      \  };\r

      \r

      \  // ===== INIT MAIN =====\r

      \  set([]);\r

      \  add({\r

      \    title: pm.info.requestName || 'Main request',\r

      \    key: 'MAIN',\r

      \    req: rawReq(\r

      \      pm.request.method,\r

      \      pm.request.url,\r

      \      pm.request.headers,\r

      \      pm.request.body?.mode === 'raw' ? pm.request.body.raw : ''\r

      \    ),\r

      \    res: respSlice(pm.response.text()),\r

      \    err: ''\r

      \  });\r

      \  render();\r

      \r

      \  // ===== Public API =====\r

      \  return {\r

      \    // extra blocks (not [Request]/[Response])\r

      \    displayResponse(title, data) {\r

      \      const safe = esc(JSON.stringify(data ?? {}, null, 2));\r

      \      __extraHtml += `\r

      <div class=\"entity-card\" style=\"background:#fff;\">\r

      \  <div class=\"variant-header\">\r

      \    <div class=\"variant-title\">${esc(title || 'Result')}</div>\r

      \  </div>\r

      \  <pre>${safe}</pre>\r

      </div>`;\r

      \      render();\r

      \    },\r

      \r

      \    // append subrequest (always adds new)\r

      \    logSubRequest({ title, req, res, err }) {\r

      \      const reqRaw = rawReq(\r

      \        req?.method,\r

      \        req?.url,\r

      \        req?.header || req?.headers,\r

      \        req?.body?.raw || (typeof req?.body === 'string' ? req.body :
      '')\r

      \      );\r

      \r

      \      const resText = extractResText(res);\r

      \r

      \      add({\r

      \        title: title || 'Sub request',\r

      \        key: '',\r

      \        req: reqRaw,\r

      \        res: respSlice(resText),\r

      \        err: err?.message || (err ? String(err) : '')\r

      \      });\r

      \r

      \      render();\r

      \    },\r

      \r

      \    // ✅ UPSERT subrequest (replace existing by key) -> for retries (e.g.
      Get job)\r

      \    logSubRequestUpsert({ key, title, req, res, err }) {\r

      \      const k = String(key || '').trim();\r

      \      if (!k) return this.logSubRequest({ title, req, res, err });\r

      \r

      \      const reqRaw = rawReq(\r

      \        req?.method,\r

