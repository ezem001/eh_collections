scripts:
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const id = uuid.v4();\r

      pm.globals.set(\"specimen_id\", id);"
    language: text/javascript
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      console.log('create Specimen sign content', resData)\r

      \r

      pm.test(`Specimen content sign success. Response status is 200
      ${JSON.stringify(resData, null, 2)}`, function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      \    pm.expect(resData).to.have.property('signed_content');\r

      \    pm.globals.set('specimen_signed_content', resData.signed_content);\r

      });\r

      \r\n"
    language: text/javascript
order: 1000
