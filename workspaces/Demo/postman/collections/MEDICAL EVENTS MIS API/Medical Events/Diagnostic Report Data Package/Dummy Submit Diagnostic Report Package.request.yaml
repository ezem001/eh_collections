scripts:
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const diagnosticReportId = uuid.v4();\r

      \r

      pm.globals.set(\"diagnostic_report_id\", diagnosticReportId);"
    language: text/javascript
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      console.log('create diagnostic report sign content', resData)\r

      \r

      pm.test(`Diagnostic report content sign success. Response status is 200
      ${JSON.stringify(resData, null, 2)}`, function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      \    pm.expect(resData).to.have.property('signed_content');\r

      \    pm.globals.set('diagnostic_report_signed_content',
      resData.signed_content);\r

      });"
