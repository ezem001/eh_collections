scripts:
  - type: afterResponse
    code: "const personFromEpisode = pm.globals.get('patient_id_from_episode') ||
      \"\";//або підставте id потрібного пацієнта!!!!\r

      const xCustomPsk = pm.globals.get('x-custom-psk');\r

      const apiKey = pm.environment.get('mis_client_secret');\r

      const host = pm.globals.get('host');\r

      const accessToken = pm.environment.get('access_token');\r

      \r

      const ENCOUNTER_ID = \"4038331d-adf4-4fb3-b376-fbb8907d00e7\";\r

      const isCancelNotAllEncounter = true;\r

      \r

      const RESOURCE_IDS = {\r

      \    conditions: [\"\"],\r

      \    observations: [\"897d5645-f090-4307-8a8e-9a34b4f86723\"],\r

      \    allergy_intolerances: [\"\"],\r

      \    immunizations: [\"359429cf-0094-45bb-9df8-cd8c689b215c\"],\r

      \    risk_assessments: [\"\"],\r

      \    devices: [\"\"],\r

      \    medication_statements: [\"\"],\r

      \    medication_administrations: [\"\"],\r

      \    diagnostic_reports: [\"\"],\r

      \    procedures: [\"\"],\r

      \    clinical_impressions: [\"\"],\r

      \    specimens: [\"\"],\r

      \    device_dispenses: [\"\"],\r

      \    device_associations: [\"\"],\r

      \    detected_issues: [\"\"]\r

      };\r

      \r

      function sendRequest(url, callback) {\r

      \    pm.sendRequest({\r

      \        url,\r

      \        method: \"GET\",\r

      \        header: {\r

      \            \"Content-Type\": \"application/json\",\r

      \            \"api-key\": apiKey,\r

      \            \"Authorization\": `Bearer ${accessToken}`,\r

      \            \"X-Custom-PSK\": xCustomPsk\r

      \        }\r

      \    }, callback);\r

      }\r

      \r

      function getTargetStatus() {\r

      \    return isCancelNotAllEncounter ? \"finished\" :
      \"entered_in_error\";\r

      }\r

      \r

      function getAffectedResourceNames(resourceMap) {\r

      \    return Object.entries(resourceMap)\r

      \        .filter(([_, ids]) => Array.isArray(ids) && ids.some(id => id))\r

      \        .map(([type]) => type);\r

      }\r

      \r

      function buildExplanatoryLetter(resourceMap) {\r

      \    const resources = getAffectedResourceNames(resourceMap);\r

      \r

      \    if (!resources.length) return \"No resources specified\";\r

      \r

      \    return `Cancel: ${resources.join(\", \")}`;\r

      }\r

      \r

      \r

      \r

      function cleanResourceByType(type, resource) {\r

      \    const { inserted_at, updated_at, ...base } = resource.data;\r

      \r

      \    switch (type) {\r

      \        case \"conditions\":\r

      \            // Треба залишити verification_status і оновити його
      значення\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    verification_status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"observations\":\r

      \            delete base.interpretation;\r

      \            delete base.verification_status;\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"immunizations\":\r

      \            delete base.reactions;\r

      \            delete base.verification_status;\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"procedures\":\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        default:\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \    }\r

      }\r

      \r

      function getResourceUrl(resourceTypePlural, id) {\r

      \    return
      `${host}/api/patients/${personFromEpisode}/${resourceTypePlural}/${id}`;\r

      }\r

      \r

      function buildDisplayOutput(encounter, relatedResources) {\r

      \    const output = {\r

      \        encounter,\r

      \        ...relatedResources\r

      \    };\r

      \    pm.globals.set(\"Encounter_Full_Cancellation_Body\",
      JSON.stringify(output));\r

      \    displayResponse(\"🧾 Combined Encounter Cancellation Body\",
      output);\r

      }\r

      \r

      function displayResponse(title, data) {\r

      \    const html = `\r

      \    <h1>${title}</h1>\r

      \    <pre>${JSON.stringify(data, null, 2)}</pre>\r

      \  `;\r

      \    pm.visualizer.set(html);\r

      \    console.log(title, data);\r

      }\r

      \r

      let encounterCleaned = null;\r

      const cleanedResources = {};\r

      let pendingCount = 1;\r

      \r

      function checkAllDone() {\r

      \    if (--pendingCount === 0) {\r

      \        buildDisplayOutput(encounterCleaned, cleanedResources);\r

      \    }\r

      }\r

      \r

      // Get Encounter\r

      sendRequest(getResourceUrl(\"encounters\", ENCOUNTER_ID), (err, res) =>
      {\r

      \    if (!err && res.code === 200) {\r

      \        const data = res.json().data;\r

      \        const { hospitalization, incoming_referral, inserted_at,
      updated_at, diagnoses, ...rest } = data;\r

      \        rest.diagnoses = Array.isArray(diagnoses)\r

      \            ? diagnoses.map(({ code, ...diagRest }) => diagRest)\r

      \            : [];\r

      \        encounterCleaned = {\r

      \            ...rest,\r

      \            status: getTargetStatus(),\r

      \            cancellation_reason: {\r

      \                coding: [\r

      \                    {\r

      \                        system: \"eHealth/cancellation_reasons\",\r

      \                        code: \"typo\"\r

      \                    }\r

      \                ]\r

      \            },\r

      \            explanatory_letter: isCancelNotAllEncounter\r

      \                ? buildExplanatoryLetter(RESOURCE_IDS)\r

      \                : \"Cancel encounter data package\"\r

      \        };\r

      \    } else {\r

      \        console.error(\"❌ Failed to fetch Encounter\", err);\r

      \    }\r

      \    checkAllDone();\r

      });\r

      \r

      // Related Resources\r

      Object.entries(RESOURCE_IDS).forEach(([pluralType, ids]) => {\r

      \    ids.forEach(id => {\r

      \        if (!id) return;\r

      \        pendingCount++;\r

      \        sendRequest(getResourceUrl(pluralType, id), (err, res) => {\r

      \            if (!err && res.code === 200) {\r

      \                const cleaned = cleanResourceByType(pluralType,
      res.json());\r

      \                cleanedResources[pluralType] =
      cleanedResources[pluralType] || [];\r

      \                cleanedResources[pluralType].push(cleaned.data);\r

      \            } else {\r

      \                console.warn(`⚠️ Skipped ${pluralType} (${id})`, err);\r

      \            }\r

      \            checkAllDone();\r

      \        });\r

      \    });\r

      });\r\n"
    language: text/javascript
order: 4000
