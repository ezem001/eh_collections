      \    .split('_')\r

      \    .filter(Boolean)\r

      \    .map(p => p.charAt(0).toUpperCase() + p.slice(1))\r

      \    .join(' ');\r

      \r

      const toEntityKey = (s) =>\r

      \  String(s || '')\r

      \    .trim()\r

      \    .toLowerCase();\r

      \r

      const toEntityLabel = (s) =>\r

      \  String(s || '')\r

      \    .trim()\r

      \    .replaceAll('_', ' ')\r

      \    .replace(/\\b\\w/g, (c) => c.toUpperCase())\r

