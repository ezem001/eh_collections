      if (resData?.error) {\r

      \  console.error(`${resourceLabel} Response Error Details:`,
      resData.error);\r

      \  pm.test(`${resourceLabel} Response has no error`, () => {\r

      \    throw new Error('Initial response contains error');\r

      \  });\r

      \  throw new Error('Initial response contains error');\r

      }\r

      \r

      // ---- Extract jobId from href ----\r

      const href = resData?.data?.links?.[0]?.href;\r

      if (!href || !href.includes('/jobs/')) {\r

      \  console.error(`${resourceLabel} Job Link Missing`, {\r

      \    expected: 'res.data.links[0].href containing \"/jobs/\"',\r

      \    got: href,\r

      \    responseData: resData?.data\r

      \  });\r

      \  pm.test(`${resourceLabel} Job href exists`, () => {\r

      \    throw new Error('Job href not found in response');\r

      \  });\r

      \  throw new Error('Job href not found in response');\r

      }\r

      \r

      const jobId = href.split('/jobs/')[1];\r

      console.log('Extracted jobId:', jobId);\r

      pm.globals.set('extracted_job_id', jobId);\r

      \r

      // ---- Retry control ----\r

      const MAX_RETRIES = 3;\r

      const RETRY_DELAY_MS = 1000;\r

      pm.environment.set('retryCount', 0);\r

      \r

      // ---- Request builder ----\r

      function buildJobCheckRequest(jobId) {\r

      \  const host = pm.globals.get('host');\r

      \  if (!host) throw new Error('pm.globals.host is not set');\r

      \r

      \  return {\r

      \    method: 'GET',\r

      \    url: `${host}/api/jobs/${jobId}`,\r

      \    header: {\r

      \      'Content-Type': 'application/json',\r

      \      'Authorization': `Bearer ${pm.environment.get('access_token')}`,\r

      \      'api-key': `${pm.environment.get('mis_client_secret')}`,\r

      \      'X-Custom-PSK': `${pm.globals.get('x-custom-psk')}`\r

      \    }\r

      \  };\r

      }\r

      \r

      // ---- Links -> globals ----\r

      function writeLinksToGlobals(linksArray) {\r

      \  const linksByEntity = (linksArray || []).reduce((acc, link) => {\r

      \    const entity = toEntityKey(link?.entity);\r

      \    const href = link?.href;\r

      \    if (!entity || !href) return acc;\r

      \r

      \    const id = href.split('/').pop();\r

      \    if (!id) return acc;\r

      \r

      \    acc[entity] = acc[entity] || [];\r

      \    acc[entity].push(id);\r

      \    return acc;\r

      \  }, {});\r

      \r

      \  Object.entries(linksByEntity).forEach(([entity, ids]) => {\r

      \    const entityLabel = toEntityLabel(entity);\r

      \r

      \    ids.forEach((id, idx) => {\r

      \      const globalName = ids.length === 1\r

      \        ? `job${entityLabel}ID`\r

      \        : `job${entityLabel}ID_${idx + 1}`;\r

      \      pm.globals.set(globalName, id);\r

      \    });\r

      \  });\r

      \r

      \  return linksByEntity;\r

      }\r

      \r

      // ---- Poll job status ----\r

      function checkJobStatus(jobId) {\r

      \  let req;\r

      \  try {\r

      \    req = buildJobCheckRequest(jobId);\r

      \  } catch (e) {\r

      \    console.error(`${resourceLabel} Job Config Error:`, e.message);\r

      \    pm.test(`${resourceLabel} Job Config`, () => { throw e; });\r

      \    return;\r

      \  }\r

      \r

      \  pm.sendRequest(req, (err, res) => {\r

      \    if (err) {\r

      \      // log even on transport error\r

      \      if (typeof logSubRequest === 'function') {\r

      \        logSubRequest({ title: 'Get job', req, res, err });\r

      \      }\r

      \      console.error(`${resourceLabel} Job Request Error:`,
      err.message);\r

      \      pm.test(`${resourceLabel} Job Request`, () => { throw err; });\r

      \      return;\r

      \    }\r

      \r

      \    pm.test(`${resourceLabel} job check response is 200 or 303`, () =>
      {\r

      \      pm.expect([200, 303]).to.include(res.code);\r

      \    });\r

      \r

      \    const body = res.json?.() || {};\r

      \    const status = body?.data?.status;\r

      \    console.log(`${resourceLabel} Job Status:`, status);\r

      \r

      \    if (status === 'processed') {\r

      \      // keep your expectation if needed; change to 200 if your API
      returns 200\r

      \      pm.test(`${resourceLabel} Job Processed (303 expected)`, () => {\r

      \        pm.expect(res.code).to.eql(303);\r

      \      });\r

      \r

      \      // links -> globals (if exist)\r

      \      writeLinksToGlobals(body?.data?.links);\r

      \r

      \      // ---- approval id (if this job type returns it) ----\r

      \      const approvalId = body?.data?.response_data?.id;\r

      \      if (approvalId) {\r

      \        pm.globals.set('jobApprovalID', approvalId);\r

      \r

      \        // ✅ REQUIRED: log AFTER setting jobApprovalID\r

      \        if (typeof logSubRequest === 'function') {\r

      \          logSubRequest({ title: 'Get job', req, res, err });\r

      \        }\r

      \      } else {\r

      \        console.warn('approvalId not found at
      body.data.response_data.id');\r

      \r

      \        // still log processed job\r

      \        if (typeof logSubRequest === 'function') {\r

      \          logSubRequest({ title: 'Get job', req, res, err });\r

      \        }\r

      \      }\r

      \r

      \      return;\r

      \    }\r

      \r

      \    // retry path\r

      \    const retryCount = Number(pm.environment.get('retryCount')) || 0;\r

      \r

      \    if (retryCount < MAX_RETRIES) {\r

      \      const next = retryCount + 1;\r

      \      pm.environment.set('retryCount', next);\r

      \      console.log(`Retrying ${resourceLabel} job... Attempt ${next}`);\r

      \r

      \      setTimeout(() => checkJobStatus(jobId), RETRY_DELAY_MS);\r

      \      return;\r

      \    }\r

      \r

      \    console.warn(`❌ Max retries reached for ${resourceLabel} job.`);\r

      \r

      \    // final log\r

      \    if (typeof logSubRequest === 'function') {\r

      \      logSubRequest({ title: 'Get job (final)', req, res, err });\r

      \    }\r

      \r

      \    // fail test if not processed\r

      \    pm.test(`${resourceLabel} Job was processed`, () => {\r

      \      pm.expect(status, `Final status: ${status}`).to.eql('processed');\r

      \    });\r

      \  });\r

      }\r

      \r

      // ---- start ----\r

      checkJobStatus(jobId);\r

      \r

      \r

      \r

      /***********************\r

      \ * Minimal Visualizer HTTP Log (Notebook style)\r

      \ * Fixes:\r

      \ * - no duplicate request name (remove global header)\r

      \ * - drop \"host\" header duplicate (keep only Host: line)\r

      \ ***********************/\r

      \r

      // ---- Config ----\r

      const MASK_SENSITIVE = true;\r

      const SENSITIVE_HEADERS = new Set([\r

      \    'authorization', 'api-key', 'x-custom-psk', 'cookie'\r

      ]);\r

      \r

      // Headers to drop from [Request]\r

      const DROP_REQUEST_HEADERS = new Set([\r

      \    'accept',\r

      \    'accept-encoding',\r

      \    'connection',\r

      \    'content-type',\r

      \    'postman-token',\r

      \    'user-agent',\r

      \    'content-length',\r

      \    'host' // <-- щоб не було дубля Host\r

      ]);\r

      \r

      // ---- Helpers ----\r

      function esc(s) {\r

      \    return String(s ?? '')\r

      \        .replaceAll('&', '&amp;')\r

      \        .replaceAll('<', '&lt;')\r

      \        .replaceAll('>', '&gt;');\r

      }\r

      \r

      function safeJsonParse(text) {\r

      \    try { return JSON.parse(text); } catch { return null; }\r

      }\r

      \r

      function normalizeHeaders(headersObjOrArr) {\r

      \    const out = {};\r

      \    if (!headersObjOrArr) return out;\r

      \r

      \    if (typeof headersObjOrArr?.toObject === 'function') {\r

      \        return headersObjOrArr.toObject();\r

      \    }\r

      \r

      \    if (Array.isArray(headersObjOrArr)) {\r

      \        headersObjOrArr.forEach(h => {\r

      \            if (!h) return;\r

      \            const k = (h.key || h.name || '').toString();\r

      \            const v = (h.value ?? '').toString();\r

      \            if (k) out[k] = v;\r

      \        });\r

      \        return out;\r

      \    }\r

      \r

      \    if (typeof headersObjOrArr === 'object') {\r

      \        Object.keys(headersObjOrArr).forEach(k => out[k] =
      String(headersObjOrArr[k]));\r

      \    }\r

      \r

      \    return out;\r

      }\r

      \r

      function shouldDropHeader(k) {\r

      \    const key = String(k || '').toLowerCase().trim();\r

      \    if (!key) return true;\r

      \    return DROP_REQUEST_HEADERS.has(key);\r

      }\r

      \r

      function maskHeaderValue(key, value) {\r

      \    if (!MASK_SENSITIVE) return value;\r

      \r

      \    const k = String(key || '').toLowerCase().trim();\r

      \    if (!SENSITIVE_HEADERS.has(k)) return value;\r

      \r

      \    if (k === 'authorization') return 'Bearer ***';\r

      \    if (!value) return '***';\r

      \r

      \    const tail = value.length > 6 ? value.slice(-6) : value;\r

      \    return `***…${tail}`;\r

      }\r

      \r

      function formatRequestHeaders(headers) {\r

      \    const obj = normalizeHeaders(headers);\r

      \    const keys = Object.keys(obj)\r

      \        .filter(k => !shouldDropHeader(k))\r

      \        .sort((a, b) =>
      a.toLowerCase().localeCompare(b.toLowerCase()));\r

      \r

      \    if (!keys.length) return '';\r

      \    return keys.map(k => `${k}: ${maskHeaderValue(k,
      obj[k])}`).join('\\n');\r

      }\r

      \r

      function getHost(url) {\r

      \    if (!url) return '';\r

      \    if (typeof url === 'string') {\r

      \        try { return new URL(url).host; } catch { return ''; }\r

      \    }\r

      \    if (url.host) {\r

      \        if (Array.isArray(url.host)) return url.host.join('.');\r

      \        return String(url.host);\r

      \    }\r

      \    if (url.toString) {\r

      \        try { return new URL(url.toString()).host; } catch { return '';
      }\r

      \    }\r

      \    return '';\r

      }\r

      \r

      function getPathWithQuery(url) {\r

      \    if (!url) return '/';\r

      \r

      \    if (typeof url === 'string') {\r

      \        try {\r

      \            const u = new URL(url);\r

      \            return u.pathname + (u.search || '');\r

      \        } catch {\r

      \            return url;\r

      \        }\r

      \    }\r

      \r

      \    const path = Array.isArray(url.path) ? '/' + url.path.join('/') :
      (url.pathname || '/');\r

      \r

      \    if (Array.isArray(url.query) && url.query.length) {\r

      \        const qs = url.query\r

      \            .filter(q => q && q.key)\r

      \            .map(q =>
      `${encodeURIComponent(q.key)}=${encodeURIComponent(q.value ?? '')}`)\r

      \            .join('&');\r

      \        return `${path}?${qs}`;\r

      \    }\r

      \r

      \    return path || '/';\r

      }\r

      \r

      function getPmRequestBody(pmReq) {\r

      \    try {\r

      \        const body = pmReq?.body;\r

      \        if (!body) return '';\r

      \        if (body.mode === 'raw') return body.raw || '';\r

      \        return '';\r

      \    } catch {\r

      \        return '';\r

      \    }\r

      }\r

      \r

      function stringifyMaybeJson(text) {\r

      \    if (!text) return '';\r

      \    const j = safeJsonParse(text);\r

      \    return j ? JSON.stringify(j, null, 2) : text;\r

      }\r

      \r

      function responseDataMetaOnly(text) {\r

      \    const j = safeJsonParse(text);\r

      \    if (!j) return text;\r

      \r

      \    const out = {\r

      \        data: Object.prototype.hasOwnProperty.call(j, 'data') ? j.data :
      undefined,\r

      \        error: Object.prototype.hasOwnProperty.call(j, 'error') ? j.error
      : undefined,\r

      \        meta: Object.prototype.hasOwnProperty.call(j, 'meta') ? j.meta :
      undefined\r

      \    };\r

      \    Object.keys(out).forEach(k => out[k] === undefined && delete
      out[k]);\r

      \r

      \    return JSON.stringify(out, null, 2);\r

      }\r

      \r

      function buildRawRequest({ method, url, headers, body }) {\r

      \    const host = getHost(url);\r

      \    const path = getPathWithQuery(url);\r

      \r

      \    const headerText = formatRequestHeaders(headers);\r

      \    const bodyText = body ? stringifyMaybeJson(body) : '';\r

      \r

      \    return [\r

      \        `${(method || 'GET').toUpperCase()} ${path || '/'} HTTP/1.1`,\r

      \        host ? `Host: ${host}` : null,\r

      \        headerText || null,\r

      \        bodyText ? `\\n${bodyText}` : null\r

      \    ].filter(Boolean).join('\\n');\r

      }\r

      \r

      // Response WITHOUT \"HTTP/1.1 200\"\r

      function buildRawResponseBodyOnly({ bodyText }) {\r

      \    return responseDataMetaOnly(bodyText || '');\r

      }\r

      \r

      // ---- Log storage ----\r

      const LOG_KEY = '__viz_http_sections__';\r

      \r

      function getSections() {\r

      \    const raw = pm.variables.get(LOG_KEY);\r

      \    const parsed = raw ? safeJsonParse(raw) : null;\r

      \    return Array.isArray(parsed) ? parsed : [];\r

      }\r

      \r

      function setSections(sections) {\r

      \    pm.variables.set(LOG_KEY, JSON.stringify(sections));\r

      }\r

      \r

      function addSection(section) {\r

      \    const sections = getSections();\r

      \    sections.push(section);\r

      \    setSections(sections);\r

      }\r

      \r

      function buildAllLogText() {\r

      \    const sections = getSections();\r

      \r

      \    // ❗️НЕ додаємо глобальний title зверху — щоб не дублювалось\r

      \    return sections.map(sec => {\r

      \        const parts = [];\r

      \        parts.push(`${sec.title || 'Request'}\\n`);\r

      \r

      \        if (sec.requestRaw)
      parts.push(`[Request]\\n\\n${sec.requestRaw}\\n`);\r

      \        if (sec.responseRaw)
      parts.push(`\\n[Response]\\n\\n${sec.responseRaw}\\n`);\r

      \        if (sec.error) parts.push(`\\n[Error]\\n\\n${sec.error}\\n`);\r

      \r

      \        return parts.join('\\n');\r

      \    }).join('\\n' + '-'.repeat(46) + '\\n\\n');\r

      }\r

      \r

      function render() {\r

      \    const allText = buildAllLogText();\r

      \r

      \    const html = `\r

      <div style=\"display:flex; gap:8px; align-items:center;
      margin-bottom:8px;\">\r

      \  <button id=\"copyAllBtn\">Copy all</button>\r

      \  <span id=\"copyMsg\" style=\"font-family: ui-monospace, SFMono-Regular,
      Menlo, Monaco, Consolas, monospace; font-size:12px;\"></span>\r

      </div>\r

      \r

      <textarea id=\"allLogText\" style=\"position:absolute; left:-9999px;
      top:-9999px;\">${esc(allText)}</textarea>\r

      \r

      <pre style=\"margin:0; white-space:pre; font-family: ui-monospace,
      SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px;
      line-height: 1.35;\">\r

      ${esc(allText)}\r

      </pre>\r

      \r

      <script>\r

      \  (function() {\r

      \    const btn = document.getElementById('copyAllBtn');\r

      \    const msg = document.getElementById('copyMsg');\r

      \    const ta  = document.getElementById('allLogText');\r

      \r

      \    function setMsg(t) {\r

