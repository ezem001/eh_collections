$kind: http-request
url: "{{host}}/api/medication_requests/{{medication_req_id}}/actions/qualify"
method: POST
headers:
  Content-Type: application/json
  api-key: "{{mis_client_secret}}"
  Authorization: Bearer {{access_token}}
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: "{\r

    \  \"division_id\": \"{{user_division_id}}\",\r

    \  \"programs\": [\r

    \    {\r

    \      \"id\": \"f01d0d8c-bccb-4bde-a6c6-f4b873a005c2\"\r

    \    }\r

    \  ]\r

    }"
scripts:
  - type: afterResponse
    code: "const res = pm.response.json();\r

      \r

      // --- Перевірки базових умов ---\r

      pm.test(\"Status code is 200\", () => {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });\r

      \r

      pm.test(\"Medication Request status is VALID\", () => {\r

      \    const status = res.data?.[0]?.status;\r

      \    pm.expect(status).to.eql(\"VALID\");\r

      });\r

      \r

      // --- Визначаємо індекс participant ---\r

      const participantIndex =
      parseInt(pm.environment.get(\"participant_index\") || \"0\", 10);\r

      const participant = res.data?.[0]?.participants?.[participantIndex];\r

      \r

      if (!participant) {\r

      \    console.error(`❌ No participant found at index
      ${participantIndex}`);\r

      } else {\r

      \    console.log(`✅ Using participant[${participantIndex}]`,
      participant);\r

      \r

      \    // --- Збереження ідентифікаторів ---\r

      \    pm.globals.set(\"program_id_qualify_medication_request\",
      res.data[0].program_id);\r

      \    pm.globals.set(\"medication_id_qualify_medication_request\",
      participant.medication_id);\r

      \    pm.globals.set(\"program_medication_id_qualify_medication_request\",
      participant.id);\r

      \r

      \    // --- Отримання потрібних значень ---\r

      \    const sellPrice = participant.consumer_price ?? 0;\r

      \    const reimbursementAmount = participant.reimbursement_amount ?? 0;\r

      \r

      \    // --- Розрахунок суми продажу ---\r

      \    let sellAmount = sellPrice;\r

      \r

      \    // --- Якщо sellAmount = 0 або < 0 → ставимо 1 ---\r

      \    if (sellAmount <= 0) {\r

      \        console.warn(`⚠️ sellAmount (${sellAmount}) ≤ 0 → встановлено
      мінімум 1`);\r

      \        sellAmount = 1;\r

      \    }\r

      \r

      \    // --- Конвертація у формат з двома знаками ---\r

      \    const sellAmountFixed = sellAmount.toFixed(2);\r

      \    const discountAmount = reimbursementAmount.toFixed(2);\r

      \r

      \    // --- Збереження у глобальні змінні ---\r

      \    pm.globals.set(\"sell_price_calc\", sellPrice.toFixed(2));\r

      \    pm.globals.set(\"sell_amount_calc\", sellAmountFixed);\r

      \    pm.globals.set(\"discount_amount_calc\", discountAmount);\r

      \r

      \    console.info({\r

      \        participantIndex,\r

      \        sell_price_calc: sellPrice.toFixed(2),\r

      \        sell_amount_calc: sellAmountFixed,\r

      \        discount_amount_calc: discountAmount\r

      \    });\r

      }\r\n"
    language: text/javascript
  - type: beforeRequest
    code: "pm.environment.set(\"original_access_token\",
      pm.environment.get(\"access_token\"));\r

      pm.environment.set(\"original_user_division_id\",
      pm.environment.get(\"user_division_id\"));\r

      \r

      const pharmacyToken = \"ckJ6bnRMY3M1SHlJY1ZTbTRnaHlSdz09\";\r

      const pharmacyDivision = \"2bb9f35c-711f-4bdf-a69f-0d4fab0d2076\"\r

      \r

      pm.environment.set(\"access_token\", pharmacyToken);\r

      pm.environment.set(\"user_division_id\", pharmacyDivision);\r

      console.log(\"✅ Temporary token set for this request:\", pharmacyToken);"
    language: text/javascript
order: 40000
