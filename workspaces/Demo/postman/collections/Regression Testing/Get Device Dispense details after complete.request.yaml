scripts:
  - type: afterResponse
    code: "pm.test(\"Get Device Dispense details - PASS. Status code is 200\",
      function () {\r

      \    pm.response.to.have.status(200);\r

      \r

      \r

      \    // Keys to restore\r

      \    const keys = [\"access_token\", \"user_division_id\", \"user_id\"];\r

      \r

      \    // Restore saved values\r

      \    keys.forEach(key => {\r

      \        const original = pm.environment.get(`original_${key}`);\r

      \        if (original !== undefined) {\r

      \            pm.environment.set(key, original);\r

      \        }\r

      \    });\r

      \r

      \    // // Cleanup\r

      \    // keys.forEach(key => pm.environment.unset(`original_${key}`));\r

      \r

      \r

      \    setTimeout(() => {\r

      \        console.log(\"♻ User credentials restored.\");\r

      \    }, 5000)\r

      \r

      \r

      \r

      });\r

      \r

      \r

      pm.test(\"Device dispense status is completed\", function () {\r

      \    const json = pm.response.json();\r

      \r

      \    pm.expect(json).to.have.property(\"data\");\r

      \    pm.expect(json.data).to.have.property(\"status\");\r

      \    pm.expect(json.data.status).to.eql(\"completed\");\r

      });"
