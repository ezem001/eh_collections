$kind: http-request
url: "{{host}}/api/patients/composition/{{JobCompositionID}}/sign"
method: PATCH
headers:
  api-key: "{{mis_client_secret}}"
  Authorization: Bearer {{access_token}}
  Content-Type: application/json
  x-custom-psk: "{{x-custom-psk}}"
body:
  type: json
  content: "{\r

    \  \"data\": \"{{composition_signed_content}}\"\r

    }"
scripts:
  - type: afterResponse
    code: |-
      const resData = pm.response.json();


      pm.test("Sign Composition - PASS. Status code is 200", function () {
          pm.response.to.have.status(200);

          const resId = resData.data?.id;
          pm.globals.set('creatCompositionJobId', resId)

      });
    language: text/javascript
  - type: beforeRequest
    code: "// Отримуємо ContentForSign із глобальних змінних\r

      const contentForSign = pm.globals.get('ContentForSign');\r

      \r

      if (!contentForSign) {\r

      \    console.error(\"Error: ContentForSign is not set in global
      variables.\");\r

      } else {\r

      \    // Функція для надсилання контенту на підпис\r

      \    function sendDataToSign(contentForSign) {\r

      \        const localServerUrl =
      'http://localhost:3000/create-composition-signed-content';\r

      \r

      \        const requestData = {\r

      \            method: 'POST',\r

      \            url: localServerUrl,\r

      \            header: {\r

      \                'Content-Type': 'application/json',\r

      \            },\r

      \            body: {\r

      \                mode: 'raw',\r

      \                raw: contentForSign // Використовуємо JSON-рядок із
      глобальних змінних\r

      \            }\r

      \        };\r

      \r

      \        // Відправляємо запит на локальний сервер\r

      \        pm.sendRequest(requestData, function (err, res) {\r

      \            if (err) {\r

      \                console.error('Error sending request to local server:',
      err);\r

      \            } else {\r

      \                console.log('Response from local server:', res.json());\r

      \                const responseBody = res.json();\r

      \r

      \                pm.test(`Sign Composition content. Response status is 200
      ${JSON.stringify(responseBody, null, 2)}`, function () {\r

      \                    pm.expect(res.code).to.eql(200);\r

      \                    pm.expect(responseBody).to.have.property('signed_con\
      tent');\r

      \r

      \                    // Зберігаємо підписаний контент у глобальні змінні\r

      \                    pm.globals.set('composition_signed_content',
      responseBody.signed_content);\r

      \                });\r

      \            }\r

      \        });\r

      \    }\r

      \r

      \    // Викликаємо функцію з отриманими даними\r

      \    sendDataToSign(contentForSign);\r

      }\r\n"
    language: text/javascript
order: 87000
