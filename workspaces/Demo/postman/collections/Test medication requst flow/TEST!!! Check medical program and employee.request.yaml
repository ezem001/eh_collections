scripts:
  - type: afterResponse
    code: "// =====================\r

      // Shorter version, same behavior (no quality loss)\r

      // =====================\r

      const mpData = pm.response?.json()?.data;\r

      pm.globals.set(\"medical_program_data\", JSON.stringify(mpData));\r

      const { generateEncounterJson } =
      pm.require(\"@winter-zodiac-949553/generate\");\r

      \r

      let selectedCode = \"\";\r

      const env = (k) => pm.environment.get(k);\r

      const gset = (k, v) => pm.globals.set(k, v);\r

      const A = (v) => (Array.isArray(v) ? v : []);\r

      const isAllowed = (list, v) =>\r

      \  list === null || list === undefined || !Array.isArray(list) ||
      list.length === 0 || list.includes(v);\r

      const esc = (x) => String(x ?? \"\").replace(/[&<>\"']/g, (m) => ({
      \"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#0\
      39;\" }[m]));\r

      \r

      function recommendations(s = {}) {\r

      \  const pick = (k) => (s[k] === null || s[k] === undefined ? undefined :
      s[k]);\r

      \  const out = [];\r

      \  const add = (x) => x && out.push(x);\r

      \  add(pick(\"care_plan_required\") !== undefined ?
      (pick(\"care_plan_required\") ? \"Порада: потрібен план лікування.\" :
      \"Порада: план лікування не обовʼязковий.\") : null);\r

      \  add(pick(\"skip_employee_validation\") !== undefined ?
      (pick(\"skip_employee_validation\") ? \"Порада: перевірка співробітника
      вимкнена.\" : \"Порада: перевірка співробітника увімкнена.\") : null);\r

      \  add(pick(\"multi_medication_dispense_allowed\") !== undefined ?
      (pick(\"multi_medication_dispense_allowed\") ? \"Порада: дозволено
      часткове погашення.\" : \"Порада: часткове погашення не дозволено.\") :
      null);\r

      \  add(pick(\"skip_medication_dispense_sign\") !== undefined ?
      (pick(\"skip_medication_dispense_sign\") ? \"Порада: підпис при погашенні
      не потрібен.\" : \"Порада: підпис при погашенні потрібен.\") : null);\r

      \  const notif = pick(\"request_notification_disabled\") ??
      pick(\"medication_request_notification_disabled\");\r

      \  add(notif !== undefined ? (notif ? \"Порада: сповіщення пацієнта
      вимкнено.\" : \"Порада: сповіщення пацієнта увімкнено.\") : null);\r

      \  const maxP = pick(\"request_max_period_day\") ??
      pick(\"medication_request_max_period_day\");\r

      \  add(typeof maxP === \"number\" ? `Порада: max період лікування —
      ${maxP} днів.` : null);\r

      \  const dispP = pick(\"dispense_period_day\") ??
      pick(\"medication_dispense_period_day\");\r

      \  add(typeof dispP === \"number\" ? `Порада: період погашення — ${dispP}
      днів.` : null);\r

      \  return out;\r

      }\r

      \r

      function ui({ p, ok, verdict, info = [], reasons = [], diagNote = \"\",
      recs = [], extra = \"\" }) {\r

      \  const c = ok ? \"#2563eb\" : \"#ef4444\";\r

      \  const html = `\r

      \  <div style=\"font-family:Inter,Segoe
      UI,Arial,sans-serif;background:#f7f9ff;padding:14px;\">\r

      \    <div
      style=\"background:${c};color:#fff;border-radius:12px;padding:12px
      14px;\">\r

      \      <div style=\"font-size:16px;font-weight:800;\">${ok ? \"✅\" :
      \"❌\"} Перевірка програми</div>\r

      \      <div style=\"margin-top:8px;line-height:1.55;opacity:.95;\">\r

      \        <div><b>Назва:</b> ${esc(p?.name || \"—\")}</div>\r

      \        <div><b>Тип:</b> ${esc(p?.type || \"—\")}</div>\r

      \        <div><b>ID:</b> <span id=\"pid\"
      style=\"font-family:ui-monospace,Menlo,monospace;\">${esc(p?.id ||
      \"—\")}</span>\r

      \          <button id=\"copyBtn\"
      onclick=\"copyToClipboard('pid','copyBtn')\"
      style=\"margin-left:8px;border:0;border-radius:8px;padding:6px
      10px;cursor:pointer;\">📋</button>\r

      \        </div>\r

      \      </div>\r

      \    </div>\r

      \r

      \    <div style=\"background:#fff;border-radius:12px;padding:12px
      14px;margin-top:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);\">\r

      \      <div style=\"line-height:1.65;\"><b>Висновок:</b>
      ${verdict}</div>\r

      \      ${info.length ? `<div style=\"margin-top:10px;\"><b>Для кого і що
      виконано:</b><ul style=\"margin:6px 0 0
      18px;padding:0;line-height:1.6;\">${info.map(x=>`<li>${x}</li>`).join(\"\
      \")}</ul></div>` : \"\"}\r

      \      ${reasons.length ? `<div style=\"margin-top:10px;\"><b>Причини /
      обмеження:</b><ul style=\"margin:6px 0 0
      18px;padding:0;line-height:1.6;\">${reasons.map(x=>`<li>${x}</li>`).join(\
      \"\")}</ul></div>` : \"\"}\r

      \      ${diagNote ? `<div style=\"margin-top:10px;padding:10px
      12px;background:#fff7ed;border-radius:10px;border:1px solid
      #fed7aa;line-height:1.6;\">⚠️ ${diagNote}</div>` : \"\"}\r

      \      ${extra ? `<div style=\"margin-top:10px;padding:10px
      12px;background:#eef6ff;border-radius:10px;\">${extra}</div>` : \"\"}\r

      \    </div>\r

      \r

      \    <div style=\"background:#fff;border-radius:12px;padding:12px
      14px;margin-top:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);\">\r

      \      <div style=\"font-weight:800;\">Рекомендації за settings (лише не
      null)</div>\r

      \      ${recs.length ? `<ul style=\"margin:8px 0 0
      18px;padding:0;line-height:1.6;\">${recs.map(x=>`<li>${esc(x)}</li>`).joi\
      n(\"\")}</ul>` : `<div style=\"margin-top:8px;color:#6b7280;\">Немає
      рекомендацій.</div>`}\r

      \    </div>\r

      \r

      \    <div
      style=\"margin-top:10px;color:#9ca3af;font-size:12px;text-align:center;\"\
      >🧠 QA Automation | Postman Visualizer</div>\r

      \r

      \    <script>\r

      \      function copyToClipboard(id, btnId){\r

      \        var el=document.getElementById(id),
      btn=document.getElementById(btnId);\r

      \        if(!el||!btn) return;\r

      \        var ta=document.createElement(\"textarea\");\r

      \        ta.value=(el.innerText||\"\").trim();\r

      \        document.body.appendChild(ta); ta.select();\r

      \        try{ document.execCommand(\"copy\"); btn.innerText=\"✅\";
      setTimeout(()=>btn.innerText=\"📋\",900); }\r

      \        catch(e){ btn.innerText=\"❌\";
      setTimeout(()=>btn.innerText=\"📋\",900); }\r

      \        document.body.removeChild(ta);\r

      \      }\r

      \    </script>\r

      \  </div>`;\r

      \  pm.visualizer.set(html);\r

      }\r

      \r

      function diag(s, employeeType) {\r

      \  let used = \"—\", list = [];\r

      \  if (employeeType === \"DOCTOR\") { used = \"ICPC2\"; list =
      A(s.conditions_icpc2_allowed); }\r

      \  else if ([\"SPECIALIST\", \"MED_COORDINATOR\"].includes(employeeType))
      { used = \"ICD10-AM\"; list = A(s.conditions_icd10_am_allowed); }\r

      \r

      \  if (used === \"ICD10-AM\") {\r

      \    const code = list[0] || \"E10.9\";\r

      \    selectedCode = code;\r

      \    pm.environment.set(\"condition_diagnosis\", code);\r

      \    pm.environment.set(\"diagnosis_system\",
      \"eHealth/ICD10_AM/condition_codes\");\r

      \  } else if (used === \"ICPC2\") {\r

      \    const code = list[0] || \"S14\";\r

      \    selectedCode = code;\r

      \    pm.environment.set(\"condition_diagnosis\", code);\r

      \    pm.environment.set(\"diagnosis_system\",
      \"eHealth/ICPC2/condition_codes\");\r

      \  } else pm.environment.set(\"diagnosis_system\", \"—\");\r

      \r

      \  return list.length === 0\r

      \    ? `У програмі немає списку діагнозів (${esc(used)}). Використано
      дефолтний: <b>${esc(pm.environment.get(\"condition_diagnosis\"))}</b>.`\r

      \    : \"\";\r

      }\r

      \r

      function specialityDecision(s, sp) {\r

      \  const old = s.speciality_types_allowed;\r

      \  const oldIsArray = Array.isArray(old);\r

      \r

      \  const req = s.speciality_types_request_allowed;\r

      \  const cp = s.speciality_types_care_plan_activity_allowed;\r

      \  const newPresent = req !== null && req !== undefined || cp !== null &&
      cp !== undefined;\r

      \r

      \  let baseSpecOK = true, showActions = false, requestOK = true,
      carePlanOK = true;\r

      \  const info = [], reasons = [];\r

      \r

      \  if (oldIsArray) {\r

      \    baseSpecOK = old.length === 0 || old.includes(sp);\r

      \    info.push(`Спеціальність: <b>${esc(sp)}</b> ${baseSpecOK ? \"✅\" :
      \"❌\"}.`);\r

      \    if (!baseSpecOK) reasons.push(`Програма не підходить: спеціальність
      <b>${esc(sp)}</b> не дозволена. Потрібно: <b>${esc(old.join(\", \") ||
      \"—\")}</b>.`);\r

      \    return { baseSpecOK, showActions, requestOK: true, carePlanOK: true,
      info, reasons };\r

      \  }\r

      \r

      \  if (newPresent) {\r

      \    showActions = true;\r

      \    requestOK = isAllowed(req, sp);\r

      \    carePlanOK = isAllowed(cp, sp);\r

      \r

      \    info.push(`Спеціальність для REQUEST: <b>${esc(sp)}</b> ${requestOK ?
      \"✅\" : \"❌\"}${(!Array.isArray(req) || req.length === 0) ? \" (обмежень
      немає)\" : \"\"}.`);\r

      \    info.push(`Спеціальність для CARE PLAN: <b>${esc(sp)}</b>
      ${carePlanOK ? \"✅\" : \"❌\"}${(!Array.isArray(cp) || cp.length === 0) ?
      \" (обмежень немає)\" : \"\"}.`);\r

      \r

      \    if (!requestOK && Array.isArray(req) && req.length)
      reasons.push(`REQUEST не доступний для <b>${esc(sp)}</b>. Потрібно:
      <b>${esc(req.join(\", \") || \"—\")}</b>.`);\r

      \    if (!carePlanOK && Array.isArray(cp) && cp.length) reasons.push(`CARE
      PLAN ACTIVITY не доступне для <b>${esc(sp)}</b>. Потрібно:
      <b>${esc(cp.join(\", \") || \"—\")}</b>.`);\r

      \r

      \    baseSpecOK = requestOK || carePlanOK || (!Array.isArray(req) ||
      req.length === 0) || (!Array.isArray(cp) || cp.length === 0);\r

      \    if (!baseSpecOK) reasons.push(`Програма не підходить за
      спеціальністю: <b>${esc(sp)}</b> немає у дозволених списках
      REQUEST/CarePlan.`);\r

      \    return { baseSpecOK, showActions, requestOK, carePlanOK, info,
      reasons };\r

      \  }\r

      \r

      \  // fallback: new lists null/undefined => all allowed (explicit for
      old===null too)\r

      \  showActions = true;\r

      \  const note = old === null ? \"old=null і нові=null → дозволено всім\" :
      \"обмеження не задані → дозволено всім\";\r

      \  info.push(`Спеціальність для REQUEST: <b>${esc(sp)}</b> ✅
      (${note}).`);\r

      \  info.push(`Спеціальність для CARE PLAN: <b>${esc(sp)}</b> ✅
      (${note}).`);\r

      \  return { baseSpecOK: true, showActions, requestOK: true, carePlanOK:
      true, info, reasons: [] };\r

      }\r

      \r

      function setMedicationIfEligible(program, drug0) {\r

      \  const s = program.medical_program_settings || {};\r

      \  const t = env(\"employee_type\");\r

      \  const sp = env(\"employee_specialty\");\r

      \  const cond = env(\"providing_condition\");\r

      \  const typeOK = A(s.employee_types_to_create_request).length === 0 ||
      A(s.employee_types_to_create_request).includes(t);\r

      \  const condOK = A(s.providing_conditions_allowed).length === 0 ||
      A(s.providing_conditions_allowed).includes(cond);\r

      \  const old = s.speciality_types_allowed;\r

      \  const specOK = !Array.isArray(old) || old.length === 0 ||
      old.includes(sp);\r

      \r

      \  if (typeOK && condOK && specOK) {\r

      \    gset(\"medication_id\", drug0?.id);\r

      \    gset(\"medication_denumerator_unit\",
      drug0?.ingredients?.[0]?.dosage?.denumerator_unit);\r

      \    gset(\"medication_numerator_unit\",
      drug0?.ingredients?.[0]?.dosage?.numerator_unit);\r

      \    gset(\"medication_package_min_qty\",
      drug0?.packages?.[0]?.package_min_qty);\r

      \    gset(\"medication_package_qty\",
      drug0?.packages?.[0]?.package_qty);\r

      \    gset(\"medication_info\", JSON.stringify(drug0 || {}));\r

      \  }\r

      }\r

      \r

      // ---------------------\r

      // Load program\r

      // ---------------------\r

      const mp = JSON.parse(pm.globals.get(\"medical_program_data\") ||
      \"{}\");\r

      if (!mp?.[0]) {\r

      \  ui({ p: {}, ok: false, verdict: \"Не знайдено medical_program_data у
      globals.\", reasons: [\"Перевір попередній запит: response.data має
      містити програму.\"] });\r

      \  pm.execution.setNextRequest(null);\r

      \  return;\r

      }\r

      \r

      const p = mp[0];\r

      const s = p.medical_program_settings || {};\r

      const type = p.type;\r

      const pid = p.id;\r

      \r

      if (p.is_active === false) {\r

      \  ui({ p, ok: false, verdict: \"Програма неактивна (is_active = false) —
      нічого створювати не можна.\", recs: recommendations(s) });\r

      \  pm.execution.setNextRequest(null);\r

      \  return;\r

      }\r

      \r

      function validateAndShow() {\r

