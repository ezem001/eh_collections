      \r

      function checkEmployeeEligibilityAndSetMedication(program, medicationId,
      medicationDenumeratorUnit, medicationNumeratorUnit,
      medicationPackageMinQty, medicationPackageQty, medicationInfo) {\r

      \    const settings = program.medical_program_settings || {};\r

      \    const employeeType = pm.environment.get(\"employee_type\");\r

      \    const employeeSpecialty =
      pm.environment.get(\"employee_specialty\");\r

      \    const leProvidingCondition =
      pm.environment.get(\"providing_condition\");\r

      \r

      \    const allowedTypes = settings.employee_types_to_create_request ||
      [];\r

      \r

      \    // 👇 Логіка спеціальностей з пріоритетом старого поля\r

      \    let specOK = false;\r

      \    let specWarning = false;\r

      \    let specText = \"\";\r

      \r

      \    if (settings.speciality_types_allowed !== null &&
      settings.speciality_types_allowed !== undefined) {\r

      \        // Старе поле існує\r

      \        if (settings.speciality_types_allowed.length === 0) {\r

      \            specOK = true;\r

      \            specWarning = true;\r

      \            specText = \"speciality_types_allowed порожній — обмежень
      немає\";\r

      \        } else {\r

      \            specOK =
      settings.speciality_types_allowed.includes(employeeSpecialty);\r

      \            specText = specOK ? \"\" : \"Спеціальність не входить у
      allowed\";\r

      \        }\r

      \    } else {\r

      \        // Використовуємо нові поля\r

      \        const requestAllowed =
      settings.speciality_types_request_allowed;\r

      \        const carePlanAllowed =
      settings.speciality_types_care_plan_activity_allowed;\r

      \r

      \        const requestOK = !requestAllowed || requestAllowed.length === 0
      || requestAllowed.includes(employeeSpecialty);\r

      \        const carePlanOK = !carePlanAllowed || carePlanAllowed.length ===
      0 || carePlanAllowed.includes(employeeSpecialty);\r

      \r

      \        specOK = requestOK && carePlanOK;\r

      \r

      \        if ((!requestAllowed || requestAllowed.length === 0) &&
      (!carePlanAllowed || carePlanAllowed.length === 0)) {\r

      \            specWarning = true;\r

      \            specText = \"Немає обмежень (request + carePlan)\";\r

      \        } else if (!specOK) {\r

      \            specText = \"Спеціальність не входить у allowed request або
      carePlan\";\r

      \        }\r

      \    }\r

      \r

      \    const allowedConditions = settings.providing_conditions_allowed ||
      [];\r

      \    const typeOK = !allowedTypes.length ||
      allowedTypes.includes(employeeType);\r

      \    const conditionOK = !allowedConditions.length ||
      allowedConditions.includes(leProvidingCondition);\r

      \r

      \    if (typeOK && specOK && conditionOK) {\r

      \        pm.globals.set(\"medication_id\", medicationId);\r

      \        pm.globals.set(\"medication_denumerator_unit\",
      medicationDenumeratorUnit);\r

      \        pm.globals.set(\"medication_numerator_unit\",
      medicationNumeratorUnit);\r

      \        pm.globals.set(\"medication_package_min_qty\",
      medicationPackageMinQty);\r

      \        pm.globals.set(\"medication_package_qty\",
      medicationPackageQty);\r

      \        console.info(\"medication_info\", medicationInfo);\r

      \        pm.globals.set(\"medication_info\",
      JSON.stringify(medicationInfo));\r

      \r

      \        console.log(\"💾 Записано medication_id (співробітник
      підходить):\", medicationId);\r

      \    } else console.warn(\"⛔ medication_id НЕ записано — працівник не
      відповідає умовам програми\");\r

      }\r

      \r

      \r

      let selectedCode = \"\";\r

      function displayResponse(title, summaryHtml, settingsHtml, color =
      \"#2b7cff\", encounter, encStatus, participant) {\r

      \    console.log(\"encounter data DONE!!!\", encounter)\r

      \    const html = `\r

