      \                background:#fff;\r

      \                border-radius:10px;\r

      \                padding:18px 20px;\r

      \                box-shadow:0 1px 4px rgba(0,0,0,0.06);\r

      \            \">\r

      \                ${settingsHtml}\r

      \            </div>\r

      \r

      \            <div style=\"text-align:center; margin-top:18px; color:#999;
      font-size:12px;\">\r

