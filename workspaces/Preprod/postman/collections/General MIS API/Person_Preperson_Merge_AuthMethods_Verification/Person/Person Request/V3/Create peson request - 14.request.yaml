scripts:
  - type: afterResponse
    code: "\r

      // ---- Config ----\r

      const MASK_SENSITIVE = true;\r

      const SENSITIVE_HEADERS = new Set([\r

      \  'authorization', 'api-key', 'x-custom-psk', 'cookie'\r

      ]);\r

      \r

      // Headers to drop from [Request]\r

      const DROP_REQUEST_HEADERS = new Set([\r

      \  'accept',\r

      \  'accept-encoding',\r

      \  'connection',\r

      \  'content-type',\r

      \  'postman-token',\r

      \  'user-agent',\r

      \  'content-length',\r

      \  'host' // keep only \"Host:\" line\r

      ]);\r

      \r

      // ---- Helpers ----\r

      function esc(s) {\r

      \  return String(s ?? '')\r

      \    .replaceAll('&', '&amp;')\r

      \    .replaceAll('<', '&lt;')\r

      \    .replaceAll('>', '&gt;');\r

      }\r

      \r

      function safeJsonParse(text) {\r

      \  try { return JSON.parse(text); } catch { return null; }\r

      }\r

      \r

      function normalizeHeaders(headersObjOrArr) {\r

      \  if (!headersObjOrArr) return {};\r

      \  if (typeof headersObjOrArr?.toObject === 'function') return
      headersObjOrArr.toObject();\r

      \r

      \  const out = {};\r

      \  if (Array.isArray(headersObjOrArr)) {\r

      \    headersObjOrArr.forEach(h => {\r

      \      if (!h) return;\r

      \      const k = (h.key || h.name || '').toString();\r

      \      const v = (h.value ?? '').toString();\r

      \      if (k) out[k] = v;\r

      \    });\r

      \    return out;\r

      \  }\r

      \r

      \  if (typeof headersObjOrArr === 'object') {\r

      \    Object.keys(headersObjOrArr).forEach(k => out[k] =
      String(headersObjOrArr[k]));\r

      \  }\r

      \  return out;\r

      }\r

      \r

      function shouldDropHeader(k) {\r

      \  const key = String(k || '').toLowerCase().trim();\r

      \  if (!key) return true;\r

      \  return DROP_REQUEST_HEADERS.has(key);\r

      }\r

      \r

      function maskHeaderValue(key, value) {\r

      \  if (!MASK_SENSITIVE) return value;\r

      \r

      \  const k = String(key || '').toLowerCase().trim();\r

      \  if (!SENSITIVE_HEADERS.has(k)) return value;\r

      \r

      \  if (k === 'authorization') return 'Bearer ***';\r

      \  if (!value) return '***';\r

      \r

      \  const tail = value.length > 6 ? value.slice(-6) : value;\r

      \  return `***…${tail}`;\r

      }\r

      \r

      function formatRequestHeaders(headers) {\r

      \  const obj = normalizeHeaders(headers);\r

      \  const keys = Object.keys(obj)\r

      \    .filter(k => !shouldDropHeader(k))\r

      \    .sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));\r

      \r

      \  if (!keys.length) return '';\r

      \  return keys.map(k => `${k}: ${maskHeaderValue(k,
      obj[k])}`).join('\\n');\r

      }\r

      \r

      function getHost(url) {\r

      \  if (!url) return '';\r

      \  if (typeof url === 'string') {\r

      \    try { return new URL(url).host; } catch { return ''; }\r

      \  }\r

      \  if (url.host) {\r

      \    if (Array.isArray(url.host)) return url.host.join('.');\r

      \    return String(url.host);\r

      \  }\r

      \  if (url.toString) {\r

      \    try { return new URL(url.toString()).host; } catch { return ''; }\r

      \  }\r

      \  return '';\r

      }\r

      \r

      function getPathWithQuery(url) {\r

      \  if (!url) return '/';\r

      \r

      \  if (typeof url === 'string') {\r

      \    try {\r

      \      const u = new URL(url);\r

      \      return u.pathname + (u.search || '');\r

      \    } catch {\r

      \      return url;\r

      \    }\r

      \  }\r

      \r

      \  const path = Array.isArray(url.path) ? '/' + url.path.join('/') :
      (url.pathname || '/');\r

      \r

      \  if (Array.isArray(url.query) && url.query.length) {\r

      \    const qs = url.query\r

      \      .filter(q => q && q.key)\r

      \      .map(q =>
      `${encodeURIComponent(q.key)}=${encodeURIComponent(q.value ?? '')}`)\r

      \      .join('&');\r

      \    return `${path}?${qs}`;\r

      \  }\r

      \r

      \  return path || '/';\r

      }\r

      \r

      function getPmRequestBody(pmReq) {\r

      \  try {\r

      \    const body = pmReq?.body;\r

      \    if (!body) return '';\r

      \    if (body.mode === 'raw') return body.raw || '';\r

      \    return '';\r

      \  } catch {\r

      \    return '';\r

      \  }\r

      }\r

      \r

      function stringifyMaybeJson(text) {\r

      \  if (!text) return '';\r

      \  const j = safeJsonParse(text);\r

      \  return j ? JSON.stringify(j, null, 2) : text;\r

      }\r

      \r

      function responseDataMetaOnly(text) {\r

      \  const j = safeJsonParse(text);\r

      \  if (!j) return text;\r

      \r

      \  const out = {\r

      \    data: Object.prototype.hasOwnProperty.call(j, 'data') ? j.data :
      undefined,\r

      \    error: Object.prototype.hasOwnProperty.call(j, 'error') ? j.error :
      undefined,\r

      \    meta: Object.prototype.hasOwnProperty.call(j, 'meta') ? j.meta :
      undefined\r

      \  };\r

      \  Object.keys(out).forEach(k => out[k] === undefined && delete out[k]);\r

      \r

      \  return JSON.stringify(out, null, 2);\r

      }\r

      \r

      function buildRawRequest({ method, url, headers, body }) {\r

      \  const host = getHost(url);\r

      \  const path = getPathWithQuery(url);\r

      \r

      \  const headerText = formatRequestHeaders(headers);\r

      \  const bodyText = body ? stringifyMaybeJson(body) : '';\r

      \r

      \  return [\r

      \    `${(method || 'GET').toUpperCase()} ${path || '/'} HTTP/1.1`,\r

      \    host ? `Host: ${host}` : null,\r

      \    headerText || null,\r

      \    bodyText ? `\\n${bodyText}` : null\r

      \  ].filter(Boolean).join('\\n');\r

      }\r

      \r

      function buildResponseBodyOnly({ bodyText }) {\r

      \  return responseDataMetaOnly(bodyText || '');\r

      }\r

      \r

      function buildLogText() {\r

      \  const title = pm.info.requestName || 'Main request';\r

      \r

      \  const reqRaw = buildRawRequest({\r

      \    method: pm.request.method,\r

      \    url: pm.request.url,\r

      \    headers: pm.request.headers,\r

      \    body: getPmRequestBody(pm.request)\r

      \  });\r

      \r

      \  const resRaw = buildResponseBodyOnly({\r

      \    bodyText: pm.response.text()\r

      \  });\r

      \r

      \  return [\r

      \    `${title}\\n`,\r

      \    `[Request]\\n\\n${reqRaw}\\n`,\r

      \    `\\n[Response]\\n\\n${resRaw}\\n`\r

      \  ].join('\\n');\r

      }\r

      \r

      // ---- Render ----\r

      (function renderMain() {\r

      \  const allText = buildLogText();\r

      \r

      \  const html = `\r

      <div style=\"display:flex; gap:8px; align-items:center;
      margin-bottom:8px;\">\r

      \  <button id=\"copyAllBtn\">Copy all</button>\r

      \  <span id=\"copyMsg\" style=\"font-family: ui-monospace, SFMono-Regular,
      Menlo, Monaco, Consolas, monospace; font-size:12px;\"></span>\r

      </div>\r

      \r

      <textarea id=\"allLogText\" style=\"position:absolute; left:-9999px;
      top:-9999px;\">${esc(allText)}</textarea>\r

      \r

      <pre style=\"margin:0; white-space:pre; font-family: ui-monospace,
      SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px;
      line-height: 1.35;\">\r

      ${esc(allText)}\r

      </pre>\r

      \r

      <script>\r

      \  (function() {\r

      \    const btn = document.getElementById('copyAllBtn');\r

      \    const msg = document.getElementById('copyMsg');\r

      \    const ta  = document.getElementById('allLogText');\r

      \r

      \    function setMsg(t) {\r

      \      msg.textContent = t || '';\r

      \      if (t) setTimeout(() => { msg.textContent = ''; }, 1200);\r

      \    }\r

      \r

      \    btn.addEventListener('click', async () => {\r

      \      try {\r

      \        const text = ta.value || '';\r

      \        if (navigator.clipboard && navigator.clipboard.writeText) {\r

      \          await navigator.clipboard.writeText(text);\r

      \          setMsg('Copied ✅');\r

      \          return;\r

      \        }\r

      \        ta.focus(); ta.select();\r

      \        const ok = document.execCommand('copy');\r

      \        setMsg(ok ? 'Copied ✅' : 'Copy failed ❌');\r

      \      } catch (e) {\r

      \        try {\r

      \          ta.focus(); ta.select();\r

      \          const ok = document.execCommand('copy');\r

      \          setMsg(ok ? 'Copied ✅' : 'Copy failed ❌');\r

      \        } catch {\r

      \          setMsg('Copy failed ❌');\r

      \        }\r

      \      }\r

      \    });\r

      \  })();\r

      </script>\r

      \  `;\r

      \r

      \  pm.visualizer.set(html);\r

      })();\r

      \r

      \r

      \r

      \r

      const resBody = pm.response.json();\r

      \r

      function displayResponse(title, data) {\r

      \    const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \    pm.visualizer.set(html);\r

      }\r

      \r

      if (resBody.data.id) {\r

      \    const personReqId = resBody.data.id\r

      \    console.log(personReqId)\r

      \    pm.globals.set(\"Person_req_id\", personReqId);\r

      }\r

      \r

      \r

      \r

      \r

      // Function to handle each URL request\r

      function processUrl(url, additionalData) {\r

      \    console.log(url, 'urls loop');\r

      \   \r

      \    pm.sendRequest({\r

      \        url: url,\r

      \        method: 'PUT',\r

      \        header: {\r

      \            'Content-Type': 'image/jpeg'\r

      \        },\r

      \        body: {\r

      \            mode: 'raw',\r

      \            raw: JSON.stringify(additionalData) // Include additional
      data in the body\r

      \        }\r

      \    }, function (err, res) {\r

      \        if (err) {\r

      \            console.error('Request failed:', err);\r

      \            displayResponse('Request Error', { error: err.message });\r

      \        } else {\r

      \            let responseData;\r

      \r

      \            // Check content type to determine how to parse the
      response\r

      \            const contentType = res.headers.get('Content-Type');\r

      \            console.log(contentType)\r

      \            if (contentType && contentType.includes('text/plain')) {\r

      \                try {\r

      \                     // Handle TEXT response if needed\r

      \                responseData = res.text(); // Get response as text\r

      \                // displayResponse('Document sign successful', {
      response: responseData });\r

      \                } catch (e) {\r

      \                    console.error('JSON parsing error:', e);\r

      \                    displayResponse('Parsing Error', { error: 'Failed to
      parse JSON' });\r

      \                    return;\r

      \                }\r

      \                // displayResponse('Document sign successful',
      responseData);\r

      \            } else {\r

      \                // Handle other response types if needed\r

      \                responseData = res.text(); // Default to text for unknown
      formats\r

      \                displayResponse('Unknown Response Format', { response:
      responseData });\r

      \            }\r

      \        }\r

      \    });\r

      }\r

      \r

      const resData = pm.response.json();\r

      \r

      // Extract URLs from the documents array in the response\r

      const documents = resData.urgent.documents;\r

      const urls = documents.map(doc => doc.url);\r

      \r

      const additionalData = {\r

      \    row: '0JTQvtC60YPQvNC10L3Rgg=='\r

      };\r

      \r

      // Process each URL from the documents array\r

      urls.forEach(url => {\r

      \    processUrl(url, additionalData);\r

      });\r

      \r

      \r

      \r

      \r

      pm.test(\"Create peson request v2 Status code is 201\", function () {\r

      \  pm.response.to.have.status(201);\r

      \r

      \r

      if (!resBody?.data?.id) {\r

      \    throw new Error(\"Person Request: id not found\");\r

      }\r

      \r

      // --- Detect create or update ---\r

      let requestBody = {};\r

      try {\r

      \    requestBody = JSON.parse(pm.request.body.raw);\r

      } catch (e) {}\r

      \r

      if (requestBody.person.id) {\r

      \    // UPDATE\r

      \    pm.globals.set(\r

      \        \"UPDATE_PERSON_RESPONSE\",\r

      \        JSON.stringify(resBody.data)\r

      \    );\r

      \    pm.globals.set(\"PERSON_OPERATION\", \"update\");\r

      } else {\r

      \    // CREATE\r

      \    pm.globals.set(\r

      \        \"CREATE_PERSON_RESPONSE\",\r

      \        JSON.stringify(resBody.data)\r

      \    );\r

      \    pm.globals.set(\"PERSON_OPERATION\", \"create\");\r

      }\r

      \r

      // --- Save request id ---\r

      pm.globals.set(\"PERSON_REQUEST_ID\", resBody.data.id);\r

      \r

      \r

      });\r

      \r

      \r

      // Логування запиту та відповіді\r

      \r

      // (function () {\r

      //   // не логувати /log щоб уникнути рекурсії\r

      //   if (pm.request.url.toString().includes('/log')) return;\r

      \r

      //   const logger = pm.require('@winter-zodiac-949553/log-utils')\r

      //   const logPayload = logger.createLogPayload(pm);\r

      //   logger.sendLog(logPayload);\r

      // })();\r

      \r\n"
    language: text/javascript
  - type: beforeRequest
    code: "function generateRandomTaxId() {\r

      \    let taxId = '';\r

      \    for (let i = 0; i < 10; i++) {\r

      \        taxId += Math.floor(Math.random() * 10); // Generate a random
      digit\r

      \    }\r

      \    return taxId;\r

      }\r

      \r

      // Generate a random tax ID\r

      const randomTaxId = generateRandomTaxId();\r

      \r

      // Set the random tax ID in an environment variable\r

      pm.globals.set('person_tax_id', randomTaxId);\r

      \r

      // Optional: Log the generated tax ID for debugging\r

      console.log('Generated tax ID:', randomTaxId);"
    language: text/javascript
