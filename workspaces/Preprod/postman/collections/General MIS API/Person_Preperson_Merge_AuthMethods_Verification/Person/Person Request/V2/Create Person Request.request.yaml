      \  console.log(\"ℹ️ no_tax_id=true — skipping tax_id generation\");\r

      } else {\r

      \  const birthDate = body.person.birth_date;\r

      \  const gender = normalizeGender(body.person.gender);\r

      \r

      \  const taxId = generateRnokkpp(birthDate, gender);\r

      \r

