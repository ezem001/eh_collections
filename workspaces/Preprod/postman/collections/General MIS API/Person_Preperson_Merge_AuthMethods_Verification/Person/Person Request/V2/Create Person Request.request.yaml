scripts:
  - type: beforeRequest
    code: "/**\r

      \ * UA TAX ID (РНОКПП / ІПН) generator from request body\r

      \ * - Reads person.birth_date + person.gender from pm.request.body.raw\r

      \ * - Sets pm.environment variable: person_tax_id\r

      \ * - Skips if person.no_tax_id === true\r

      \ */\r

      \r

      // === 🧩 Зчитуємо body запиту ===\r

      let rawBody = pm.request.body.raw;\r

      let body = JSON.parse(rawBody);\r

      \r

      function safeJson(text) {\r

      \  try { return JSON.parse(text); } catch { return null; }\r

      }\r

      \r

      function padLeft(num, len) {\r

      \  return String(num).padStart(len, '0');\r

      }\r

      \r

      // Days since 1899-12-31 (UA RNOKPP logic)\r

      function daysFrom1899_12_31(birthDateStr) {\r

      \  // birthDateStr: \"YYYY-MM-DD\"\r

      \  const m = /^(\\d{4})-(\\d{2})-(\\d{2})$/.exec(String(birthDateStr ||
      '').trim());\r

      \  if (!m) throw new Error(`❌ birth_date must be YYYY-MM-DD, got:
      ${birthDateStr}`);\r

      \r

      \  const y = Number(m[1]);\r

      \  const mo = Number(m[2]);\r

      \  const d = Number(m[3]);\r

      \r

      \  // Use UTC to avoid timezone/day shift issues\r

      \  const base = Date.UTC(1899, 11, 31); // 1899-12-31\r

      \  const birth = Date.UTC(y, mo - 1, d);\r

      \r

      \  if (Number.isNaN(birth)) throw new Error(`❌ Invalid birth_date:
      ${birthDateStr}`);\r

      \  if (birth <= base) throw new Error(`❌ birth_date must be after
      1899-12-31, got: ${birthDateStr}`);\r

      \r

      \  const diffDays = Math.floor((birth - base) / (24 * 60 * 60 * 1000));\r

      \  return diffDays;\r

      }\r

      \r

      // checksum = (sum(weights * digits[0..8]) % 11) % 10\r

      function calcChecksum9(first9Digits) {\r

      \  const weights = [1,2,3,4,5,6,7,8,9];\r

      \  const digits = String(first9Digits).split('').map(n => Number(n));\r

      \  if (digits.length !== 9 || digits.some(n => Number.isNaN(n))) {\r

      \    throw new Error(`❌ first9Digits must be 9 digits, got:
      ${first9Digits}`);\r

      \  }\r

      \  const sum = digits.reduce((acc, d, i) => acc + d * weights[i], 0);\r

      \  return (sum % 11) % 10;\r

      }\r

      \r

      function normalizeGender(g) {\r

      \  const s = String(g || '').trim().toUpperCase();\r

      \  if (s === 'MALE' || s === 'M') return 'MALE';\r

      \  if (s === 'FEMALE' || s === 'F') return 'FEMALE';\r

      \  throw new Error(`❌ Unsupported gender: ${g} (expected MALE/FEMALE)`);\r

      }\r

      \r

      function randomSerial4ByGender(gender) {\r

      \  // serial is 4 digits; last digit parity defines gender:\r

      \  // odd => MALE, even => FEMALE\r

      \  const needOdd = gender === 'MALE';\r

      \r

      \  // Generate first 3 digits random 000-999\r

      \  const first3 = Math.floor(Math.random() * 1000);\r

      \r

      \  // Generate last digit with required parity\r

      \  const lastDigitCandidates = needOdd ? [1,3,5,7,9] : [0,2,4,6,8];\r

      \  const last = lastDigitCandidates[Math.floor(Math.random() *
      lastDigitCandidates.length)];\r

      \r

      \  return padLeft(first3, 3) + String(last);\r

      }\r

      \r

      function generateRnokkpp(birthDateStr, gender) {\r

      \  const days = daysFrom1899_12_31(birthDateStr);     // 5 digits (usually
      fits)\r

      \  const part1 = padLeft(days, 5);\r

      \r

      \  const serial4 = randomSerial4ByGender(gender);     // 4 digits\r

      \  const first9 = part1 + serial4;                    // 9 digits\r

      \  const checksum = calcChecksum9(first9);            // 1 digit\r

      \r

      \  return first9 + String(checksum);                  // 10 digits\r

      }\r

      \r

      // -------- main ----------\r

      \r

      \r

      if (!body?.person) {\r

      \  throw new Error(\"❌ Request body has no 'person' object\");\r

      }\r

      \r

      const noTaxId = Boolean(body.person.no_tax_id);\r

