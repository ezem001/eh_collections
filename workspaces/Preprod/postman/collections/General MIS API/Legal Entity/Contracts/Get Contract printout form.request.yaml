      color:#6b7280;\">\r

      \                id: <b>${id}</b>\r

      \            </span>\r

      \        </div>\r

      \r

      \        <iframe\r

      \            id=\"printFrame\"\r

      \            style=\"width:100%; height:85vh; border:1px solid #d0d7de;
      border-radius:10px; background:white;\"\r

      \            srcdoc=\"${srcdocAttr}\">\r

      \        </iframe>\r

      \r

      \        <script>\r

      \            (function () {\r

      \                const iframe = document.getElementById('printFrame');\r

      \                const printBtn = document.getElementById('printBtn');\r

      \r

      \                printBtn.onclick = function () {\r

      \                    if (!iframe.contentWindow) return;\r

      \                    iframe.contentWindow.focus();\r

      \                    iframe.contentWindow.print();\r

      \                };\r

      \            })();\r

      \        </script>\r

      \    </div>\r

      \    `;\r

      \r

