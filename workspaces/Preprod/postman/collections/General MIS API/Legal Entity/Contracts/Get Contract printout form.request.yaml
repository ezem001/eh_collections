      \r

      (function () {\r

      \    function safeJsonParse(text) {\r

      \        try { return JSON.parse(text); } catch (e) { return null; }\r

      \    }\r

      \r

      \    function escapeHtml(s) {\r

      \        return String(s)\r

      \            .replace(/&/g, \"&amp;\")\r

      \            .replace(/</g, \"&lt;\")\r

      \            .replace(/>/g, \"&gt;\")\r

      \            .replace(/\"/g, \"&quot;\")\r

