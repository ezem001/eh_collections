    \    \"consent_text\": \"Цією заявою Заявник висловлює бажання укласти
    договір про медичне обслуговування населення за програмою державних гарантій
    медичного обслуговування населення (далі – Договір) на умовах, визначених в
    оголошенні про укладення договорів про медичне обслуговування населення
    (далі – Оголошення). Заявник підтверджує, що: 1. на момент подання цієї
    заяви Заявник має чинну ліцензію на провадження господарської діяльності з
    медичної практики та відповідає ліцензійним умовам з медичної практики; 2.
    Заявник надає медичні послуги, пов’язані з первинною медичною допомогою
    (далі – ПМД); 3. Заявник зареєстрований в електронній системі охорони
    здоров’я (далі – Система); 4. уповноважені особи та медичні працівники, які
    будуть залучені до виконання Договору, зареєстровані в Системі та отримали
    електронний цифровий підпис (далі – ЕЦП); 5. в кожному місці надання
    медичних послуг Заявника наявне матеріально-технічне оснащення, передбачене
    розділом І Примірного табелю матеріально-технічного оснащення закладів
    охорони здоров’я та фізичних осіб – підприємців, які надають ПМД,
    затвердженого наказом Міністерства охорони здоров’я України від 26 січня
    2018 року №148; 6. установчими або іншими документами не обмежено право
    керівника Заявника підписувати договори від імені Заявника без попереднього
    погодження власника. Якщо таке право обмежено, у тому числі щодо укладання
    договорів, ціна яких перевищує встановлену суму, Заявник повідомить про це
    Національну службу здоров’я та отримає необхідні погодження від власника до
    моменту підписання договору зі сторони Заявника; 7. інформація, зазначена
    Заявником у цій Заяві та доданих до неї документах, а також інформація,
    внесена Заявником (його уповноваженими особами) до Системи, є повною та
    достовірною. Заявник усвідомлює, що у разі зміни інформації, зазначеної
    Заявником у цій заяві та (або) доданих до неї документах Заявник
    зобов’язаний повідомити про такі зміни НСЗУ протягом трьох робочих днів з
    дня настання таких змін шляхом надсилання інформації про такі зміни на
    електронну пошту dohovir@nszu.gov.ua, з одночасним внесенням таких змін в
    Систему. Заявник усвідомлює, що законодавством України передбачена
    відповідальність за подання недостовірної інформації органам державної
    влади.\"\r

    }"
order: 2000
