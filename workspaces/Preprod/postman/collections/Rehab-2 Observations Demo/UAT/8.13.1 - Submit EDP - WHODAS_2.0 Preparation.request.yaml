  Authorization: "Bearer {{doctor_token}} "
  api-key: "{{mis_client_secret_demo}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value_demo}}"
body:
  type: text
  content: |-
    {
      "visit": {
        "id": "{{visit_id}}",
        "period": {
          "start": "2023-05-10T14:40:16+02:00",
          "end": "2023-05-19T14:41:16Z"
        }
      },
      "signed_data": "{{encounter_package_base64}}"
    	
    }
scripts:
  - type: beforeRequest
    code: |-
      var b64EncodeUnicode = function (str) {
          return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function (match, p1) {
              return String.fromCharCode(parseInt(p1, 16))
          }))
      };

      var current_date = new Date();
      current_date.setHours(current_date.getHours() - 1)
      pm.environment.set("current_date", current_date);

      var visit_period_start = new Date();
      visit_period_start.setHours(visit_period_start.getHours() - 2);
      pm.environment.set("visit_period_start", visit_period_start);

      var uuid = require('uuid');

      var encounter_id = uuid.v4();
      pm.environment.set("encounter_id", encounter_id);

      var device_dispense_id = uuid.v4();
      pm.environment.set("device_dispense_id", device_dispense_id);

      var visit_id = uuid.v4();
      pm.environment.set("visit_id", visit_id);
      var condition_id_1 = uuid.v4();
      pm.environment.set("condition_id_1", condition_id_1);
      var observation_id_1 = uuid.v4();
      pm.environment.set("observation_id_1", observation_id_1);
      var dr_id_1 = uuid.v4();
      pm.environment.set("dr_id_1", dr_id_1);


