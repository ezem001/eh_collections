$kind: http-request
url: "{{host}}/api/patients/{{patient_for_regress}}/composition_title?compositi\
  on_type=ADOPTION"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
queryParams:
  - key: composition_type
    value: DRIVERS
    disabled: true
  - key: composition_type
    value: ADOPTION
  - key: composition_type
    value: DRIVERS_GROUP1
    disabled: true
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: >-
      
      const resData = pm.response.json();


      pm.test(`Composition title. Response status is 200
      ${JSON.stringify(resData, null, 2)}`, function () {
          pm.expect(pm.response.code).to.eql(200);
          pm.globals.set('composition_stitle', resData.data.title);
      });
    language: text/javascript
order: 67000
