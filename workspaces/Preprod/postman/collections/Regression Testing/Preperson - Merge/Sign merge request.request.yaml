    code: "pm.test(\"Merge request sign successful\", function () {\r

      \    pm.response.to.have.status(200);\r

      \r

      \    const resData = pm.response.json();\r

      \r

      \    pm.globals.set('merge_id', resData.data?.id)\r

      });"
    language: text/javascript
