$kind: http-request
url: "{{host}}/api/patients/{{patient_id}}/device_requests?context_episode_id={\
  {episode_id}}"
method: GET
headers:
  Authorization: Bearer {{mis_access_token}}
  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
queryParams:
  context_episode_id: "{{episode_id}}"
scripts:
  - type: afterResponse
    code: |-
      
      pm.test("OK", function () { 
          (pm.expect(pm.response.json().data.status_code).to.not.equal(200)); 
      });


      var jsonData = JSON.parse(responseBody);
      var device_request=jsonData.data;
      pm.environment.set("device_request", device_request);
    language: text/javascript
order: 27000
