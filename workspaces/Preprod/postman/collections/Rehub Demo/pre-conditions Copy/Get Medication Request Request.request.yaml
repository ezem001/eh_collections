$kind: http-request
url: "{{host}}/api/persons/{{person_id}}/medication_request_requests/{{medicati\
  on_request_request_id}}"
method: GET
headers:
  Content-Type: application/json
  Authorization: Bearer {{mis_access_token}}
  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
body:
  type: text
  content: ""
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      var jsonData = JSON.parse(responseBody);
      var mrr=jsonData.data;
      pm.environment.set("mrr", mrr);
    language: text/javascript
order: 12000
