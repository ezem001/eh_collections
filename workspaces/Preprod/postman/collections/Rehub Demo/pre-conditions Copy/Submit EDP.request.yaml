    {
        "visit": {
            "id": "{{visit_id}}",
            "period": {
                "start": "{{visit_period_start}}",
                "end": "{{current_date}}"
            }
        },
        "signed_data": "{{encounter_package_base64}}"
    }
auth:
  type: noauth
scripts:
