$kind: http-request
url: "{{host}}/api/patients/{{patient_id}}/encounter_package"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{mis_access_token}}
  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
body:
