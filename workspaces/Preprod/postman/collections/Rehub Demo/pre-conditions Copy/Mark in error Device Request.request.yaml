$kind: http-request
url: "{{host}}/api/patients/{{patient_id}}/device_requests/03fd748a-1102-46bc-9\
  71a-457d1ca0316e/actions/mark_in_error"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{mis_access_token}}
  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
body:
  type: text
  content: >-
    {
        "signed_data": ""
    }
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: >-
      var b64EncodeUnicode = function (str) {
          return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
              return String.fromCharCode(parseInt(p1, 16))
          }))};

      device_request = pm.environment.get("device_request");

      device_request.status_reason={
          "coding":[
              {
                  "code":"incorrect_patient",
                  "system":"device_request_mark_in_error_reasons"
              }
          ]
      };

      device_request.status="entered_in_error";

      postman.setEnvironmentVariable("device_request_error",
      JSON.stringify(device_request));

      var device_request_error_base64 =
      b64EncodeUnicode(JSON.stringify(device_request));

      postman.setEnvironmentVariable("device_request_error_base64",
      device_request_error_base64);
    language: text/javascript
  - type: afterResponse
    code: |-
      tests["Job created"] = responseCode.code === 202;
      var jsonData = JSON.parse(responseBody);
      //pm.environment.set("job_id", jsonData.data.id);
      var job_id=jsonData.data.links[0].href.substring(6);
      pm.environment.set("job_id", job_id);
    language: text/javascript
order: 30000
