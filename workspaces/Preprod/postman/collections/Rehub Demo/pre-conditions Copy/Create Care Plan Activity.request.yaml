  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
body:
  type: text
  content: >-
    {
        "signed_data": ""
    }
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: |+
      var b64EncodeUnicode = function (str) {
          return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function (match, p1) {
              return String.fromCharCode(parseInt(p1, 16))
          }))
      };

      var current_date = new Date();
      pm.environment.set("current_date", current_date);

      var period_start = new Date();
      period_start.setHours(period_start.getHours() + 1);



      pm.environment.set("activity_id", pm.variables.replaceIn('{{$guid}}'));


      var activity_template = '{ "id": "75a5d991-0bf7-476f-b3cf-bec73f044b2e", "author": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "employee" } ] }, "value": "9183a36b-4d45-4244-9339-63d81cd08d9c" } }, "care_plan": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "care_plan" } ] }, "value": "9183a36b-4d45-4244-9339-63d81cd08d9c" } }, "detail": { "kind": "device_request", "product_codeable_concept":{ "coding": [ { "system": "device_definition_classification_type", "code": "30000" } ] }, "reason_code": [ { "coding": [ { "system": "eHealth/ICD10_AM/condition_codes", "code": "A00.0" } ] } ], "goal": [ { "coding": [ { "system": "eHealth/care_plan_activity_goals", "code": "default" } ] } ], "quantity": { "value": 13, "system": "device_unit", "code": "piece" }, "scheduled_string": "", "daily_amount": { "value": 13, "system": "device_unit", "code": "piece" }, "description": "Some activity description", "do_not_perform": false, "status": "scheduled" } }';
      var  activity_template = JSON.parse(activity_template);

      //VALUES


      activity_template.id = pm.environment.get("activity_id");

      //activity_template.detail.performer.identifier.value= pm.environment.get("employee_id");
      activity_template.care_plan.identifier.value= pm.environment.get("care_plan_id");
      activity_template.detail.product_codeable_concept.coding[0].code="18_12_10";
      activity_template.detail.product_codeable_concept.coding[0].system="eHealth/assistive_devices";
      activity_template.author.identifier.value= pm.environment.get("employee_id");
      activity_template.detail.scheduled_string= period_start;
      //activity_template.detail.scheduled_period.end= period_start;

      /*service_request_template.occurrence_period.start= sr_period_start;

      service_request_template.requester_legal_entity.identifier.value= pm.environment.get("le_id");
      service_request_template.inform_with.auth_method_id='dc432248-a439-437a-8449-2f5f89701da0';
      */

      postman.setEnvironmentVariable("activity_template", JSON.stringify(activity_template));
      activity_template64= b64EncodeUnicode(JSON.stringify(activity_template));
      postman.setEnvironmentVariable("activity_template64", activity_template64);



    language: text/javascript
  - type: afterResponse
    code: |-
      tests["Job created"] = responseCode.code === 202;
      var jsonData = JSON.parse(responseBody);
      //pm.environment.set("job_id", jsonData.data.id);
      var job_id=jsonData.data.links[0].href.substring(6);
      pm.environment.set("job_id", job_id);
