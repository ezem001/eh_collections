$kind: http-request
url: "{{host}}/api/persons/33e0d3d8-283a-43f0-aebc-e782b7be1fcd/authentication_\
  methods"
method: GET
headers:
  Authorization: Bearer {{mis_access_token}}
  api-key: "{{mis_client_secret}}"
  "{{X-Custom-PSK}}": "{{X-Custom-value}}"
scripts:
  - type: afterResponse
    code: |-
      
      pm.test("Job successfully processed", function () { 
          (pm.expect(pm.response.json().meta.code).to.equal(303)); 
      });

      pm.test("Job not in 'pending' status", function () { 
          (pm.expect(pm.response.json().data.status_code).to.not.equal(202)); 
      });

      pm.test("Validation did not fail", function () { 
          (pm.expect(pm.response.json().data.status_code).to.not.equal(422)); 
      });

      pm.test("No internal error", function () { 
          (pm.expect(pm.response.json().data.status_code).to.not.equal(500)); 
      });
    language: text/javascript
order: 17000
