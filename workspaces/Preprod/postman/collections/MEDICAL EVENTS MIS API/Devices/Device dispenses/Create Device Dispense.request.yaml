$kind: http-request
name: Create Device Dispense
url: "{{host}}/api/patients/{{patient_id_from_episode}}/device_dispenses"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: |-
    {
      "id": "{{dummy_device_dispense_request_id}}",
      "based_on": {
        "identifier": {
          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "device_request"
              }
            ]
          },
          "value": "{{JobDeviceRequestID}}"
        }
      },
      "performer": {
        "identifier": {
          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "employee"
              }
            ]
          },
          "value": "{{user_id}}"
        }
      },
      "location": {
        "identifier": {
          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "division"
              }
            ]
          },
          "value": "{{user_division_id}}"
        }
      },
      "note": "Some notes",
      "program": {
        "identifier": {
          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "medical_program"
              }
            ]
          },
          "value": "{{program_id_qualify_device_request}}"
        }
      },
      "primary_source": true,
      "details": [
        {
          "device": {
            "identifier": {
              "type": {
                "coding": [
                  {
                    "system": "eHealth/resources",
                    "code": "device_definition"
                  }
                ]
              },
              "value": "{{device_definition_id_qualify_device_request}}"
            }
          },
          "program_device": {
            "identifier": {
              "type": {
                "coding": [
                  {
                    "system": "eHealth/resources",
                    "code": "program_device"
                  }
                ]
              },
              "value": "{{program_medication_id_qualify_device_request}}"
            }
          },
          "quantity": {
            "value": 10,
            "system": "device_unit",
            "code": "piece"
          },
          "sell_price": 180.65,
          "discount_amount": 45.99
        }
      ],
      "verification_code": "3789",
      "status": "in_progress"
    }
scripts:
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const deviceDispenseRequestId = uuid.v4();\r

      \r

      pm.globals.set(\"dummy_device_dispense_request_id\",
      deviceDispenseRequestId);"
    language: text/javascript
  - type: afterResponse
    code: "function displayResponse(title, data) {\r

      \    const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \    pm.visualizer.set(html);\r

      }\r

      \r

      // Get the response body from the main request\r

      const resBody = pm.response.text();\r

      const resData = JSON.parse(resBody);\r

      \r

      if (resData && resData.error) {\r

      \    displayResponse('Create Device Dispense Response Error Details',
      resData.error);\r

      }\r

      \r

      const href = resData.data.links[0].href;\r

      console.log(\"Extracted href:\", href);\r

      \r

      // Extract the job ID from the href\r

      const number = href.split('/jobs/')[1];\r

      console.log(\"Extracted number:\", number);\r

      \r

      // Initialize retry counter in the environment\r

      pm.environment.set('retryCount', 0);\r

      \r

      // Function to check job status\r

      function checkJobStatus(jobId) {\r

      \r

      \    const url = `https://api-preprod.ehealth.gov.ua/api/jobs/${jobId}`;\r

      \    const maxRetries = 3; // Set the maximum number of retries\r

      \r

      \    pm.sendRequest({\r

      \        method: 'GET',\r

      \        url: url,\r

      \        header: {\r

      \            'Content-Type': 'application/json',\r

      \            'Authorization': '',\r

      \            'api-key': '30276e63617461a185ec',\r

      \            'X-Custom-PSK':
      '0d65b47f51cb527a3262311da2af53e03f6fcff6e4cf655414a43f52e5ad457b'\r

      \        }\r

      \    }, function (err, res) {\r

      \r

      \        pm.test(`Job status check response status is 200 or 303`,
      function () {\r

      \            pm.expect([200, 303]).to.include(res.code);\r

      \        });\r

      \r

      \        if (err) {\r

      \            displayResponse('Request Error', { error: err.message });\r

      \            console.error('Error checking job status:', err);\r

      \        } else {\r

      \r

      \            const responseBody = res.json();\r

      \            console.log('Job Status:', responseBody.data.status);\r

      \r

      \            if (responseBody.data.status === 'processed') {\r

      \r

      \                pm.test(`Create Device Dispense Job Success. Response
      status is 303 ${JSON.stringify(res.json(), null, 2)}`, function () {\r

      \                    pm.expect(res.code).to.eql(303);\r

      \                });\r

      \r

      \                const links = responseBody.data.links.reduce((acc, link)
      => {\r

      \                    // Extract the part after \"/api/\"\r

      \                    const href = link.href.replace('/api/', '');\r

      \r

      \                    // Set the link entity to global variables\r

      \                    acc[link.entity] = href;\r

      \r

      \                    if (href.includes('device_dispenses/')) {\r

      \                        const  deviceDispenseId = href.split('/')[3]; //
      Extract the Device Dispense ID\r

      \                        acc['jobDeviceDispense'] = deviceDispenseId;\r

      \                    }\r

      \r

      \                    return acc;\r

      \                }, {});\r

      \r

      \                // Iterate over the links object and set globals
      dynamically\r

      \                Object.entries(links).forEach(([entity, value]) => {\r

      \                    const globalName = `${entity.charAt(0).toUpperCase()
      + entity.slice(1)}ID`;\r

      \                    pm.globals.set(globalName, value);\r

      \                });\r

      \r

      \r

      \                displayResponse('Create Device Dispense Job Response
      Details', responseBody.data);\r

      \            } else {\r

      \r

      \                // Retrieve the current retry count\r

      \                let retryCount =
      parseInt(pm.environment.get('retryCount')) || 0;\r

      \r

      \                if (retryCount < maxRetries) {\r

      \                    // Increment the retry count and set it back to the
      environment\r

      \                    retryCount++;\r

      \                    pm.environment.set('retryCount', retryCount);\r

      \r

      \                    console.log(`Retrying... Attempt ${retryCount}`);\r

      \r

      \                    setTimeout(() => {\r

      \                        checkJobStatus(jobId);\r

      \                    }, 1000);\r

      \r

      \                    displayResponse('Create Device Dispense Job Response
      Details2', responseBody.data);\r

      \r

      \                } else {\r

      \                    console.log('Maximum retry limit reached.');\r

      \                    displayResponse(responseBody.data.error ? 'Create
      Device Dispense Error Details' : 'Final Job Status Check',
      responseBody.data);\r

      \                }\r

      \            }\r

      \        }\r

      \    });\r

      }\r

      \r

      // Call the function with the job ID\r

      checkJobStatus(number);"
    language: text/javascript
order: 1000
