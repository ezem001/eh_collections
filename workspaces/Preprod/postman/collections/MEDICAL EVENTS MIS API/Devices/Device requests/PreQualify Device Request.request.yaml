  type: text
  content: |-
    {
        "device_request": {
            "intent": "order",
            "quantity": {
                "value": 30,
                "system": "device_unit",
                "code": "piece"
            },
            "code": {
                "coding": [
                    {
                        "system": "device_definition_classification_type",
                        "code": "W0101060101"
                    }
                ]
            },
            // "code_reference": {
