$kind: http-request
url: "{{host}}/api/patients/{{patient_id_from_episode}}/device_requests/prequalify"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  x-custom-psk: "{{x-custom-psk}}"
