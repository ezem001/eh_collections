            //     }
            // },
            "encounter": {
                "identifier": {
                    "type": {
                        "coding": [
                            {
                                "system": "eHealth/resources",
                                "code": "encounter"
                            }
                        ]
                    },
                    "value": "{{jobEncounterID}}"
                }
            },
            "requester": {
                "identifier": {
                    "type": {
                        "coding": [
                            {
                                "system": "eHealth/resources",
                                "code": "employee"
                            }
                        ]
                    },
                    "value": "{{user_id}}"
                }
            },
            "authored_on": "2026-03-17T11:10:16.000000+00:00",
            "occurrence_period": {
                "start": "2026-03-19T11:00:00.000Z",
                "end": "2026-04-14T08:05:00.000Z"
