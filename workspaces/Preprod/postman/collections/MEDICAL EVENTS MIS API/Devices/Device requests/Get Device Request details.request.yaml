$kind: http-request
url: "{{host}}/api/patients/{{patient_id_from_episode}}/device_requests/{{JobDe\
  viceRequestID}}"
method: GET
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  api-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
scripts:
  - type: afterResponse
    code: >
      const resData = pm.response.json().data;


      // Варіант 1: Відкликання DeviceRequest

      const jsonRevoked = {
        ...resData,
        status: "revoked",
        status_reason: {
          coding: [
            {
              system: "device_request_revoke_reasons",
              code: "impossible_completion"
            }
          ]
        }
      };


      // Варіант 2: Помилковий DeviceRequest

      const jsonError = {
        ...resData,
        status: "entered_in_error",
        status_reason: {
          coding: [
            {
              system: "device_request_mark_in_error_reasons",
              code: "entered_in_error"
            }
          ]
        }
      };


      pm.visualizer.set(`
        <style>
          .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
          }
          .block {
            flex: 1 1 45%;
            min-width: 300px;
          }
          pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 500px;
            overflow: auto;
          }
          button {
            margin: 10px 0;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: #e0e0e0;
            cursor: pointer;
          }
          button:hover {
            background-color: #d0d0d0;
          }
          h3 {
            margin-bottom: 5px;
          }
        </style>

        <div class="container">
          <div class="block">
            <h3>JSON для <u>відкликання</u> DeviceRequest</h3>
            <button onclick="copyToClipboard('json1')">Скопіювати JSON (revoked)</button>
            <pre id="json1">{{jsonRevoked}}</pre>
          </div>
          <div class="block">
            <h3>JSON для <u>помилкового</u> DeviceRequest</h3>
            <button onclick="copyToClipboard('json2')">Скопіювати JSON (entered_in_error)</button>
            <pre id="json2">{{jsonError}}</pre>
          </div>
        </div>

        <script>
          function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              alert('JSON скопійовано!');
            } catch (err) {
              alert('Помилка копіювання: ' + err);
            }
            document.body.removeChild(textArea);
          }
        </script>
      `, {
        jsonRevoked: JSON.stringify(jsonRevoked, null, 2),
        jsonError: JSON.stringify(jsonError, null, 2)
      });
    language: text/javascript
order: 6000
