$kind: http-request
url: "{{host}}/api/patients/{{patient_id_from_episode}}/service_requests/prequalify"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  API-key: "{{mis_client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: "{\r

    \    \"service_request\": {\r

    \        \"status\": \"active\",\r

    \        \"intent\": \"order\",\r

    \        \"priority\": \"routine\",\r

    \        \"category\": {\r

    \            \"coding\": [\r

    \                {\r

    \                    \"system\":
    \"eHealth/SNOMED/service_request_categories\",\r

    \                    \"code\": \"procedure\"\r

    \                }\r

    \            ]\r

    \        },\r

    \        \"code\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"service\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"40b2dfdf-7623-4fa5-bbfb-58a6b651ff0c\"\r

    \            }\r

    \        },\r

    \        \"context\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"encounter\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{jobEncounterID}}\"\r

    \            }\r

    \        },\r

    \        \"occurrence_period\": {\r

    \            \"start\": \"2026-02-19T10:45:16.000Z\",\r

    \            \"end\": \"2026-02-28T11:00:00.000Z\"\r

    \        },\r

    \        \"requester_employee\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"employee\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{user_id}}\"\r

    \            }\r

    \        },\r

    \        \"requester_legal_entity\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"legal_entity\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{user_legal_entity}}\"\r

    \            }\r

    \        },\r

    \        \"quantity\": {\r

    \            \"value\": 56,\r

    \            \"system\": \"SERVICE_UNIT\",\r

    \            \"code\": \"PIECE\"\r

    \        }\r

    \    },\r

    \    \"programs\": [\r

    \        {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"medical_program\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"963b1410-17e8-4407-b700-044c9fc555ca\"\r

    \            }\r

    \        }\r

    \    ]\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"PreQualify Service Request Response status code is 200\",
      function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });\r

      \r

      pm.test(\"PreQualify Service Request status is VALID\", function () {\r

      \    const resData = pm.response.json();\r

      \    console.log(resData.data[0].status)\r

      \    const status = resData.data[0].status;\r

      \    pm.expect(status).to.eql(\"VALID\");\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: "// Retrieve the URL from the global variable\r

      const url = pm.globals.get('jobEncounterID');\r

      \r

      // Check if the URL is defined and contains the expected format\r

      if (url && url.includes('encounters/')) {\r

      \    // Extract the ID after 'encounters/'\r

      \    const parts = url.split('encounters/');\r

      \    if (parts.length > 1) {\r

      \        const jobEncounterID = parts[1];\r

      \        \r

      \        // Log the extracted ID to the console (for debugging purposes)\r

      \        console.log('Extracted jobEncounterID:', jobEncounterID);\r

      \        \r

      \        // Optionally, set the extracted ID as an environment variable\r

      \        pm.globals.set('encounter_extracted_id', jobEncounterID);\r

      \    } else {\r

      \        console.error('The URL does not contain the expected format.');\r

      \    }\r

      } else {\r

      \    console.error('The global variable jobEncounterID is not defined or
      does not contain the expected format.');\r

      }"
    language: text/javascript
order: 1000
