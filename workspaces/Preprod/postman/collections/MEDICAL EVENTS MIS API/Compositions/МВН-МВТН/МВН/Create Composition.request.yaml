  Authorization: Bearer {{access_token}}
  Content-Type: application/json
  X-Custom-PSK: a2ffb0888561e50d5a868faf56ea5708619b7ecc03b5bd21ff1a50f37a3f430e
body:
  type: json
  content: "{\r

    \    \"category\": {\r

