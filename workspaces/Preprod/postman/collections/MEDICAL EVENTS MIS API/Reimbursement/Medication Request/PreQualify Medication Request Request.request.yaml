$kind: http-request
url: "{{host}}/api/medication_request_requests/prequalify"
method: POST
headers:
  Content-Type: application/json
  api-key: "{{mis_client_secret}}"
  Authorization: Bearer {{access_token}}
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: "{\r

    \    \"medication_request_request\": {\r

    \        \"person_id\": \"{{patient_id_from_episode}}\",\r

    \        \"employee_id\": \"{{user_id}}\",\r

    \        \"division_id\": \"{{user_division_id}}\",\r

    \        \"created_at\": \"2026-03-04\",\r

    \        \"started_at\": \"2026-03-05\",\r

    \        \"ended_at\": \"2026-03-07\",\r

    \        \"medication_id\": \"31de247a-53f5-4bff-965d-44cc2b14c459\",\r

    \        \"medication_qty\": 5,\r

    \        \"intent\": \"order\",\r

    \        \"category\": \"community\",\r

    \        \"context\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"encounter\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{jobEncounterID}}\"\r

    \            }\r

    \        },\r

    \        \"dosage_instruction\": [\r

    \            {\r

    \                \"sequence\": 1,\r

    \                \"text\": \"0.25mg PO every 6-12 hours as needed for menses
    from Jan 15-20, 2015.  Do not exceed more than 4mg per day\",\r

    \                \"patient_instruction\": \"0.25mg PO every 6-12 hours as
    needed for menses from Jan 15-20, 2015.  Do not exceed more than 4mg per
    day\",\r

    \                \"max_dose_per_period\": {\r

    \                    \"numerator\": {\r

    \                        \"value\": 0,\r

    \                        \"unit\": \"mg\",\r

    \                        \"system\": \"eHealth/ucum/units\",\r

    \                        \"code\": \"mg\"\r

    \                    },\r

    \                    \"denominator\": {\r

    \                        \"value\": 0,\r

    \                        \"unit\": \"mg\",\r

    \                        \"system\": \"eHealth/ucum/units\",\r

    \                        \"code\": \"mg\"\r

    \                    }\r

    \                },\r

    \                \"max_dose_per_administration\": {\r

    \                    \"value\": 0,\r

    \                    \"unit\": \"mg\",\r

    \                    \"system\": \"eHealth/ucum/units\",\r

    \                    \"code\": \"mg\"\r

    \                }\r

    \            }\r

    \        ]\r

    \    },\r

    \    \"programs\": [\r

    \        {\r

    \            \"id\": \"5562904e-100f-11ee-be56-0242ac120002\"\r

    \        }\r

    \    ]\r

    }"
scripts:
  - type: beforeRequest
    code: "// Retrieve the URL from the global variable\r

      const url = pm.globals.get('jobEncounterID');\r

      \r

      // Check if the URL is defined and contains the expected format\r

      if (url && url.includes('encounters/')) {\r

      \    // Extract the ID after 'encounters/'\r

      \    const parts = url.split('encounters/');\r

      \    if (parts.length > 1) {\r

      \        const jobEncounterID = parts[1];\r

      \        \r

      \        // Log the extracted ID to the console (for debugging purposes)\r

      \        console.log('Extracted jobEncounterID:', jobEncounterID);\r

      \        \r

      \        // Optionally, set the extracted ID as an environment variable\r

      \        pm.globals.set('encounter_extracted_id', jobEncounterID);\r

      \    } else {\r

      \        console.error('The URL does not contain the expected format.');\r

      \    }\r

      } else {\r

      \    console.error('The global variable jobEncounterID is not defined or
      does not contain the expected format.');\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      \r

      pm.test(\"PreQualify Medication Request Request Response status code is
      200\", function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });\r

      \r

      pm.test(\"PreQualify Medication Request Request status is VALID\",
      function () {\r

      \    const resData = pm.response.json();\r

      \    console.log(resData.data[0].status)\r

      \    const status = resData.data[0].status;\r

      \    pm.expect(status).to.eql(\"VALID\");\r

      });\r

      \r

      pm.test(\"PreQualify Medication Request Response care plan and activity
      with the same medical program are present\", function () {\r

      \   \r

      \    console.log(resData.data[0].rejection_reason)\r

      \    const rejectionReason = resData.data[0].rejection_reason;\r

      \    pm.expect(rejectionReason).to.be.eql('')\r

      });"
    language: text/javascript
order: 1000
