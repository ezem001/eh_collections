  type: text
  content: |2-
     {
       "id":"{{episode_id}}",
       "name":"Епізод QA_28",
       "status":"active",
       "type":{
          "system":"eHealth/episode_types",
          "code":"TREATMENT"
       },
       "period":{
          "start":"{{episode_start_date}}"
       },
       "managing_organization": {
    	    "identifier": {
    	      "type": {
    	        "coding": [
    	          {
    	            "system": "eHealth/resources",
    	            "code": "legal_entity"
    	          }
    	        ]
    	      },
    	      "value":"{{user_legal_entity}}"
    	    }
       },
       "care_manager": {
    	    "identifier": {
    	      "type": {
    	        "coding": [
    	          {
    	            "system": "eHealth/resources",
