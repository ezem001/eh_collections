      //         console.error(err);\r

      //         throw new Error(err);\r

      //     }\r

      // })();\r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      //
      -------------------------------------------------------------------------\
      -------------------\r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      \r

      const uuid = require('uuid');\r

      \r

      // -------------------------\r

      // Генеруємо encounter і visit\r

      // -------------------------\r

      const encounterId = uuid.v4();\r

      const visitId = uuid.v4();\r

      pm.globals.set(\"encounter_dummy_id\", encounterId);\r

      pm.globals.set(\"visit_id\", visitId);\r

      \r

      // -------------------------\r

      // Розбираємо body\r

      // -------------------------\r

      let parsedBody;\r

      try {\r

      \    parsedBody = JSON.parse(pm.request.body.raw);\r

      } catch (e) {\r

      \    throw new Error(\"❌ Body is not valid JSON\");\r

      }\r

      if (!parsedBody.observations || !Array.isArray(parsedBody.observations))
      {\r

      \    throw new Error(\"❌ No observations in request body\");\r

      }\r

      \r

      // -------------------------\r

      // Конфігурація\r

      // -------------------------\r

      const baseUrl = pm.globals.get(\"host\");\r

      const headers = {\r

      \    \"X-Custom-PSK\": pm.globals.get(\"x-custom-psk\"),\r

      \    \"api-key\": pm.environment.get(\"mis_client_secret\")\r

      };\r

      \r

      const getRandomElement = (arr) => arr[Math.floor(Math.random() *
      arr.length)];\r

      const getRandomInt = (min, max) => {\r

      \    const mn = Number(min ?? 0);\r

      \    const mx = Number(max ?? 0);\r

      \    if (!Number.isFinite(mn) || !Number.isFinite(mx)) return 0;\r

      \    if (mx < mn) return mn;\r

      \    return Math.floor(mn + Math.random() * (mx - mn + 1));\r

      };\r

      \r

      // -------------------------\r

      // Кеш словників\r

      // -------------------------\r

      const dictionaryCache = {};\r

      \r

      // -------------------------\r

      // Отримання словника з кешем\r

      // -------------------------\r

      async function fetchDictionary(dictName) {\r

      \    if (dictionaryCache[dictName]) return dictionaryCache[dictName];\r

      \r

      \    return new Promise((resolve, reject) => {\r

      \        pm.sendRequest(\r

      \            { url:
      `${baseUrl}/api/v2/dictionaries?name=${encodeURIComponent(dictName)}`,
      method: \"GET\", header: headers },\r

      \            (err, res) => {\r

      \                if (err) return reject(\"❌ Error fetching dictionary: \"
      + err);\r

      \r

      \                const values = res.json()?.data?.[0]?.values;\r

      \                if (!values || !values.length) return reject(`❌
      Dictionary ${dictName} has no values`);\r

      \r

      \                dictionaryCache[dictName] = values[0]; // беремо перший
      елемент\r

      \                resolve(dictionaryCache[dictName]);\r

      \            }\r

      \        );\r

      \    });\r

      }\r

      \r

      // -------------------------\r

      // Хелпери для пошуку умовних конфігів\r

      // -------------------------\r

      const findByComponentCode = (arr, code) =>\r

      \    Array.isArray(arr) ? arr.find(x => x?.condition?.component_code?.code
      === code) : undefined;\r

      \r

      const extractAllowedExtensionCodes = (allowedExt) => {\r

      \    // allowedExt формат:\r

      \    // COMPONENTS_ALLOWED_EXTENSIONS: [ { check: [\"item_weight\"] }, ...
      ]\r

      \    if (!Array.isArray(allowedExt)) return [];\r

      \    return allowedExt.flatMap(x => Array.isArray(x?.check) ? x.check :
      []).filter(Boolean);\r

      };\r

      \r

      // -------------------------\r

      // Обробка одного OBS\r

      // -------------------------\r

      const processObservation = async (obs) => {\r

      \    const obsCode = obs?.code?.coding?.[0]?.code;\r

      \    if (!obsCode) throw new Error(\"❌ Cannot extract observation
      code\");\r

      \r

      \    // Отримуємо конфігурацію\r

      \    const configRes = await new Promise((resolve, reject) => {\r

      \        pm.sendRequest(\r

      \            { url:
      `${baseUrl}/api/observation_configurations?code=${encodeURIComponent(obsC\
      ode)}`, method: \"GET\", header: headers },\r

      \            (err, res) => {\r

      \                if (err) return reject(\"❌ Error fetching observation
      config: \" + err);\r

      \                const settings = res.json()?.data?.[0]?.settings;\r

      \                if (!settings) return reject(\"❌ No settings in
      observation configuration\");\r

      \                resolve(settings);\r

      \            }\r

      \        );\r

      \    });\r

      \r

      \    const {\r

      \        COMPONENTS_REQUIRED: reqs = { check: [] },\r

      \        COMPONENTS_BINDING: bindings = [],\r

      \        COMPONENTS_SCORE: scores = [],\r

      \        COMPONENTS_ALLOWED_EXTENSIONS: allowedExt = [],\r

      \        COMPONENTS_TYPE = [],\r

      \        COMPONENTS_QUANTITY_CODES = [],\r

      \        COMPONENT_QUANTITY_BOUNDARIES = [],\r

      \        RESULT_TYPE,\r

      \        RESULT_BINDING,\r

      \        RESULT_QUANTITY_CODES,\r

      \        RESULT_BOUNDARIES,\r

      \        RESULT_SCORE_CALCULATION\r

      \    } = configRes;\r

      \r

      \    const resultType = RESULT_TYPE?.check; // \"codeable_concept\" |
      \"quantity\"\r

      \    const allowedExtensionCodes =
      extractAllowedExtensionCodes(allowedExt);\r

      \r

      \    // -------------------------\r

      \    //  COMPONENTS\r

      \    // -------------------------\r

      \    let components = [];\r

      \r

      \    for (const req of (reqs.check || [])) {\r

      \        const reqCode = req?.code;\r

      \        const reqSystem = req?.system;\r

      \r

      \        const compTypeObj = findByComponentCode(COMPONENTS_TYPE,
      reqCode);\r

      \        const compType = compTypeObj?.check || \"codeable_concept\";\r

      \r

      \        // ---------- COMPONENT TYPE: quantity ----------\r

      \        if (compType === \"quantity\") {\r

      \            const qtyCodeObj =
      findByComponentCode(COMPONENTS_QUANTITY_CODES, reqCode);\r

      \            const qtyCodeInfo = qtyCodeObj?.check?.[0]; // {code,
      system}\r

      \r

      \            // boundaries саме під компонент + quantity_code\r

      \            const boundaryObj =
      (Array.isArray(COMPONENT_QUANTITY_BOUNDARIES) ?
      COMPONENT_QUANTITY_BOUNDARIES : [])\r

      \                .find(b =>\r

      \                    b?.condition?.component_code?.code === reqCode &&\r

      \                    b?.condition?.quantity_code?.code ===
      qtyCodeInfo?.code &&\r

      \                    b?.condition?.quantity_code?.system ===
      qtyCodeInfo?.system\r

      \                );\r

      \r

      \            const min = boundaryObj?.check?.min ?? 0;\r

      \            const max = boundaryObj?.check?.max ?? 0;\r

      \            const value = getRandomInt(min, max);\r

      \r

      \            // якщо qtyCodeInfo нема — все одно не ламаємось, але
      value_quantity не сформуємо коректно\r

      \            if (qtyCodeInfo?.code && qtyCodeInfo?.system) {\r

      \                components.push({\r

      \                    code: { coding: [{ system: reqSystem, code: reqCode
      }] },\r

      \                    value_quantity: {\r

      \                        value,\r

      \                        code: qtyCodeInfo.code,\r

      \                        unit: qtyCodeInfo.code,\r

      \                        system: qtyCodeInfo.system\r

      \                    }\r

      \                });\r

      \            } else {\r

      \                components.push({\r

      \                    code: { coding: [{ system: reqSystem, code: reqCode
      }] }\r

      \                });\r

      \            }\r

      \r

      \            continue;\r

      \        }\r

      \r

      \        // ---------- COMPONENT TYPE: codeable_concept (залишаємо як є)
      ----------\r

      \        const bind = (Array.isArray(bindings) ? bindings : []).find(b =>
      b?.condition?.component_code?.code === reqCode);\r

      \        if (!bind) {\r

      \            components.push({\r

      \                code: { coding: [{ system: reqSystem, code: reqCode }]
      }\r

      \            });\r

      \            continue;\r

      \        }\r

      \r

      \        const answerSystem = bind.check?.[0];\r

      \r

      \        const scoresForSystem = (Array.isArray(scores) ? scores :
      []).filter(s => s?.condition?.answer?.system === answerSystem);\r

      \        const chosenScore = getRandomElement(scoresForSystem);\r

      \r

      \        let answerCode = chosenScore?.condition?.answer?.code ||
      \"LA12302-8\";\r

      \        const valueDecimal = chosenScore?.check ?? 0;\r

      \r

      \        // spine_level_codes → code зі словника\r

      \        if (answerSystem === \"eHealth/spine_level_codes\") {\r

      \            const dictEntry = await
      fetchDictionary(\"eHealth/spine_level_codes\");\r

      \            answerCode = dictEntry.code;\r

      \        }\r

      \r

      \        // extensions (якщо allowed extensions є)\r

      \        let extensions;\r

      \        if (allowedExtensionCodes.length > 0) {\r

      \            extensions = allowedExtensionCodes.map(codeStr => ({\r

      \                code: codeStr,\r

      \                value_decimal: valueDecimal\r

      \            }));\r

      \        }\r

      \r

      \        components.push({\r

      \            code: { coding: [{ system: reqSystem, code: reqCode }] },\r

      \            value_codeable_concept: {\r

      \                coding: [{\r

      \                    system: answerSystem,\r

      \                    code: answerCode,\r

      \                    ...(extensions ? { extension: extensions } : {})\r

      \                }]\r

      \            }\r

      \        });\r

      \    }\r

      \r

      \    obs.components = components;\r

      \r

      \    // -------------------------\r

      \    //  RESULT_TYPE: гарантуємо тільки ОДНЕ value_*\r

      \    // -------------------------\r

      \    if (resultType === \"codeable_concept\") {\r

      \        // прибираємо quantity якщо був\r

      \        if (obs.value_quantity !== undefined) delete
      obs.value_quantity;\r

      \r

      \        // формуємо value_codeable_concept\r

      \        if (RESULT_BINDING?.check?.[0]) {\r

      \            const dictName = RESULT_BINDING.check[0];\r

      \            const dictEntry = await fetchDictionary(dictName);\r

      \r

      \            obs.value_codeable_concept = {\r

      \                coding: [{ code: dictEntry.code, system: dictName }]\r

      \            };\r

      \        } else {\r

      \            if (obs.value_codeable_concept !== undefined) delete
      obs.value_codeable_concept;\r

      \        }\r

      \r

      \        return obs;\r

      \    }\r

      \r

      \    if (resultType === \"quantity\") {\r

      \        // прибираємо codeable_concept якщо був\r

      \        if (obs.value_codeable_concept !== undefined) delete
      obs.value_codeable_concept;\r

      \r

      \        const quantityCode = RESULT_QUANTITY_CODES?.[0]?.check?.[0];\r

      \        if (!quantityCode) {\r

      \            if (obs.value_quantity !== undefined) delete
      obs.value_quantity;\r

      \            return obs;\r

      \        }\r

      \r

      \        let value = 0;\r

      \r

      \        // RESULT_SCORE_CALCULATION = SUM\r

      \        if (RESULT_SCORE_CALCULATION?.check === \"SUM\") {\r

      \            // 1) ПЕРШИЙ ПРІОРИТЕТ: сума components.value_quantity.value
      (WHODAS)\r

      \            const componentQuantityValues = (obs.components || [])\r

      \                .map(c => Number(c?.value_quantity?.value))\r

      \                .filter(v => Number.isFinite(v));\r

      \r

      \            if (componentQuantityValues.length > 0) {\r

      \                value = componentQuantityValues.reduce((s, v) => s + v,
      0);\r

      \            } else {\r

      \                // 2) FALLBACK: сума extensions.value_decimal (Barthel та
      подібне)\r

      \                const allExtensions = (obs.components || []).flatMap(comp
      =>\r

      \                    (comp?.value_codeable_concept?.coding ||
      []).flatMap(coding =>\r

      \                        Array.isArray(coding?.extension) ?
      coding.extension : []\r

      \                    )\r

      \                );\r

      \r

      \                value = allExtensions.reduce((sum, ext) => sum +
      (Number(ext?.value_decimal) || 0), 0);\r

      \            }\r

      \        } else {\r

      \            // якщо не SUM — можна використати boundaries result (як
      fallback),\r

      \            // але щоб нічого не ламати, залишимо 0, або clamp по
      RESULT_BOUNDARIES якщо хочеш.\r

      \            value = 0;\r

      \        }\r

      \r

      \        // За бажанням (не обов'язково): clamp по RESULT_BOUNDARIES для
      цього quantity_code\r

      \        // (щоб не вийти за max/min загального результату)\r

      \        const rb = Array.isArray(RESULT_BOUNDARIES) ? RESULT_BOUNDARIES :
      [];\r

      \        const rbMatch = rb.find(x =>\r

      \            x?.condition?.quantity_code?.code === quantityCode.code &&\r

      \            x?.condition?.quantity_code?.system === quantityCode.system\r

      \        );\r

      \        if (rbMatch?.check) {\r

      \            const minR = Number(rbMatch.check.min);\r

      \            const maxR = Number(rbMatch.check.max);\r

      \            if (Number.isFinite(minR)) value = Math.max(value, minR);\r

      \            if (Number.isFinite(maxR)) value = Math.min(value, maxR);\r

      \        }\r

      \r

      \        obs.value_quantity = {\r

      \            value,\r

      \            code: quantityCode.code,\r

      \            unit: quantityCode.code,\r

      \            system: quantityCode.system\r

      \        };\r

      \r

      \        return obs;\r

      \    }\r

      \r

      \    // якщо RESULT_TYPE не очікуваний — прибираємо обидва, щоб не було
      сміття\r

      \    if (obs.value_quantity !== undefined) delete obs.value_quantity;\r

      \    if (obs.value_codeable_concept !== undefined) delete
      obs.value_codeable_concept;\r

      \r

      \    return obs;\r

      };\r

      \r

      // -------------------------\r

      //  Обробка ВСІХ OBS\r

      // -------------------------\r

      (async () => {\r

      \    try {\r

      \        await Promise.all(parsedBody.observations.map(obs =>
      processObservation(obs)));\r

      \r

      \        pm.request.body.update({\r

      \            mode: \"raw\",\r

      \            raw: JSON.stringify(parsedBody, null, 2),\r

      \            options: { raw: { language: \"json\" } }\r

      \        });\r

      \r

      \        console.log(\"✅ REQUEST BODY UPDATED:\",
      JSON.stringify(parsedBody));\r

      \    } catch (err) {\r

      \        console.error(err);\r

      \        throw new Error(err);\r

      \    }\r

      })();"
    language: text/javascript
