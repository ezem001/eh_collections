scripts:
  - type: afterResponse
    code: "const personFromEpisode = pm.globals.get('patient_id_from_episode') ||
      \"\";//або підставте id потрібного пацієнта!!!!\r

      const xCustomPsk = pm.globals.get('x-custom-psk');\r

      const apiKey = pm.environment.get('mis_client_secret');\r

      const host = pm.globals.get('host');\r

      const accessToken = pm.environment.get('access_token');\r

      \r

      const ENCOUNTER_ID = \"0f903dc0-d89a-47e9-b4f7-deab76b321ff\";\r

      \r

      const RESOURCE_IDS = {\r

      \    conditions: [\"9b4daa92-0011-4729-8f32-26a4cf82cd1f\"],\r

      \    observations: [\"\"],\r

      \    allergy_intolerances: [\"\"],\r

      \    immunizations: [\"\"],\r

      \    risk_assessments: [\"\"],\r

      \    devices: [\"\"],\r

      \    medication_statements: [\"\"],\r

      \    medication_administrations: [\"\"],\r

      \    diagnostic_reports: [\"\"],\r

      \    procedures: [\"\"],\r

      \    clinical_impressions: [\"\"],\r

      \    specimens: [\"\"],\r

      \    device_dispenses: [\"\"],\r

      \    device_associations: [\"\"],\r

      \    detected_issues: [\"\"]\r

      };\r

      \r

      function sendRequest(url, callback) {\r

      \    pm.sendRequest({\r

      \        url,\r

      \        method: \"GET\",\r

      \        header: {\r

      \            \"Content-Type\": \"application/json\",\r

      \            \"api-key\": apiKey,\r

      \            \"Authorization\": `Bearer ${accessToken}`,\r

      \            \"X-Custom-PSK\": xCustomPsk\r

      \        }\r

      \    }, callback);\r

      }\r

      \r

      function cleanResourceByType(type, resource) {\r

      \    const { inserted_at, updated_at, ...base } = resource.data;\r

      \r

      \    switch (type) {\r

      \        case \"conditions\":\r

      \            // Треба залишити verification_status і оновити його
      значення\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    verification_status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"observations\":\r

      \            delete base.interpretation;\r

      \            delete base.verification_status;\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"immunizations\":\r

      \            delete base.reactions;\r

      \            delete base.verification_status;\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"procedures\":\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        case \"device_dispenses\":\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\",\r

      \                    updated_at: updated_at\r

      \                }\r

      \            };\r

      \            case \"clinical_impressions\":\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \        default:\r

      \            return {\r

      \                data: {\r

      \                    ...base,\r

      \                    status: \"entered_in_error\"\r

      \                }\r

      \            };\r

      \    }\r

      }\r

      \r

      function getResourceUrl(resourceTypePlural, id) {\r

      \    return
      `${host}/api/patients/${personFromEpisode}/${resourceTypePlural}/${id}`;\r

      }\r

      \r

      function buildDisplayOutput(encounter, relatedResources) {\r

      \    const output = {\r

      \        encounter,\r

      \        ...relatedResources\r

      \    };\r

      \    pm.globals.set(\"Encounter_Full_Cancellation_Body\",
      JSON.stringify(output));\r

      \    displayResponse(\"🧾 Combined Encounter Cancellation Body\",
      output);\r

      }\r

      \r

      function displayResponse(title, data) {\r

      \    const html = `\r

      \    <h1>${title}</h1>\r

      \    <pre>${JSON.stringify(data, null, 2)}</pre>\r

      \  `;\r

      \    pm.visualizer.set(html);\r

      \    console.log(title, data);\r

      }\r

      \r

      let encounterCleaned = null;\r

      const cleanedResources = {};\r

