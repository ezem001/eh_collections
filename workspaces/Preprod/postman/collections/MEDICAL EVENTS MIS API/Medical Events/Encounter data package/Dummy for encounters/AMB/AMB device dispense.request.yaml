scripts:
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      console.log('create encounter sign content', resData)\r

      \r

      pm.test(`Encounter content sign success. Response status is 200
      ${JSON.stringify(resData, null, 2)}`, function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      \    pm.expect(resData).to.have.property('signed_content');\r

      \    pm.globals.set('encounter_signed_content', resData.signed_content);\r

      });\r\n"
    language: text/javascript
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const encounterId = uuid.v4();\r

      const visitId = uuid.v4();\r

      const conditionId = uuid.v4();\r

      const deviceDispenseRequestId = uuid.v4();\r

      \r

      \r

      // ---------------------------------------------------\r

      \r

      pm.globals.set(\"encounter_dummy_id\", encounterId);\r

      pm.globals.set(\"condition_id\", conditionId);\r

      pm.globals.set(\"visit_id\", visitId);\r

      pm.globals.set(\"dummy_device_dispense_request_id\",
      deviceDispenseRequestId);\r

      \r\n"
    language: text/javascript
order: 8000
