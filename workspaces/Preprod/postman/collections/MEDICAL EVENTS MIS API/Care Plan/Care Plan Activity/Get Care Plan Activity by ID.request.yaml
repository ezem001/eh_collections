      /***********************
       * Visualizer: Notebook Log + Generated JSON (one page)
       * Copy -> copies ONLY Request+Response
       ***********************/

      // --------------------- Config ---------------------

      const MASK_SENSITIVE = true;

      const SENSITIVE_HEADERS = new Set(['authorization', 'api-key',
      'x-custom-psk', 'cookie']);


      const DROP_REQUEST_HEADERS = new Set([
        'accept',
        'accept-encoding',
        'connection',
        'content-type',
        'postman-token',
        'user-agent',
        'content-length',
        'host' // keep only "Host:" line
      ]);


      // --------------------- Helpers ---------------------

      function esc(s) {
        return String(s ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;');
      }


      function safeJsonParse(text) {
        try { return JSON.parse(text); } catch { return null; }
      }


      function normalizeHeaders(headersObjOrArr) {
        if (!headersObjOrArr) return {};
        if (typeof headersObjOrArr?.toObject === 'function') return headersObjOrArr.toObject();

        const out = {};
        if (Array.isArray(headersObjOrArr)) {
          headersObjOrArr.forEach(h => {
            if (!h) return;
            const k = (h.key || h.name || '').toString();
            const v = (h.value ?? '').toString();
            if (k) out[k] = v;
          });
          return out;
        }

        if (typeof headersObjOrArr === 'object') {
          Object.keys(headersObjOrArr).forEach(k => out[k] = String(headersObjOrArr[k]));
        }
        return out;
      }


      function shouldDropHeader(k) {
        const key = String(k || '').toLowerCase().trim();
        if (!key) return true;
        return DROP_REQUEST_HEADERS.has(key);
      }


      function maskHeaderValue(key, value) {
        if (!MASK_SENSITIVE) return value;

        const k = String(key || '').toLowerCase().trim();
        if (!SENSITIVE_HEADERS.has(k)) return value;

        if (k === 'authorization') return 'Bearer ***';
        if (!value) return '***';

        const tail = value.length > 6 ? value.slice(-6) : value;
        return `***…${tail}`;
      }


      function formatRequestHeaders(headers) {
        const obj = normalizeHeaders(headers);
        const keys = Object.keys(obj)
          .filter(k => !shouldDropHeader(k))
          .sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

        if (!keys.length) return '';
        return keys.map(k => `${k}: ${maskHeaderValue(k, obj[k])}`).join('\n');
      }


      function getHost(url) {
        if (!url) return '';
        if (typeof url === 'string') {
          try { return new URL(url).host; } catch { return ''; }
        }
        if (url.host) {
          if (Array.isArray(url.host)) return url.host.join('.');
          return String(url.host);
        }
        if (url.toString) {
          try { return new URL(url.toString()).host; } catch { return ''; }
        }
        return '';
      }


      function getPathWithQuery(url) {
        if (!url) return '/';

        if (typeof url === 'string') {
          try {
            const u = new URL(url);
            return u.pathname + (u.search || '');
          } catch {
            return url;
          }
        }

        const path = Array.isArray(url.path) ? '/' + url.path.join('/') : (url.pathname || '/');

        if (Array.isArray(url.query) && url.query.length) {
          const qs = url.query
            .filter(q => q && q.key)
            .map(q => `${encodeURIComponent(q.key)}=${encodeURIComponent(q.value ?? '')}`)
            .join('&');
          return `${path}?${qs}`;
        }

        return path || '/';
      }


      function getPmRequestBody(pmReq) {
        try {
          const body = pmReq?.body;
          if (!body) return '';
          if (body.mode === 'raw') return body.raw || '';
          return '';
        } catch {
          return '';
        }
      }


      function stringifyMaybeJson(text) {
        if (!text) return '';
        const j = safeJsonParse(text);
        return j ? JSON.stringify(j, null, 2) : text;
      }


      // Response: show {data, error, meta} only

      function responseDataErrorMetaOnly(text) {
        const j = safeJsonParse(text);
        if (!j) return text;

        const out = {
          data: Object.prototype.hasOwnProperty.call(j, 'data') ? j.data : undefined,
          error: Object.prototype.hasOwnProperty.call(j, 'error') ? j.error : undefined,
          meta: Object.prototype.hasOwnProperty.call(j, 'meta') ? j.meta : undefined
        };
        Object.keys(out).forEach(k => out[k] === undefined && delete out[k]);

        return JSON.stringify(out, null, 2);
      }


      function buildRawRequest({ method, url, headers, body }) {
        const host = getHost(url);
        const path = getPathWithQuery(url);

        const headerText = formatRequestHeaders(headers);
        const bodyText = body ? stringifyMaybeJson(body) : '';

        return [
          `${(method || 'GET').toUpperCase()} ${path || '/'} HTTP/1.1`,
          host ? `Host: ${host}` : null,
          headerText || null,
          bodyText ? `\n${bodyText}` : null
        ].filter(Boolean).join('\n');
      }


      // --------------------- Notebook Log ---------------------

      function buildNotebookLog() {
        const title = pm.info.requestName || 'Main request';

        const reqRaw = buildRawRequest({
          method: pm.request.method,
          url: pm.request.url,
          headers: pm.request.headers,
          body: getPmRequestBody(pm.request)
        });

        const resRaw = responseDataErrorMetaOnly(pm.response.text());

        return [
          `${title}\n`,
          `[Request]\n\n${reqRaw}\n`,
          `\n[Response]\n\n${resRaw}\n`
        ].join('\n');
      }


      // --------------------- Generated JSON ---------------------

      function buildGeneratedJsonBlock() {
        let parsed = null;
        try { parsed = pm.response.json(); } catch { parsed = null; }

        if (!parsed || typeof parsed !== 'object') {
          return { title: 'Згенерований JSON', text: 'Response is not valid JSON — cannot generate finalJson.' };
        }

        const resData = parsed.data;
        if (!resData || typeof resData !== 'object') {
          return { title: 'Згенерований JSON', text: 'Response JSON has no "data" object — cannot generate finalJson.' };
        }

        const finalJson = {
        ...resData,
        detail: {
          ...resData.detail,
          status_reason: {
            coding: [
              {
                system: "eHealth/care_plan_activity_cancel_reasons",
                code: "typo"
              }
            ]
          }
        }
      };

        return { title: 'Згенерований JSON', text: JSON.stringify(finalJson, null, 2) };
      }


      // --------------------- Render ---------------------

      (function renderAll() {
        const notebookLog = buildNotebookLog();
        const gen = buildGeneratedJsonBlock();

        const html = `
      <div style="display:flex; gap:8px; align-items:center;
      margin-bottom:8px;">
        <button id="copyLogBtn">Copy</button>
        <button id="copyGenBtn">Copy entered_in_error JSON</button>
        <span id="copyMsg" style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:12px;"></span>
      </div>


      <textarea id="logText" style="position:absolute; left:-9999px;
      top:-9999px;">${esc(notebookLog)}</textarea>

      <textarea id="genText" style="position:absolute; left:-9999px;
      top:-9999px;">${esc(gen.text)}</textarea>


      <pre style="margin:0; white-space:pre; font-family: ui-monospace,
      SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px;
      line-height: 1.35;">

      ${esc(notebookLog)}

      </pre>


      <pre style="margin-top:10px; white-space:pre; font-family: ui-monospace,
      SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px;
      line-height: 1.35;">

      ${esc(gen.title + '\\n\\n' + gen.text)}

      </pre>


      <script>

      (function () {
        const msg = document.getElementById('copyMsg');
        const logTa = document.getElementById('logText');
        const genTa = document.getElementById('genText');

        function setMsg(t) {
          msg.textContent = t || '';
          if (t) setTimeout(() => { msg.textContent = ''; }, 1200);
        }

        async function copyFrom(ta) {
          const text = ta.value || '';
          if (!text) return setMsg('Nothing to copy');
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
              return setMsg('Copied ✅');
            }
            ta.focus(); ta.select();
            const ok = document.execCommand('copy');
            return setMsg(ok ? 'Copied ✅' : 'Copy failed ❌');
          } catch (e) {
            try {
              ta.focus(); ta.select();
              const ok = document.execCommand('copy');
              return setMsg(ok ? 'Copied ✅' : 'Copy failed ❌');
            } catch {
              return setMsg('Copy failed ❌');
            }
          }
        }

        document.getElementById('copyLogBtn').addEventListener('click', () => copyFrom(logTa));
        document.getElementById('copyGenBtn').addEventListener('click', () => copyFrom(genTa));
      })();

      </script>
        `;

        pm.visualizer.set(html);
      })();
    language: text/javascript
