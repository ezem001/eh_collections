      \r

      // // ▶️ Trigger job check\r

      // checkJobStatus(jobId);\r

      \r

      /* =========================\r

      \   Helpers: Restore / Flow guard\r

      ========================= */\r

      \r

      function ensureFlowActive() {\r

      \  return pm.environment.get(\"device_dispense_flow_active\") ===
      \"true\"\r

      \      && pm.environment.get(\"device_dispense_switched\") === \"true\";\r

      }\r

      \r

      function restoreUserAndStop(reason) {\r

      \  const KEYS = [\"access_token\", \"user_division_id\", \"user_id\"];\r

      \r

      \  KEYS.forEach((k) => {\r

      \    const original = pm.environment.get(`original_${k}`);\r

      \    if (original !== undefined) pm.environment.set(k, original);\r

      \  });\r

      \r

      \  KEYS.forEach((k) => pm.environment.unset(`original_${k}`));\r

      \r

      \  pm.environment.unset(\"device_dispense_switched\");\r

      \  pm.environment.unset(\"device_dispense_flow_active\");\r

      \r

      \  console.log(\"♻ Restored original user. Reason:\", reason ||
      \"unknown\");\r

      \  pm.execution.setNextRequest(null);\r

      }\r

      \r

      /* =========================\r

      \   Your code (enhanced with safe-guards + restore on fail)\r

      ========================= */\r

      \r

      // Helper function: Capitalize and format path segment to Title Case\r

      function formatEntityTitle(pathSegment) {\r

      \  if (!pathSegment) return \"Job\";\r

      \  return pathSegment\r

      \    .split(\"_\")\r

      \    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))\r

      \    .join(\" \");\r

      }\r

      \r

      // Get dynamic entity name from URL path (e.g., 'encounters',
      'device_dispenses')\r

      const resourceType = pm.request.url.path[3]; // Dynamically detects
      resource\r

      const resourceLabel = formatEntityTitle(resourceType);\r

      \r

      // 🔧 Display JSON in Visualizer\r

      function displayResponse(title, data) {\r

      \  const html = `\r

      \        <h1>${title}</h1>\r

      \        <pre>${JSON.stringify(data, null, 2)}</pre>`;\r

      \  pm.visualizer.set(html);\r

      }\r

      \r

      console.log(resourceType);\r

      \r

      /* ---------- Guard: expected PATCH response status ---------- */\r

      /*\r

      \  Тут важливо: у тебе PATCH повертає job link, тобто має бути JSON
      body.\r

      \  Найчастіше це 200/201/202. Якщо у тебе точно 200 — постав тільки 200.\r

      */\r

      const expectedInitialCodes = [200, 201, 202];\r

      \r

      if (ensureFlowActive() &&
      !expectedInitialCodes.includes(pm.response.code)) {\r

      \  // покажемо body, щоб було видно причину\r

      \  displayResponse(`${resourceLabel} Unexpected response code`, {\r

      \    status: pm.response.code,\r

      \    body: pm.response.text(),\r

      \  });\r

      \r

      \  restoreUserAndStop(`${resourceLabel} initial request failed with
      ${pm.response.code}`);\r

      \r

      \  pm.test(`${resourceLabel} initial response must be
      ${expectedInitialCodes.join(\" / \")}`, function () {\r

      \    pm.expect.fail(`${resourceLabel} initial request failed with
      ${pm.response.code}`);\r

      \  });\r

      \r

      \  return;\r

      }\r

      \r

      /* ---------- Parse initial response safely ---------- */\r

      let resData;\r

      try {\r

      \  const resBody = pm.response.text();\r

      \  resData = JSON.parse(resBody);\r

      } catch (e) {\r

      \  displayResponse(`${resourceLabel} JSON parse error`, {\r

      \    error: e.message,\r

      \    raw: pm.response.text(),\r

      \  });\r

      \r

      \  if (ensureFlowActive()) restoreUserAndStop(`${resourceLabel} response
      is not valid JSON`);\r

      \r

      \  pm.test(`${resourceLabel} response must be valid JSON`, function () {\r

      \    pm.expect.fail(e.message);\r

      \  });\r

      \r

      \  return;\r

      }\r

      \r

      // ⛔ Show error if initial response has it\r

      if (resData && resData.error) {\r

      \  displayResponse(`${resourceLabel} Response Error Details`,
      resData.error);\r

      \r

      \  if (ensureFlowActive()) {\r

      \    restoreUserAndStop(`${resourceLabel} response contains error`);\r

      \    pm.test(`${resourceLabel} must not return error`, function () {\r

      \      pm.expect.fail(\"Response contains error\");\r

      \    });\r

      \    return;\r

      \  }\r

      }\r

      \r

      /* ---------- Extract Job ID from href safely ---------- */\r

      let href, jobId;\r

      try {\r

      \  href = resData?.data?.links?.[0]?.href;\r

      \  if (!href || !href.includes(\"/jobs/\")) throw new Error(\"No /jobs/
      link in response\");\r

      \  jobId = href.split(\"/jobs/\")[1];\r

      \  if (!jobId) throw new Error(\"Job ID extraction failed\");\r

      \  console.log(\"Extracted jobId:\", jobId);\r

      } catch (e) {\r

      \  displayResponse(`${resourceLabel} Missing job link`, {\r

      \    error: e.message,\r

      \    data: resData,\r

      \  });\r

      \r

      \  if (ensureFlowActive()) restoreUserAndStop(`${resourceLabel}: cannot
      extract job id`);\r

      \r

      \  pm.test(`${resourceLabel} must return job link`, function () {\r

      \    pm.expect.fail(e.message);\r

      \  });\r

      \r

      \  return;\r

      }\r

      \r

      // Init retry counter\r

      pm.environment.set(\"retryCount\", 0);\r

      \r

      // 🔄 Check job status recursively\r

      function checkJobStatus(jobId) {\r

      \  const url = `${pm.globals.get(\"host\")}/api/jobs/${jobId}`;\r

      \  const maxRetries = 3;\r

      \r

      \  pm.sendRequest(\r

      \    {\r

      \      method: \"GET\",\r

      \      url: url,\r

      \      header: {\r

      \        \"Content-Type\": \"application/json\",\r

      \        Authorization: `Bearer
      ${pm.environment.get(\"access_token\")}`,\r

      \        \"api-key\": `${pm.environment.get(\"mis_client_secret\")}`,\r

      \        \"X-Custom-PSK\": `${pm.globals.get(\"x-custom-psk\")}`,\r

      \      },\r

      \    },\r

      \    function (err, res) {\r

      \      pm.test(`${resourceLabel} job check response is 200 or 303`,
      function () {\r

      \        pm.expect([200, 303]).to.include(res.code);\r

      \      });\r

      \r

      \      if (err) {\r

      \        displayResponse(`${resourceLabel} Job Request Error`, { error:
      err.message });\r

      \r

      \        if (ensureFlowActive()) restoreUserAndStop(`${resourceLabel} job
      request error: ${err.message}`);\r

      \r

      \        pm.test(`${resourceLabel} job request must not error`, function
      () {\r

      \          pm.expect.fail(err.message);\r

      \        });\r

      \r

      \        return;\r

      \      }\r

      \r

      \      let responseBody;\r

      \      try {\r

      \        responseBody = res.json();\r

      \      } catch (e) {\r

      \        displayResponse(`${resourceLabel} Job JSON parse error`, {\r

      \          error: e.message,\r

      \          raw: res.text(),\r

      \        });\r

      \r

      \        if (ensureFlowActive()) restoreUserAndStop(`${resourceLabel} job
      response is not valid JSON`);\r

      \r

      \        pm.test(`${resourceLabel} job response must be valid JSON`,
      function () {\r

      \          pm.expect.fail(e.message);\r

      \        });\r

      \r

      \        return;\r

      \      }\r

      \r

      \      const jobStatus = responseBody?.data?.status;\r

      \      console.log(`${resourceLabel} Job Status:`, jobStatus);\r

      \r

      \      if (jobStatus === \"processed\") {\r

      \        // ✅ Success\r

      \        pm.test(`${resourceLabel} Job Processed (303 expected)`, function
      () {\r

      \          pm.expect(res.code).to.eql(303);\r

      \        });\r

      \r

      \        // Set global vars for result links (only the ID part)\r

      \        const links = (responseBody?.data?.links || []).reduce((acc,
      link) => {\r

      \          const parts = String(link.href || \"\").split(\"/\");\r

      \          const id = parts[parts.length - 1]; // last part (ID)\r

      \          if (!link.entity || !id) return acc;\r

      \r

      \          acc[link.entity] = acc[link.entity] || [];\r

      \          acc[link.entity].push(id);\r

      \          return acc;\r

      \        }, {});\r

      \r

      \        Object.entries(links).forEach(([entity, ids]) => {\r

      \          ids.forEach((id, index) => {\r

      \            const capitalizedEntity =\r

      \              entity.charAt(0).toUpperCase() +
      entity.slice(1).replace(\"_\", \"\");\r

      \            const globalName =\r

      \              ids.length === 1 ? `job${capitalizedEntity}ID` :
      `job${capitalizedEntity}ID_${index + 1}`;\r

      \            pm.globals.set(globalName, id);\r

      \          });\r

      \        });\r

      \r

      \        displayResponse(`${resourceLabel} Job Response Details`,
      responseBody.data);\r

      \        return;\r

      \      }\r

      \r

      \      // 🔁 Retry if not yet processed\r

      \      let retryCount = parseInt(pm.environment.get(\"retryCount\"), 10)
      || 0;\r

      \r

      \      if (retryCount < maxRetries) {\r

      \        retryCount++;\r

      \        pm.environment.set(\"retryCount\", retryCount);\r

      \        console.log(`Retrying ${resourceLabel} job... Attempt
      ${retryCount}/${maxRetries}`);\r

      \r

      \        displayResponse(`${resourceLabel} Job Status Pending`,
      responseBody.data);\r

      \        setTimeout(() => checkJobStatus(jobId), 1000);\r

      \        return;\r

      \      }\r

      \r

      \      // ❌ Max retries reached -> restore + stop\r

      \      console.warn(`❌ Max retries reached for ${resourceLabel} job.`);\r

      \      const finalTitle = responseBody?.data?.error\r

      \        ? `${resourceLabel} Job Error Details`\r

      \        : `Final ${resourceLabel} Job Status Check`;\r

      \r

      \      displayResponse(finalTitle, responseBody?.data || responseBody);\r

      \r

      \      if (ensureFlowActive()) {\r

      \        restoreUserAndStop(`${resourceLabel} job not processed after
      ${maxRetries} retries (status: ${jobStatus || \"unknown\"})`);\r

      \      }\r

      \r

      \      pm.test(`${resourceLabel} job must reach processed`, function ()
      {\r

      \        pm.expect.fail(`Job not processed after ${maxRetries} retries
      (status: ${jobStatus || \"unknown\"})`);\r

      \      });\r

      \    }\r

      \  );\r

      }\r

      \r

      // ▶️ Trigger job check\r

      checkJobStatus(jobId);\r\n"
