scripts:
  - type: beforeRequest
    code: "const uuid = require('uuid');\r

      const caraPlanActivityId = uuid.v4();\r

      \r

      pm.globals.set(\"care_plan_activity_id\", caraPlanActivityId);"
    language: text/javascript
  - type: afterResponse
    code: "const resData = pm.response.json();\r

      \r

      pm.test(`Care Plan Activity content sign success. Response status is 200
      ${JSON.stringify(resData, null, 2)}`, function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      \    pm.expect(resData).to.have.property('signed_content');\r

      \    pm.globals.set('care_plan_activity_signed_content',
      resData.signed_content);\r

      });\r

      \r

      \r

