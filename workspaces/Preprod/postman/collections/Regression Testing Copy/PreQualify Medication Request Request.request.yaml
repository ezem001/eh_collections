$kind: http-request
url: "{{host}}/api/medication_request_requests/prequalify"
method: POST
headers:
  Content-Type: application/json
  api-key: "{{mis_client_secret}}"
  Authorization: Bearer {{access_token}}
  x-custom-psk: "{{x-custom-psk}}"
body:
  type: text
  content: "{\r

    \    \"medication_request_request\": {\r

    \        \"person_id\": \"{{patient_for_regress}}\",\r

    \        \"employee_id\": \"{{user_id}}\",\r

    \        \"division_id\": \"{{user_division_id}}\",\r

    \        \"created_at\": \"{{medicationRequestCreatedAt}}\",\r

    \        \"started_at\": \"{{medicationRequestStartedAt}}\",\r

    \        \"ended_at\": \"{{medicationRequestEndedAt}}\",\r

    \        \"medication_id\": \"0505cdd8-73b6-4eb7-a79f-3063279b1d92\",\r

    \        \"medication_qty\": 30.0,\r

    \        \"intent\": \"order\",\r

    \        \"category\": \"community\",\r

    \        \"context\": {\r

    \            \"identifier\": {\r

    \                \"type\": {\r

    \                    \"coding\": [\r

    \                        {\r

    \                            \"system\": \"eHealth/resources\",\r

    \                            \"code\": \"encounter\"\r

    \                        }\r

    \                    ]\r

    \                },\r

    \                \"value\": \"{{jobEncounterID}}\"\r

    \            }\r

    \        },\r

    \        \"dosage_instruction\": [\r

    \            {\r

    \                \"sequence\": 1,\r

    \                \"text\": \"0.25mg PO every 6-12 hours as needed for menses
    from Jan 15-20, 2015.  Do not exceed more than 4mg per day\",\r

    \                \"patient_instruction\": \"0.25mg PO every 6-12 hours as
    needed for menses from Jan 15-20, 2015.  Do not exceed more than 4mg per
    day\",\r

    \                \"max_dose_per_period\": {\r

    \                    \"numerator\": {\r

    \                        \"value\": 0,\r

    \                        \"unit\": \"mg\",\r

    \                        \"system\": \"eHealth/ucum/units\",\r

    \                        \"code\": \"mg\"\r

    \                    },\r

    \                    \"denominator\": {\r

    \                        \"value\": 0,\r

    \                        \"unit\": \"mg\",\r

    \                        \"system\": \"eHealth/ucum/units\",\r

    \                        \"code\": \"mg\"\r

    \                    }\r

    \                },\r

    \                \"max_dose_per_administration\": {\r

    \                    \"value\": 0,\r

    \                    \"unit\": \"mg\",\r

    \                    \"system\": \"eHealth/ucum/units\",\r

    \                    \"code\": \"mg\"\r

    \                }\r

    \            }\r

    \        ]\r

    \    },\r

    \    \"programs\": [\r

    \        {\r

    \            \"id\": \"f01d0d8c-bccb-4bde-a6c6-f4b873a005c2\"\r

    \        }\r

    \    ]\r

    }"
scripts:
  - type: beforeRequest
    code: "// Отримуємо encounter_start_date з глобальних змінних\r

      const encounterPeriodes = new
      Date(pm.globals.get('encounter_start_date'));\r

      \r

      // Створюємо medicationRequestCreatedAt (на день більше за
      encounter_start_date)\r

      const medicationRequestCreatedAt = new Date(encounterPeriodes);\r

      medicationRequestCreatedAt.setDate(medicationRequestCreatedAt.getDate());\
      \r

      \r

      // Створюємо medicationRequestStartedAt (завтра відносно сьогоднішньої
      дати)\r

      const today = new Date();\r

      const medicationRequestStartedAt = new Date(today);\r

      medicationRequestStartedAt.setDate(medicationRequestStartedAt.getDate() +
      1);\r

      \r

      // Створюємо medicationRequestEndedAt (на 10 днів більше ніж
      medicationRequestStartedAt)\r

      const medicationRequestEndedAt = new Date(medicationRequestStartedAt);\r

      medicationRequestEndedAt.setDate(medicationRequestEndedAt.getDate() +
      10);\r

      \r

      // Обрізаємо час, залишаємо тільки YYYY-MM-DD\r

      const formatDate = (date) => date.toISOString().split('T')[0];\r

      \r

      const medicationRequestCreatedAtISO =
      formatDate(medicationRequestCreatedAt);\r

      const medicationRequestStartedAtISO =
      formatDate(medicationRequestStartedAt);\r

      const medicationRequestEndedAtISO =
      formatDate(medicationRequestEndedAt);\r

      \r

      // Зберігаємо у глобальні змінні\r

      pm.globals.set('medicationRequestCreatedAt',
      medicationRequestCreatedAtISO);\r

      pm.globals.set('medicationRequestStartedAt',
      medicationRequestStartedAtISO);\r

      pm.globals.set('medicationRequestEndedAt', medicationRequestEndedAtISO);\r

      \r

      console.log(\"Medication Request Created At:\",
      medicationRequestCreatedAtISO);\r

      console.log(\"Medication Request Started At:\",
      medicationRequestStartedAtISO);\r

      console.log(\"Medication Request Ended At:\",
      medicationRequestEndedAtISO);\r\n"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"PreQualify Medication Request Response status code is 200\",
      function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });\r

      \r

      pm.test(\"PreQualify Medication Request status is VALID\", function () {\r

      \    const resData = pm.response.json();\r

      \    console.log(resData.data[0].status)\r

      \    const status = resData.data[0].status;\r

      \    pm.expect(status).to.eql(\"VALID\");\r

      });\r\n"
    language: text/javascript
order: 36000
