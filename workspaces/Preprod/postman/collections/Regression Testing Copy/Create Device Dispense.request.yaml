          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "division"
              }
            ]
          },
          "value": "{{user_division_id}}"
        }
      },
      "note": "Some notes",
      "program": {
        "identifier": {
          "type": {
            "coding": [
              {
                "system": "eHealth/resources",
                "code": "medical_program"
              }
            ]
          },
          "value": "{{program_id_qualify_device_request}}"
        }
      },
      "primary_source": true,
      "details": [
        {
          "device": {
            "identifier": {
              "type": {
                "coding": [
                  {
                    "system": "eHealth/resources",
                    "code": "device_definition"
                  }
                ]
              },
              "value": "{{device_definition_id_qualify_device_request}}"
            }
          },
          "program_device": {
            "identifier": {
              "type": {
                "coding": [
                  {
                    "system": "eHealth/resources",
                    "code": "program_device"
                  }
                ]
              },
              "value": "{{program_medication_id_qualify_device_request}}"
            }
          },
          "quantity": {
            "value": 10,
            "system": "device_unit",
            "code": "piece"
          },
          "sell_price": {{device_sell_price}},
          "discount_amount": {{device_discount_amount}}
        }
      ],
      "verification_code": "{{device_req_verification_code}}",
      "status": "in_progress"
    }
