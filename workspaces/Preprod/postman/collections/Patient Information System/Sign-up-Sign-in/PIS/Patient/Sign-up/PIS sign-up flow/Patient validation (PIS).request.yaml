$kind: http-request
url: https://pis-demo.ehealth.gov.ua/api/pis/sign-up_validation
method: POST
body:
  type: json
  content: >-
    {
        "signed_content": "",
        "signed_content_encoding": "base64"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Person has validated", function () {
          pm.response.to.have.status(200);
          var jsonData = pm.response.json();
          var token = jsonData.data.token;
          pm.environment.set("pis_validation_token", token);
      });
    language: text/javascript
order: 1000
