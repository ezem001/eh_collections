$kind: http-request
url: "{{pis_host}}/api/pis/sign-in"
method: POST
headers:
  Content-Type: application/json
  api-key: "{{client_secret}}"
  X-Custom-PSK: "{{x-custom-psk}}"
body:
  type: text
  content: >-
    {
        "token": {
            "signed_content": "",
            "client_id": "{{client_id}}",
            "grant_type": "pis_auth",
            "client_secret": "{{client_secret}}",
            "signed_content_encoding": "base64",
            "scope": "app:read_pis app:delete_pis trusted_confidant_person:login trusted_confidant_person:sign_up person_documents:write_pis person_verification:details_pis person:details_pis declaration_request:read_pis declaration_request:details_pis declaration_request:write_pis declaration_request:sign_pis declaration_request:reject_pis person_request:write_pis"
        }
    }
order: 1000
