  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const jsonData = pm.response.json();\r

      \r

      const misCodeGrant = jsonData?.data?.value ?? \"<<undefined>>\";\r

      \r

      pm.collectionVariables.set(\"pis_token\", misCodeGrant);\r

      \r

      console.log(\"pis_token set to:\", misCodeGrant);\r\n"
