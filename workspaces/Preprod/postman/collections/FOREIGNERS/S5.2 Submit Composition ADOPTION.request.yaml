scripts:
  - type: beforeRequest
    code: |+
      //2 observations
      var b64EncodeUnicode = function (str) {
          return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
              return String.fromCharCode(parseInt(p1, 16))
          }))};
          

      let today = () => {
        let currentDate = new Date();
        //return currentDate.getFullYear() + "-" + (currentDate.getMonth() + 1) + "-" + currentDate.getDate();
        return currentDate.toISOString()
      }

      var composition_date = today();

      var uuid = require('uuid');

      var composition_id = uuid.v4();
      pm.environment.set("composition_id", composition_id);

          
      var composition_template = '{ "id": "{{composition_id}}", "title": "1234", "status": "final", "type": { "coding": [ { "system": "COMPOSITION_TYPES", "code": "ADOPTION" } ] }, "category": { "coding": [ { "system": "COMPOSITION_CATEGORIES", "code": "ADOPTERS" } ] }, "date": "{{composition_date}}", "custodian": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "legal_entity" } ], "text": "string" }, "value": "46f7d41c-d5cc-4507-8c6f-c2dd5b5a6192" } }, "encounter": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "encounter" } ], "text": "string" }, "value": "{{encounter_id}}" } }, "author": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "employee" } ], "text": "string" }, "value": "{{employee_id}}" } }, "attester": [ { "mode": { "coding": [ { "system": "COMPOSITION_ATTESTER_MODES", "code": "LEGAL" } ] }, "party": { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "employee" } ], "text": "string" }, "value": "{{employee_id}}" } } } ], "event": [ { "code": { "coding": [ { "system": "COMPOSITION_EVENTS", "code": "ELIGIBLE" } ] }, "period": { "start": "2024-08-10T10:45:16.000Z"} } ], "section": [ { "title": "Main", "code": { "coding": [ { "system": "COMPOSITION_SECTION_CODES", "code": "11348-0" } ]}, "author": [ { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "employee" } ], "text": "string" }, "value": "eb474ff6-8121-4b4d-a817-e7e92515b119" } } ], "entry":[ { "identifier": { "type": { "coding": [ { "system": "eHealth/resources", "code": "observation" } ], "text": "string" }, "value": "{{observation_id}}" } } ] } ] }';
      var composition = JSON.parse(composition_template);
      //MAIN
      composition.id=composition_id;
      composition.date=composition_date;
      composition.status="FINAL";
      composition.title=pm.environment.get("composition_title");
      composition.type.coding[0].code="ADOPTION";
      composition.category.coding[0].code="ADOPTER";
      composition.custodian.identifier.value=pm.environment.get("le_id");
      composition.encounter.identifier.value=pm.environment.get("encounter_id");
      composition.author.identifier.value=pm.environment.get("employee_id");
      composition.attester[0].party.identifier.value=pm.environment.get("employee_id");
      composition.inform_with='8f5ed7b9-48f2-4b34-8f69-4e1bb31fa216';

      //SECTION
      composition.section[0].title="ADOPTION_ADOPTER_FREE_SECTION",
      composition.section[0].code.coding[0].code="ADOPTION_ADOPTER_FREE_SECTION",
      composition.section[0].author[0].identifier.value=pm.environment.get("employee_id");
      composition.section[0].entry[0].identifier.type.coding[0].code="condition";
      composition.section[0].entry[0].identifier.value=pm.environment.get("condition_id");

      //EVENT
      composition.event[0].period.start=composition_date;
      composition.event[0].code.coding[0].code="ADOPTION_ADOPTER_INELIGIBLE";






      postman.setEnvironmentVariable("composition_resource", JSON.stringify(composition));
      var composition_base64 = b64EncodeUnicode(JSON.stringify(composition));
      postman.setEnvironmentVariable("composition_base64", composition_base64);




    language: text/javascript
  - type: afterResponse
    code: |-
      tests["Job created"] = responseCode.code === 202;
      var jsonData = JSON.parse(responseBody);
      //pm.environment.set("job_id", jsonData.data.id);
      var job_id=jsonData.data.links[0].href.substring(6);
      pm.environment.set("job_id", job_id);
    language: text/javascript
