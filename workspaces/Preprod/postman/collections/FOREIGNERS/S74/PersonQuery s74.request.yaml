$kind: graphql-request
url: https://admin-demo.ehealth.gov.ua/graphql
query: >
  query PersonQuery($id: ID!, $filter: PersonAuthenticationMethodFilter, $after:
  String, $before: String, $first: Int, $last: Int, $relationshipsFilter:
  ConfidantPersonRelationshipsFilter!) {
    person(id: $id) {
      ...UserInfo
      ...AuthMethods
      ...PersonConfidantPersons
      ...PersonConfidantPersonRelationships
      ...EmergencyContact
      ...VerificationDetails
      __typename
    }
  }


  fragment AuthMethods on Person {
    authenticationMethods(filter: $filter, first: $first, last: $last, after: $after, before: $before) {
      nodes {
        id
        alias
        type
        startedAt
        endedAt
        phoneNumber
        isActive
        thirdPerson {
          databaseId
          id
          names {
      language
      firstName
      lastName
      secondName
      noLastName
      __typename
    }
          authenticationMethods(filter: {type: ["OTP", "OFFLINE", "NA"]}, first: 50) {
            nodes {
              id
              type
              phoneNumber
              __typename
            }
            __typename
          }
          __typename
        }
        __typename
      }
      __typename
    }
    __typename
  }


  fragment VerificationDetails on Person {
    verificationDetails {
      dracsDeath {
        verificationComment
        verificationReason
        verificationStatus
        dracsDeathActId
        unverifiedAt
        __typename
      }
      dracsBirth {
        dracsBirthActId
        syncedAt
        verificationComment
        verificationReason
        verificationStatus
        unverifiedAt
        __typename
      }
      dracsNameChange {
        verificationComment
        verificationReason
        verificationStatus
        __typename
      }
      drfo {
        result
        syncedAt
        unverifiedAt
        verificationReason
        verificationStatus
        __typename
      }
      manualRules {
        unverifiedAt
        verificationComment
        verificationReason
        verificationStatus
        __typename
      }
      legalCapacity {
        unverifiedAt
        verificationReason
        verificationStatus
        __typename
      }
      __typename
    }
    __typename
  }


  fragment PersonConfidantPersons on Person {
    confidantPersons {
      firstName
      lastName
      secondName
      gender
      birthDate
      birthCountry
      birthSettlement
      unzr
      taxId
      email
      secret
      preferredWayCommunication
      phones {
        type
        number
        __typename
      }
      documents {
        type
        number
        issuedAt
        issuedBy
        expirationDate
        issuingCountry
        __typename
      }
      relationshipDocuments {
        type
        number
        issuedAt
        issuedBy
        expirationDate
        __typename
      }
      __typename
    }
    __typename
  }


  fragment PersonConfidantPersonRelationships on Person {
    confidantPersonRelationships(filter: $relationshipsFilter, first: $first, last: $last, after: $after, before: $before) {
      nodes {
        activeTo
        confidantPerson {
          ...UserInfo
          __typename
        }
        databaseId
        dracsBirthActId
        dracsBirthSyncedAt
        unverifiedAt
        documents {
          activeTo
          issuedAt
          issuedBy
          number
          type
          __typename
        }
        id
        verificationComment
        verificationReason
        verificationStatus
        __typename
      }
      __typename
    }
    __typename
  }


  fragment EmergencyContact on Person {
    emergencyContact {
      firstName
      lastName
      secondName
      phones {
        type
        number
        __typename
      }
      __typename
    }
    __typename
  }


  fragment UserInfo on Person {
    id
    databaseId
    status
    verificationStatus
   names {
      language
      firstName
      lastName
      secondName
      noLastName
      __typename
    }
    gender
    birthDate
    birthCountry
    birthSettlement
    addresses {
      ...Addresses
      __typename
    }
    taxId
    noTaxId
    insertedAt
    updatedAt
    unzr
    email
    phones {
      type
      number
      __typename
    }
    preferredWayCommunication
    documents {
      type
      number
      issuedAt
      issuedBy
      expirationDate
      issuingCountry
      __typename
    }
    nhsRequestNumber
    nhsRequestComment
    deathDate
    secret
    __typename
  }


  fragment Addresses on AddressNullable {
    type
    country
    area
    region
    settlement
    settlementType
    settlementId
    streetType
    street
    building
    apartment
    zip
    __typename
  }
variables: |-
  {
  		"filter": {
  			"isEnded": false
  		},
  		"first": 10,
  		"id": "UGVyc29uOjNiZDU2MDQ2LTQ4OGMtNDdjNy04M2RmLTc4NWFjYjQxMzliOA==",
  		"relationshipsFilter": {
  			"activeRecords": true
  		}
  }
