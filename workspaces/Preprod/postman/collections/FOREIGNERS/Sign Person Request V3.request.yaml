$kind: http-request
name: Sign Person Request V3
url: https://api-demo.ehealth.gov.ua/api/v3/person_requests/a5d2d01f-3701-41da-ad87-bd71571fb27c/actions/sign
method: PATCH
headers:
  Content-Type: application/json
  api-key: 30276e63617461a185ec
  Authorization: ""
  X-Custom-PSK: a2ffb0888561e50d5a868faf56ea5708619b7ecc03b5bd21ff1a50f37a3f430e
body:
  type: json
  content: >-
    {
        "signed_content": ""
    }
scripts:
  - type: afterResponse
    code: |-
      tests["Status code is 201"] = responseCode.code === 201;

      var jsonData = JSON.parse(responseBody);

      if (jsonData.data && jsonData.data.person_id) {
          var person_id = jsonData.data.person_id;
          postman.setEnvironmentVariable("person_id", person_id);
      } else {
          postman.setEnvironmentVariable("person_id", "<<undefined>>");
      }
    language: text/javascript
  - type: beforeRequest
    code: >+
      //approve person request response

      var b64EncodeUnicode = function (str) {
          return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
              return String.fromCharCode(parseInt(p1, 16))
          }))};

      var patient_signed = true;

      postman.setEnvironmentVariable("patient_signed", patient_signed);



      var approve_person_response_template =
      pm.environment.get("patient_sing_data");


      var approve_person_response =
      JSON.parse(approve_person_response_template);

      approve_person_response.patient_signed=patient_signed;



      var approve_person_response_base64 =
      b64EncodeUnicode(JSON.stringify(approve_person_response));

      postman.setEnvironmentVariable("approve_person_response",
      JSON.stringify(approve_person_response));


      postman.setEnvironmentVariable("approve_person_response_base64",
      approve_person_response_base64);

    language: text/javascript
order: 2000
